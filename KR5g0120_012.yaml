front:
  text: 峴泉集卷之十二疑七
  hash: sha256:c53fae93d7a7c439afc69e0992941bc6ce22935d5beff4271704d2de70b810c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_012-001a, image: hfl/1021/1021-088.png}
body:
  text: 耆山無爲天師張宇初撰七言長歌橐籥子歌太虚無垠浩磅礴孰使隂陽兆開鑿皇皇眞宰執化樞鼓蕩吹嘘槖中籥由來萬有同一源玉檢瓊編秘經略玄元聖祖啓妙機百萬微言示沖漠廓然茫昧天地先無名無象皆自然百煉精金返眞液龍虎烏免相縈纏古來至士亦罕遇至人珍祕億劫傳祝融之孫得異說垢足麻衣叩雷穴自言縱閉司雨暘霹靂鞭驅隨奮烈少曾飛步金馬門鉅老勳卿盡傾結翻然不受簪佩羈直駕風霆走昊越是時金璧羅英豪豈意風塵頓愁絶韶華滿眼緫灰燼傲睨芳罇肆談閱歸來且識眞主顔仙若鬼谷思盤桓掃花酌水弄清嘯塵世俗慮無毫干洞觀向來去就不足數登我石磴之上洗耳聽潺湲昨言忽憶桑梓里天冠之壇久蕪弛雕甍畫棟勞經營越歳前圖復雄峙削空兩壁峩帝宫石室雲牀蓄雷雨我亦尋山築茅屋琵琶諸峰美如玉嘗聞大藥宜早營煉就丹光徧空燭洞庭彭蠡波滄溟黄鶴一去安飛行汞鉛顛倒豈細事爲我剖决乾坤精誰云洞天别有書洞中之天惟虚無既非皇人所筆廣丈餘又非元始所説空懸珠煩君鼓橐訊然否請括溟涬大塊歸元初題方壺眞人竒峰雪霽圖岷峨太古雪萬劫崑崙巔壺仙洒墨緫冰玉劒閣巑岏西極天層峰浪湧何竒絶暖動魚龍湘水裂霽色初分欵段橋松濤夜度峨眉月滄江老屋山之幽極浦隂崖迴凍流袁安門巷白三尺古木焕爛珊瑚鉤笑我支離卧丘壑瓊樹瑶芳翳溟漠大澤重裘霧霰深春風漸轉梅花角衰倦謝毫端披圖意欣愕輞川遺興邈復追靜對孤光隱寥廓題松隂授道圖緱嶺仙人結屋瓊林東巢雲道者爲寫百尺之長松見山堂前蔭高蓋根盤鐵石枝虬龍自言泥丸古仙子昔者授道瓊山翁有如靈壇燕白石長蘿秋籟吟天風上摩九霄錯落之雲漢下接三山渺漠之星虹泥丸之道視曠劫直與偃蹇蒼翠窺鴻濛緱仙昔跨嶺頭鶴閩海吹笙訪名嶽故人喜是仲父尊回鷗溪枕梅花閣嘉定雄詞百煉兵細語情深古方朔道山文彩嗟寂寥振翮超騰足鯨角憶過溪上停歸船釃酒松隂溪月圓縱横鱗影落空翠查靄竽聲廻暝川喬木踈篁不堪寫撫今感昔心茫然畢宏韋偃稱絶筆獨許壺仙踵芳迹雲孫宜更追令名磵水林峯暮寒碧後凋之木梁棟材隂崖霜雪應稀擇笑我放歌蘭蕙叢欲剪松花釀春液舉首共招陳白二老仙醉卧雲濤弄秋色題華山仙掌圖太華峯古名嶽元炁扶輿兆礴礴根盤西極嵩岱尊萬丈蒼崖倚寥廓斜傾半月指掌明側掛銀河碧空落摩霄岌嶪張峻屏培塿群山聳良霍天子巡方幾幸臨荒祠古宇淩千尋斷橋遠帶墟渚靜老木低亞川源深浮雲似隔鍾皷暮鐵索高懸渺烟霧中有仙人王子喬虎豹爲關石爲户我朝望秩當隆平徧遣羽人通精誠瑶壇瞻謁莫敢登歸復金門馳聖情雄辭妙刻照千古秦漢徒誇禪梁父山靈川后降禎祥宗社安隆固天府巨靈擘石通川流明星玉女栖丹丘黄河盤渦出天際白帝金精熒彩周車箱箭括通天路我欲因之與天語儗招馬衛駕鹿升翠崖丹谷知何許手携九節杖笑拍洪崖肩飢餐落雁霞渴飲玉井蓮紫衣朱鬢或相遇借我茅龍飛復旋壺仙白首驚畫絶贔屭遺蹤豈磨滅泠風一息九萬程底須醉向峨嵋月七言絕句題方壺神仙意厭將粉黛污秋容淨洗風烟一兩峯要識仙家無味處盡抛塵垢坐長松西宇眞人枯木夕陽渡口水連空落葉寒鴉古道中走筆秋聲來不盡釣竿何處立西風雲壑幽居翠崖丹壑雲千畝只著幽居小磵東聞説晴窗展書處藤花飛雨更秋風方壺仙岩竹葉野艇歸來飽勝竒袖中蒼玉記當時仙家多住空青裏只示人間兩半枝望仙亭仙徒隨地躡靈蹤顧望鸞飈歷幾重莫道靈槎無覓處江南此是最高峯煉丹岩汞鉛煉盡緫金砂苔蘚岩扃即是家遥望白雲窗牗處大還尤儗長靈芽雷洞嵌空石洞走雲烟靈草玄芝幾歲年坐聽風霆生足下自疑此外更無天龍潭絶巘靈湫抱石磯一泓寒碧護苔衣蟄龍有許潜山麓曾侍雲驂作雨歸學士閣華堂舊産玉堂仙文彩辭光照紫玄散作人間珠萬斛飛鯨遺想動千年禮斗壇卓立空青第一峯飛罡踰步即乘風捫岑不識天高遠指顧璇樞夜氣中玉庭館萬仞丹光照乘珠敞庭燕坐玉芙蕖世人漫禮通明界鸞鵠盤空聽步虚摘星閣高閣凌霄冠翠微星槎只載五銖衣洗空銀漠秋無跡入夜瑶笙鶴上歸望靈山玉削芙蓉照瞻明水晶苗長盡仙靈何當學剪吴松水割取蓮峯一葉青月中桂金粟秋香月半梢喜分清影入冰綃此身如在清虚府不待雲鬟下鵲橋雲野圖曠視塵勞廣漠濱半空笙鶴靜中聞一從會得無絃意不獨松巢緫白雲下棋峯崒嵂高崖會泉峯石壇雲霧藹西東仙家不比商山奕盡在河圖倍數中洗目池目盡群峯徧草萊鶴袍汙弊豈凡埃好將一滴清塵劫只用天瓢水半杯詞沁園春登眞溟涬鴻濛肇自先天無極之初暨隂陽分判乾坤定位循環動靜眞宰中居一黠靈明輝天朗地亘古圓融無智愚塵緣斷看碧潭鏡淨月瑩心珠八荒洞照無隅中宵永冰壺玉液酥正眞鉛投汞坎離交姤火龍水虎橐籥吹嘘白雪凝輿黄芽滿鼎雷震崑崙徹太虚功成後俟胎圓神化同赴天衢水調歌頭法海先天無象始父母未生前一眞獨露光明亘古著靈源縱閉隂陽内運顛倒五行攢簇涪氣養三田發用殺機處雷電震無邊既非心又非法亦非禪幽微奥妙千金不與世人傳莫認符圖呪訣直悟玄關宗祖將在自已神全瓦礫兼莎草濟世自超然風入松問學十年燈影夜相親寒暑迭催頻短窗幾度停犀管殘編盡知味何人簾外雪深風緊梅花偏旺詩神千經萬史足經綸學業志彌綸天根月窟間今古文章事多少迷津收歛虚靈瑩徹杖藜隨處陽春無俗念參究麈湖峰下結雲松巢子動忘昏曉浮世衰榮無限事一笑浪漚萍蓼翠竹黄華水聲出色此味知多少湛然瑩徹色空俱自明了天光雲影徘徊寫長空色一鏡澄清沼春去秋來心自在付與野情魚鳥海闊江平月明風細清籟傳音杳便須飛步滄溟朗吟天表水調歌頭内工至道無言説寂默守規中杳㝠恍惚周流一炁運元宫採取金精木液眞土内擒鉛汞頃刻顯神功測爻符鳴橐籥震雷風坎離顛倒火飛碧海煉眞空太乙含眞有象玉鼎流珠凝結神化合玄通歸去蓬瀛路曠劫玩鴻濛滿庭芳山居折却烏藤便尋茅屋誰知剩水殘山鑿池種樹梅竹任縈環芳草閑花覆地烟霞裏蘚徑柴關無人到春風秋月松菊伴幽潺簞瓢隨分過無榮無辱樵路漁灣與林猿谷鳥暮樂朝歡掃盡情塵業垢披衣坐眞息養還丹優游處孤琴隻鶴霜露不凋顔蘇武慢消閑悟幻尋眞參求幾載自誓頓超生滅風抄雪纂夜讀朝吟探究古今賢哲道妙禪宗萬殊一本勘破底須分别這堂堂無礙眞空非與太隂圓缺堪笑處竹椅薄團松窗桂牖邁步便同高潔塵世相違水雲爲伴高卧故園風雪駿馬貂裘翠袖紅螺過目浮華閑説速回頭是岸簾幃光透性天心月滿江紅閲世憶昔少年行樂地都非舊景聽海添潮落綺繡四城春永歌舞樓頭憎日暮管絃席裏嗔酣省看目前榮悴幾光隂愁難整夢魂醒塵慮并漫堪嗟空自警慨蘭橈荻閣水寒烟冷無分江湖中緒斷天心月到澄潭影念浮生識破悲歡川波靜酹江月江湖曾隨釣艇弄秋波見盡江湖涪漠兩岸白蘋洲渚外露冷荻花楓落半夜潮聲中天月色更轉梅花角推蓬試問故人隨處蕭索發棹牧浦漁村夕陽城畔歸鴈鳴徧數緑酒黄花烟雨際幾夢故園林壑壞塔風高海門山小春盡垂楊郭歸來林下振衣高視寥郭望梅花絶交浮世無邊塵累勘破幻緣能幾億劫寃親千生契識薄似片雲情義空自愧奸巧機關逞英雄徒增業翳用盡深謀詭計奔競是非名利造物無私靈臺自昧苦海沉津如熾淨抛棄野水踈林絶行蹤月明風細解紅了悟本來眞性體虚空徧界圓明現情塵揜翳心珠暗溺重淵靈光不昧一點輝煌元非遠掃浮雲萬象無遮礙天心見野花啼鳥間中舒春看滄海桑田幾清淺衰榮代謝常消息盡愁山苦海流浪難轉猛省來乾坤緫妙玄松筠畔寂寞細玩眞源曹溪路口無隂樹非法非禪直待一陽生坎光騰如波捲誰會取靜飲刀圭浮慮遣視無形聽無聲言無辨這落魄逍遥眞可羡白雲堆裏容癡倦共寒泉枯木隱隱壺天風入松江城淹病酒難酣疏鬢訝朝簪暑消已覺秋光徧紅塵遠斜日回驂蕙帳累留殘宿清霜猶濕春衫秦淮潮定碧如藍歸燕息呢喃白雲幃幔寒偏早更誰問鴈字魚緘早晩棹聲歸也黄花白酒村南峴泉集卷之十二
