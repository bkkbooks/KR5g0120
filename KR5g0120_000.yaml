body:
  text: 耆山無爲天師峴泉集序轉一天地間至精至微者道也至明至著者文也道非文不明文非道不立析而言之雖爲二要而歸其實一也乾坤之所以覆載隂陽之所以變化寒暑之所以代謝日月之所以徃來山川之所以流峙草木之所以榮悴無非道也無非文也其可離而二哉又可以强而合哉故聖人者作因其自然之道著爲自然之文未嘗以一毫己意加之也是故因其變化之理而成易因其訓詁之體而成書因其治化之蹟而成詩因其褒貶之法而成春秋因其節文之實而成禮因其和暢之用而成樂此六經之文所以終天地亘古今而不易者以其岀於自然也後之言文者捨是何適焉自周之衰王道熄而百家興競以私意臆說騁辭立辨以相高求弗戾於道者百不一二焉於時有若老子者其言以清靜無爲爲道著書五千餘言後世嘗有以之爲治而治者矣其庶幾於道者乎嗣教眞人張公無爲自其家世宗老子之教至公凡四十三傳公天資穎敏器識卓邁於琅函蘂笈金科玉訣之文既無不博覽而該貫益於六經子史百氏之書大肆其窮索至於辭章翰墨各極其精妙是以歷職天朝皆以問學之懿深蒙春宁凡殊褒前席之榮歲賚有加而王公貴卿縉紳之士亦莫不禮貌焉蓋江右文宗多吴文正公虞文靖公之遺緒而公能充軼之也其所造詣豈苟然哉間出其詩文若干卷屬序焉其詩之沖邃而幽遠文之敷腴而典雅讀之使人健羨不暇視世之佔畢訓詁拘拘以才藝自足者爲何如哉矧公領宗門之重任專以化人誘善輔國翊祚爲心其見於此者特其緒餘耳雖然予嘗考公德業既本於無爲是能遊心太初與道爲一而且沈酣於六藝之文蒐獵於百氏之說於是發於文辭理與意會有不期工而自工者矣其有補於老莊之道者又豈神誕之誇者比哉公以紳有世契相與極論斯事必撫掌劇談而後已故爲序其曰峴泉者因精舍之稱云國子博士金華王紳序耆山無爲天師峴泉文集序峴泉集者嗣漢四十三代天師張真人之所作也真人學行淵邃資識超穎貫綜三氏融爲一塗旁及諸子百家之言靡不暢曉故其發爲文辭論議雄邁偉傑讀之令人擊節不已予嘗愛其文如行空之雲昭回絢煥變化莫測頃刻萬狀曄乎其成章也又如入秋之水膏渟黛蓄微風興波萬頃一碧湛乎其泓澄也詞賦詩歌又各極其婉麗清新得天趣自然之妙可謂兼勝具美矣且聞龍虎名山靈氣翕聚鍾英毓秀挺生列真以道德相傳其來遠矣若道腴内充華藻外振以文雄一代者乃今獨於真人見之洪惟我朝太祖高皇帝混一寰宇光岳氣全天運之興文明三十餘年矣今上皇帝踐祚以來氣益昌而運益盛雖遐陬僻壤莫不呈材獻藝摛文搜藻以自見于時況在文獻之邦神明之冑優游乎德澤涵泳乎詩書大肆厥辭鋪張盛美以黼黻太平之治不亦宜乎雖然此特其餘事耳至於真人超然獨得之妙艶道之士又當於詩文之外求之峕永樂五年秋七月吉日序嘗聞有其道者必有其文也日月星辰天之文也山川花木地之文也禮樂制度人之文也蓋道爲體文爲用儒先謂文章爲貫道之器不其然乎龍虎嗣漢四十三代天師無爲張真人神明之冑也天資超卓學問淵源本諸中者有道德之崇著於外者有文章之懿嘗銓次其平日所作詩文凡若干卷目曰峴泉集英華煥發昭耀簡編以言乎詩則託物寫情優游不迫得詩人情性之正以言乎文則雄竒汪濊鋪叙有法得古人述作之體是以海内文人碩士傳誦而稱羨者比比焉自非真人學通百氏道貫三才體用兼該精詣獨得安能發而爲此耶及觀集中所著沖道慎本太極河圖原性諸篇義理之玄微研究之精極議論之閎肆其於天地造化山川人物禮樂制度靡不該貫雖專門擅業皓首窮經之士有不能及者非惟有功於玄教其於世教亦有禆焉將見斯集流傳於天下後世與峴泉相爲悠乆而無窮也必矣且真人嘗爲通著尚義堂記俾先祖父之志行亦得託於不朽斂襟三復深有感焉因書此于卷末以致其私意云永樂五年秋七月甲子新安程通謹識
