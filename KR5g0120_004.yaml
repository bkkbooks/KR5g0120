body:
  text: 耆山無為天師張宇初撰説傳書太素説子列子之言曰有太易有太初有太始有太素太易未見氣太初氣之始太始形之始太素質之始氣形質具而未相離故曰渾淪渾淪者萬物相渾淪而未相離也夫氣形質之始隂陽未分而體渾淪分則竅鑿而混沌死渾淪者離矣然三者常包括終始環互栖伏外若離而須臾不違於消息間者去渾淪未嘗遠也蓋氣行乎天地者為風雨霜露山川溪谷具乎人與物為四體百骸雖飛潛動植一本萬殊皆囿於形質者也未見氣之始固莫得而測其備於質者可得而窮焉天之蒼蒼太虛澄徹其正色也而晦冥變化起於倏忽蒼蒼之色遂翳然非晦冥變化不能盡其在天者矣人稟氣質之正其情熾欲濫則剛善惡著是漓其淳雜其粹涅其潔若質之素則駸駸乎混矣然非剛柔善惡亦不能盡其在人者矣物皆然動靜往復均不嗇焉故物之質者非文飾不華味之真者非鹽糵不調音之淡者非律吕不和此物性之必然也人之所以必懲欲復初而後淳者不漓粹者不雜潔者不涅其清明之體昭昭焉具矣是足以見吾剛柔善惡猶天之晦冥倐忽其本質之素未始有動靜者焉雖然世或持其説以自修特養素而未能遊乎太素非遊乎太素其能見質之始乎抑質者常華者弊質者汨人華者悅人志夫道者必去華以返質能返乎質則慮精神明表裏貞白萬物渾倫而不離是非見其始哉君州武當山五龍宫高士練太素學博而行端居吾山二十餘年持踐克篤常靜處一室不與世接昔先君常禮之及豫襲教凡吾道家言多所資究焉是豈不能遊乎太素而獨若然哉今秋欲還余固留不可因謂曰古今名山川必仙真所居皆所栖息亦何限乎是歸也然豫聞是山竒秀冠天下豈無若安期羡門者潛逸其間太素其將徴會焉以廓其渾淪而返乎溟涬之初外乎形氣之囿尚何求乎質之始歟於其行并合其説練喜請書以識别純一子説盱江張彥宏氏家世著德望余去春謁西山華蓋道盱而還始識之愛其姿純篤因語焉知求吾道言尤切嘗以純一子自號值還未暇論也今春來遊吾山余同弟彥璣與之遊龍井觀塵湖琵琶雲臺藐姑諸峯之秀濯狂瀾坐磐石若與天遊莫知其人間世也彥宏因請曰嘗告以純一子之號今獲侍兹遊敢請發其義余指水而與之言曰水靜物也深源窮壑泓澄一掬及發其窟怒騰躍百折下走不知其幾千百里大而江海小而溪谷觸石則怒激風則鳴雖遇棘而塞遭穢而濁魚龍宅其深林木翳其幽風雨晦其潤無能禦滯之書夜不息須臾莫可遏者其勢之所遇然也於其體之淨明非棘能塞非穢能濁無不容而無不燭者元氣行之道之所謂法者本諸氣水行天地間猶氣行乎身動靜往來一呼吸之頃盈虛消息具焉人心制乎氣本淨且明其虛靈昭昭若泓澄焉惟其徇欲而蔽感物而動稍不加持治之功其役於外者顚仆交錯猶水之窟怒騰躍勢不可禦其氣散而為思慮情欲若塞而濁者宜矣是故聖賢訓之防間其心正以覺其誤復其流使求猶水之所遭者使然其淨明未嘗溷焉而昭昭者存而謂之道行而謂之法則周流六虛與天地並行而不違者發而為風雨雷霆若固有之何哉蓋河洛二五之數與雷霆三五之道萬有生息一是本焉是以養之為至和施之為至神孚以蕩磨通以誠慤則妙用之契若返掌矣特有幽冥鬼神之異彼所鮮言吾兼用之也夫是必純而後能一一則性命之道備矣尚何法云哉故觀物之性則知己之性能盡己之性則知天矣知夫天則在我之天即彼天也感通之道孰得而二焉故內修之士多佯狂使酒談笑怒罵皆可役風致雷顧豈苟然哉彥宏既備究法奧純一之功熟習而嘗驗者也尚何言乎且余聞其上世有聞道而超脫者其好尚之篤豈非宿習也哉彥宏勉之旴為侍宸王真君之邑里尚振其遺傳以啓將來是所望焉因請志之遂筆於礀上志學説學之大本存乎性命道德而已矣夫心統性情而性稟天命之所賦也四時五行庶類萬化莫不出乎命四端五典萬物萬事莫不具乎性然而萬殊一本其理未嘗不一焉是以率之之謂道修之之謂教而必學而後知也其始乎孝悌忠信成乎升降酬酢無時而不學也經之謂學肇於説命曰學於古訓乃有獲念終始典於學此聖人之學也聖賢知全乎天理之公則清明純粹之體具愚不肖惟溺乎人欲之私晦濁邪僻之偏固學之者求去其蔽而復乎本有之善而已耳故必究夫盡性致命明善誠身之道焉是以禮義為之品節防範以言行為之涵養省察然必隆師親友而後得則持敬以居之由義以行之久之入乎耳著乎心無入而不自得焉今夫造父善御羿善射師曠之律倕之弓奚仲之車杜之乘雖工伎之小且猶志彀而後中焉矧學也聖賢之事乎夫子既聖矣而不自聖猶曰吾十有五而志於學當是時以及千萬世豈有過聖矣乎而猶志乎學哉其設也在唐虞曰成均殷曰太學又曰瞽宗周之太學為東郊小學為虞庠此漢唐所以發之也而唐虞之君皆聖矣亦未始不師焉若堯學於君疇舜學於務成昭禹學於西王國湯學於成子伯文王學於時子思武王學於郭叔此性之身之亦有發焉夫子亦嘗問禮於老氏訪樂於萇弘問氏於剡子而孟軻學於子思之門荀卿學於鄒衍此儒之所相傳也但之為董韓繼之為濓洛卒求乎中正仁義之歸而確乎其返身之謂也得乎六經之膏腴者粹中閟外足以參贊發育而形諸至和者著而為之文經緯錯綜託以載夫道焉是故衡璜琚瑀之儀彝鼎簠簋之制有不待飾而知其為清廟之器也豈徒若懷竊鼓鑄之流誇浮文偽惟雕蟲刻鏤以爭妍取憐之是效也苟不能達乎正大高明之域徒競於矞宇嵬頊之趨若之何而謂之學哉必造其指而底於成也視向之得夫師友者不啻言之於櫽括陶之於埏埴不勞力而有矣蓋得諸己者道之精微學之淵密充實光輝而日益其視錦繡纂組不足謂之華茵鼎圭綬不足謂之榮是雖絲縷菽粟之薄蕭藋杯水之陋不改其樂也乎抑亦一毫不足纍其中而然哉然而騏驥一躍不能十步騖馬十駕功在不舍然其所至雖有疾徐之異在乎息與不息哉斯其聖人志而不厭也歟余猶子某純敏嗜學嘗以伯氏某扁其進修之所曰志學請一言申其義余之於學也探蹊而未入于閫者也其能有以啓之乎某尚勉之使其習之至行之著余將見其所成立詎可量哉是為説以俟紫虛元君傳元君姓魏氏諱華存字賢安任城人晉司徒舒之女也魏齊王嘉平三年辛未生天質卓異少讀老莊言即慕道嗜間居獨處年二十有四父母強適南陽劉文字幼彥生二子璞遐幼彥為汲郡修武令二豫粗立乃齋心别栖絶飲食反修初服太康九年戊申十二月十又六日夜半感太極真人青童道君扶桑暘谷神王景林真人清虛真人來降謂元君曰聞子密緯真氣太帝君勑我授子神真之道遂出太上寶文八素隱書大洞真經高仙羽玄等書三十一眷授元君曰是書昔授之西城總真君今以付子且語以存思指歸之訣乃去元君時年三十有七咸和九年甲午清虛青童君復降與藥二劑使旋服之尅期會洛陽宫是月七日夜半太乙遣飈車來迎元君用藏景之道託形神劒而化享年八十有三遂往陽洛山明日青童君太極四真人清虛王君再降會元君於隱洞雲臺衆真各標至訓三日而去元君積誦玉書顏如少女於是西王母南極元君來迎晨詣上清宫玉闕玉宸大道君太微天帝金闕後聖君各致命授以玉札金文位為紫虛元君領南嶽上真司命秧比仙公使治天台大霍山洞臺之中主下教學仙者次司命神仙請隸屬南嶽諸真乃與元君俱詣天台大霍山洞臺道過句曲金壇茅君叔申燕會二日夕乃共適霍山矣興定二年乙丑六月二十三日元君與衆真降句曲金壇楊羲家華陽之傳始此是為上清第一代宗師宋元祐間進封高元宸照紫虛至道元君云金野菴傳金蓬頭永嘉人也名志陽號野菴因蓬首中作一髻世呼蓬頭云生故姓家鄉井德之幼果敢有大志不羈甫長知慕道棄世慮遂師全真李月溪月溪白紫清徒也一見器之命遊燕趙齊楚求正焉及參先德李真常益有省行經袁州遇守城校尉顚軍子狀貌偉素曰不與世接夜宿神祠間蓬頭異而師之既久語益有得時紫山鄒廷佐慕道建長春觀禮之未幾命其徒劉志玄典觀事乃遊武夷龍虎二山時龍虎主先天觀者傅師正館于蓬萊庵庵據徴君聖井藐姑諸峯之會蓬頭攀陟崖壑侣鹿豕藉雲霧視以為常間夜坐磐石蛇虎愼於前輒愕而遁去因得夷曠地命其徒李全正趙真純築天瑞菴于峯頂時四方聞其道著無遠近有疾患輒叩之以所供果服之無不驗由是禮者日集嘗天旱叩龍井召龍出語龍出聽踰時漸小躍入袖中乃警以偈龍騰奮入水未頃天雨元統癸酉復隱武夷山居紫清之止止菴浙東元帥李太平聞而禮之謂曰命嚴則君治心清則慮寡李益敬歎及叛賊李志甫寇漳州國朝以其地同知昊公知寇道命為先鋒平之其子仲良願師事之不許隨果夷滅衆神服或倦請謁者衆謀藥死之即預知命徒鑿竅地中果服出之今名吐丹井云至元正月一日同輩桂心淵世稱桂風子坐解于廬山旋聞之於四月十日命徒書偈坐逝越十三日面頳若栗肢體溫軟猶生其徒瘞于菴側之古梅下生前至元丙子五月四日高弟則勞衍素郭處常李西來殷破衲方方壺皆以道法聞世云芒芴子曰古之烈夫義士必苦行潔身以成其志故其視裂肌膚摧筋力若所固然是以其卓絶特立足以垂示千載若金蓬頭是也然欲立名於世且必是而後可況其超脫幻化者哉求能若此而於道無成焉未有也惜能是者代亦幾人哉趙原陽傳趙原陽名宜真吉之安福人也其先家浚儀宋燕王德昭十三世孫某仕元為安福令因家焉原陽幼穎敏知讀書即善習誦博通經史百家言長習進士業未幾試于京以病不果赴久不愈夜夢神人曰汝吾道人何望世貴父遂命從道己而篤嗜恬淡學益進初師郡之有道者曰曾塵外嗣諸法要間有缺文必考述盡詳復師吉之泰宇觀張天全别號鐵玄張師龍虎山金野菴得金液內外丹訣後復師南昌李玄一玄一薦之師蒲衣馮先生馮亦師野菴云嘗遊白鶴山永興觀乃西晉匡仙故迹遂居焉間以所授致雷雨度精爽皆有異感聞者越千里走從之會壬辰兵興挾弟子西遊昊蜀暨還遊武當謁龍虎訪漢天師遺迹時天師沖虛公深嘉禮之欲留不可宫之學者多師焉還至贛之雩都紫陽觀因居焉凡道門旨奧皆綴輯成書或為詩歌以自警猶以醫濟人且絶交處寡言笑聞者願禮不獲其高行偉操為時所椎慕從遊者益衆歲壬戌正月朔謝衆曰吾將逝矣自今日始鑰靜關愼無有干逮五月三日夏至啓關祝弟子善自立潄浴更衣趺坐適縣導詔至樂鳴即書偈擲筆而化雷電驟作白晝晦冥明日官庶膽敬者群至門人哀德淵輩請以棺殮肢體若生既畢汗出周浹越三日瘞觀後之鳳岡久之草淨鳥不巢其徒則曹希鳴劉若淵猶入室焉有詩詞若干篇已行世凡奧密言論則見諸法要云贊曰玄門之書千萬言內聖外王之道既備其神仙長生語特曰虛靜恬淡寂寞無為可謂易知易行矣故代之出世拔俗者必苦行峻節以自持信非志見卓異所不能造又孰可一以眇漠病之也乎若原陽言足範世道足啓後曷可無以紀歟然其昭昭不可泯者亦何俟信乎是耶與倪孟沖論火候書日者承過訪山舍高論竟日足洗枯寂鄙野之懷甚慰甚慰念欲少淹一宿山雨夜話亦見林泉真味何御風長遄飄飄然不可追及耶遽增怏怏耳繼辱示高製洗心玩味涵泳之久誠有默識心通者矣吾友之學可謂博贍宏遠矣又豈僕之足盡窺盡聞也哉然而正欲探賾幽微攢礪隱奧者邇者罹不測之禍譖諛浸長澆偽競起一時傾危覆奪之勢若火之焚水之溺莫可得而避也惟容之以默委之以愚引咎自責而已尚復何辨哉當是時求能卓然不改以禮節相扶未之見一人焉何薄於道義趨於流俗者皆然抑世豈無若馮歡朱勃之才者亦固緘口結舌熟視而不發一言乎乃為濡足之故不救溺人可乎幸賴高明在上藉祖宗之遺澤獲全而歸而卧疾且久人情世態雷動川湧何一變至有若是之甚其亦可歎也矣是以處蹇困之中將以省心克己戒謹恐懼修德以俟天命此古人之處榮辱得喪安於所遇而已雖愛者戚戚而悲憎者欣欣而喜舉不足動其心干其守也故其居屯艱險阻乃所以驗進道之力也是以文王囚而作易宣聖厄而修春秋下而學業文章未有若班馬揚賈韓柳歐蘇者亦常困於放逐貶竄而其學不廢而德愈修者所謂不遇盤根錯節不足以别利器者此也豈欲文其過以欺後世哉矧僕以愼而取咎思患而預防之乃所以致患也此非命與數而何然而傳曰惟彼譖人投之豺虎豺虎不食投之有北有北不受投之有昊今斯見之矣其獨無愧乎中者雖屈於今未必伸於後也幸復苟安泉石日與木石居樵牧遊其去野人幾希乃得肆志於性命道德之言視彼碌碌炎涼之輩姦回譎詐肩摩足躩若蠅聚蟻負之逐羶鯉然群議黨計朝遄夕違亦獨何心哉又孰知處進退存亡之道者惟義是從耳雖死生窮達之所不論尚何奔競悅媚之下者哉且人受命於天者必有定在焉豈以一人之私可得而拒哉此固非世之所能知而亦古今之通患也而僕之潛心力究於吾友之言深有取焉而學之未逮切有疑者獨火候之傳凡參討數十載往來方外之士靡不討論解有契者其言之荒唐謬悠者悉歸於虛則以卦爻晷刻之設特其規式耳循而不必泥也其言之幽深微密者悉詳於實則以符候斤兩之數皆其法則也守而不可違也則二者孰善焉若夫乾坤坎離金精木液火龍水虎水中之金火中之木返還顚倒之妙鼎爐藥物之諭皆嘗聞其槩矣獨百日立基十月胎圓脫胎神化之機火符下手之工卒未之決其疑也而坎離之真隂真陽升降遄來周流不息即五行一隂陽隂陽一太極也由太極而生四象四象生八卦八卦演而為六十四卦六十四卦演而為三百八十四爻循環無端遄來無窮雖天地之大萬物之衆有不能逃焉此人身一息之呼吸而與天地之道合而人所以能盜天地之機也以是觀之則一年十二月一月三十日一日百刻也一月總計三千刻十月總計三萬刻三萬刻之中以奪天之三萬年之數一刻之工夫自有一年之節候所以三萬刻可奪三萬年之數故一年十二月總有三萬六千之數是以三萬刻刻刻要調和或有一刻差違則藥材消耗火候虧缺火數盛則燥水銖多則濫火之燥水之濫不可不調勻是故攢年歸月攢日歸時十二時中只一時也其間晦朔弦望沐浴刑德盈虛進退不可不知也有曰南北宗源翻卦象晨昏火候合天樞隨日隨時則斤兩毫髮差殊不作丹由來庚甲申眀令以時易日法神功其火候之有記而聖人傳藥不傳火之言信矣而又曰冬至不在子大藥不計斤真火本無候卯酉時虛比箇中得意休求象若究群爻漫役情則符候之謂信虛言哉此必始於有為終無為也若天地一年一周日月星辰一月一周人身大藥一晝夜一周一日之內陽生於子極於巳隂生於午極於亥陽始於復隂始於垢一月之內朔始於屯蒙晦終於既未自巽至坤皆未生之卦故知來者逆自震至乾皆已生之卦故數往者順則一年二十四氣七十二候所謂一月一還為一轉一年九轉九還同仙師之言詳且至矣考亭朱子則謂火候之法乃以三百八十四爻為一周天之數以一爻直一日而爻多日少則去其乾坤坎離四卦凡二十四爻以應二十四氣氣至而漸加焉況一日之間己周三百六十之數而其一氣所加僅得一爻重輕不相權準其策數之法蓋月以十二卦分之卦得二日有半各以本卦之爻行本卦之策其策多少陽即注意運行隂即放意冥寂十二卦周即為一月之工十二月周即為一歲之運反復循環無有餘欠是則大易之妙豈不與大丹允合也哉以此抽添進退必有消息增減之異豈若沉空滯寂之偏即禪宗所謂黑山下鬼窟者蓋以默坐於隂趣故也殊與吾命宗之旨大有徑庭矣惟吾友皓首窮研遍歷湖海必素會玄微幸有以啓之使僕齒日向暮苟獲有尺寸之進以俟其成其能忘所自哉此非山林契合之久鶉衣惡食與世相絶者共論之豈誇耀當世苟媚聲利之輩之足語是哉然亦察非其人言不及是庶不失於知言也高文謹用返壁拱俟一發驚鈍幸甚幸甚峴泉集卷之四
