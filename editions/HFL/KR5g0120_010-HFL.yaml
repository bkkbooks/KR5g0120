front:
  text: 峴泉集卷之十疑五
  hash: sha256:31057485f08f6c9d1c9d08f16bae94699a6ca85a21f245c24da93c23532a352b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_010-001a, image: hfl/1021/1021-004.png}
body:
  text: 耆山無爲天師張宇初撰五言侓詩元日開歲占豐候晨光感節分曉簷翻瀑溜寒樹暗溪氛人事渾萍梗生涯半水雲盈虛知有定何事貴多聞喜晴立夏天方霽閑情喜暫舒樹深添兩澗溪落見人踈夕照依斜竹圈花落近書年來惟懶拙殊覺稱幽居坐演法觀碑亭野亭林藪合苔逕慨荒凉浮世人情簿空山道味長削空崖勢赤蔽日樹隂蒼俯讀殘碑罷神情頓瀕茫藍杜曉策穿嵐浦靈巖引鶴颷春流迷野渚盡兩滑莓橋林屋輕煙瞑流古渡遙坐看篷暮片舸滌塵消峴泉夜坐借雲成隱拙神嶽信浦都一水通雙潤千峯戲兩鳧道山期小史靈𩾵只潛夫從此栖閑逸浮塵信有無暮春還峴泉暮春尋澗谷藜杖野橋遇山崦廻蒼玉林坳濕翠螺柳深黃鳥岸舟靜白鶴波勞生聊此寄高興欲如何庵居冬夜春回先臘日晏歲臥山居庭竹寒遮逕池梅晚映書泉聲憎吠犬春響躍濳魚萬物生生意虛中樂有餘題瓊林秋色仙臺聳靈玉樹環青空秋色半䈴兩松濤三逕風雲情隱居閣澗韻雜裹桐勉志步前列幽圓披華嵩題方壺秋山幽隠圖此苑無窮意秋山滿目中短橋通驛路老屋帶霜楓過雨凉侵夕殘雲靜歛空偶同歸隠處塵跡罕西東我愛山居好我愛山居好無求足飬眞秋聲七八月山色两三人跡晦心非晦身貧道豈貧滄溟觀大化搔首愧紅塵我愛山居好蕭條歲月長靜中知道大閑處覺身忙夏雨雲尤白秋風菊漸黄何如收足坐塵慮豈相妨我愛山居好從知物我同風雲而車轍天地一環中生化機無盡圓方妙不窮屈伸呼吸裏委順任西東我愛山居好消閑應接稀靜喧眞蟻穴聚教等蛛機情識生人我行藏見是非誰聞蒙叟語獨有此心微我愛山居好柴門補薜蘿諸峰自賔主遠瀨即絃歌犬靜村墟暮山深雨霧多夜闌群動息琅韻獨長哦我愛山居好年深坐寂寥風霜看勁節氷雪對寒標養火三宫淨怡神百慮消但無蟬蛻繫放曠即逍遥我愛山居好收回萬古心漂流快奔浪澄定見精金世俗觀常變人情識淺深崆峒無别味自許老山林我愛山居好寒温不記時江湖無舊夢交友寡新知出處隨吾分操違任世疑寓言盈簡帙於此定何期題汪原八詠石塢雲爲構眞成小有天草池寒入夢山雨夜驚眠村轉鄰家樹花流礀口泉學仙非傲吏樂此去經年右東塢春雲山澤尋眞處翻經作石臺晚煙生古樹春鳥落殘梅羽佩雲中度靈槎海上回俯觀無際畔何地不塵埃右北嶺石臺南阜山俱秀青藍滿坐隅也應看劒飲只合帶經鋤秋冷多黄葉溪深間白魚何如留半畒容我共潜虚右南山秀色月色初凉夜溪流兩岸清星何斜屋角風露雜泉聲沙渚流孤舫秋山隱故城漁歌來野韻東崦路迴縈右西溪秋月草舍依農圃環庭手植多寧無去官酒也有捲茅歌雪後行吟晚秋深食養和久探爐藥事隱退近如何右草堂松菊種圃兼芝菌耘鋤歲月侵桑麻緫生意墟里共繁隂雨足林塘潤春寒隴畝深夕談無雜語投老更知心右老圃桑麻别井泉清洌泠泠會有源燭容明是鑑無底石爲根茶鼎斟常碧丹瓢汲後温寧如溟海視留與壽諸孫右玉井清泉鑿石開新沼方諸十畝青雨聲翻鯽浪山氣逐龍腥曲竇時鳴雪流珠晩蕩星從知得眞味早悟太玄經右石池湛碧次葛維貞錬師謝晝韻杜曲多詩思幽棲勝草亭潜眞窺五太養素悟三靈羽服過林谷仙標藹户庭耆英凋落甚吾喜髪尤星南陽文物裔興寫墨池頭人產鳳凰穴鶴還鸚鵡洲遠嵐橫嶂濕喬木斷雲浮晩有渭川思應垂不餌鈎屏跡屏跡渾成癖觀空絶見聞池昏泉入竇逕避蘚成紋石澗喧春雨紫屝掩暮雲素耽樵牧趣直欲謝塵氛五言排律遊璧魯洞天璧魯天眞府佳晨足勝遊雅期先九日遐賞屬三秋叢隸聯仙萼名簪恊令儔溪潯分放棹林渚漸經丘村迓延時酌山庖款暝留峻崖懸積鐵宻樹響鳴球霧引湘簾細星垂藻井幽泉分霜楮臼礀抱露苗疇席月糜鄰豹厨煙犬雜猴曉炊催束袂野簌盡交籌樹日冰華淨眠雲練絲周履危抛謝屐步側舍陶舟洞户駢肩入若扃並涉求攀援聞𥦖窱指顧坐綢繆隂壑盤風磴陽岡洗晝雲淒飈宜落帽凝靄欲加裘漢跡神藏虎秦封木卧虬魯侯嚴甲衛太乙秘㝠搜寳笈虚靈檄琳書著羽流貫魚窮險怪序鴈少夷猶秀採蘇耽橘涼斟玉女湫古槎懷博望深谷候巢由枝穩驚棲鶻身輕愧浪鷗畏途惟仰睇空語遞喧諏先轍追芳躅眞盟仰大猷鼈行循引竇磬折俯傍鈎嗣忝神明胄才違簡帙脩帝廷嘉靜謐玄圃遂優游歸䇿過停鶴全生悟解牛幻名題絶壁曠劫視崇休和昊彥直游峴泉丘園誠好遁仙脉況遺宗韋曲方遷墅盤中偶卜宫金波開月沼玉氣瀉蓮峰藏息宜天分經營實化工自躭幽谷退復覽帝畿雄眞隱追龐甫幽尋謾孔融殘荷分露入曲澗帶泉通石溜空鳴珮荆屝未列墉履聲驚隱豹藜彩動眠龍經閣虚凝白書林靜落紅采竒知友共惜别故人同鶴侣宜遊客鵷行愧上公深期鶡冠子敢繼鹿皮翁姻婭蒹葭託懽延茗核供歸詢疑見竹談契亦巢松文誼膠投漆詞華律應鐘續遊知興遠前席侍恩濃盛業光先德家猷豈易東五月望日遊仙岩靈跡仙眞會欣陪勝覽同斯文推世重盛代仰儒宗才挹華川秀遊將弱水通放舟移市浦啜茗下漁蓬石瀨翻晴雪溪瀾蕩晚風鷺輕洲渚僻鶴靜島屏空洞户容舠窄川崖貯棹窮蒼崖分禹跡碧樹閟秦封錦織天機妙藍浮地軸雄虚㝠隨架鑿造化孰陶工庾廪縱横立簷櫺隱約逢烏巢驚决眥猿竇晦沖融河伯藏幽府馮夷隱秘宫高風寧郭泰雅度獨王恭酌蟻詩籌遍題巖筆興供漢祠松檜古明佩水雲豐晩翠延鐘入殘紅掃席充丹光遥爍電劒氣遠騰虹虎豹疑隂藪蛟龍信大潨琪篁深夏竹瑤草細春茸聯璧煙霞表懸珠月露中山醪慚醴釀潭鱠想雲夢下榻苔侵履凭樓澗瀉桐乾坤旋坱圠歲月浩洪濛梵放交林籟幽期託桂叢謝程躭險怪莊語振盲聾罇俎懽承洽箴規惕在躬詞源傾渤澥道統企衡嵩王德嘉賢厚臣衿體令忠青城猶祖澤璧魯固神功星漢澄空寂塵氛滌浩沖九要蒙琢礪三益感磨礱惜别情逾切論文義最隆令名追賈馬清問記方蓬耀古琳球彩千秋紀製穹普度醮慶成賀同虚傅仙官靈嶽儲眞範玄科啓孝誠耆英回帝所幽祀會仙盟川炬光揚燭雲旛預達情闡儀壇墠肅則象典模精緑簡通朱府瓊章進玉京羽曹聯杜陸家授繼玄盈龍劒招揺煥鸞幢沆瀣明五銖交炫彩八極遍和鳴軒衛環千吏遐追走六丁坎離資滌鍊復垢返胎嬰紫户凝空洞黄輿耀錯衡雨消寒食火花粲暮春晴縹帙三千禮琅函五億名飛濳椎化育品彙感敷榮炎閣浮珠黍㝠緘列火城薫篙昭夢寐烝享備粢盛愴慕矜貧困驚呼駭隸氓懽聲彌巿野佳氣兆薇蘅泉壤開重閟冰輪徹九清隂陽旋要妙天地仰裁成道以神爲用年忘寵孰驚教樞推宿望領袖重儀刑愧忝蘋蘩瀆欣承惠澤禎從兹安泰宇前烈播休聲賀彦衡弟新居留國丕基壯仙都傑搆雄群峰環厚地泉匯赴高穹川嶽儲靈域神明著令宗秉資嚴志操慕學善陶功聖澤源流偉玄模景仰崇陶謙居秀表衛玠美清哀黼黻瞻天語簪纓俟睿庸慈闈尊聖善閫助篤賢恭陸賦懽趍鳳姜綸儗兆熊宏䂓宜綺錯鴻業信曈曨綵緻明飛電環材偉焦虹編連分碝磩颯纚煥簾櫳豈亞方瀛翫渾過閬圃躬瑤林通繡閣瓊樹接珠宫東旭來搏彩南熏動冀中金張椎望重潘謝悅時雍曠覽忘埃壒流觀抱華嵩百緍期顧彥四德愧王戎韓萼華聯爽塤箎奏迭工棼楣駢黝堊冠蓋佇璜珫燕雀欣深靚園池足茂豐先國承慶遠後武紹芳隆夙德由亨盛嘉謀緫恊同蹇蹤慚阻賀續創喜增窿蔭木知孫偓弘文冀馬融芳時紛苒苒佳氣蔚葱葱每愧衰遲甚惟希立卓沖圖書研暇日絲竹寫餘風祖德貽山固親年樂貌童徽猷垂奕世光譽播無窮峴泉集卷之十
