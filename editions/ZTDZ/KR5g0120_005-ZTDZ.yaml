front:
  text: 峴泉集卷之五轉五
  hash: sha256:4839ebf05ac2a8b969a72af1f1dbbd84220a0eb4bcab7e6bebede4657287bda3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_SJB_005-330234c, image: sjb/33/330234c.png}
body:
  text: 耆山無爲天師張宇初撰銘箴讚書室銘有序余年未冠知嗜學有志儒先君子之言凡詩書六藝之文悉嘗記誦之甫長自揆於文章家未之盡究凡通都大邑以學行著於時謂之先生長者又從之遊於是經史子氏之書逮老釋之文庋置曰衆然後會其指歸反身而誠乃知皆備於我也於道德性命之說自孔孟而下周程張邵失吕焉文辭篇章之習左氏而下班馬韓柳歐蘇焉越周程諸子而言學則不足謂之學違班馬諸儒而言文則不足謂之文是以非載道之文雖工不取焉古之謂學也爲己豈岐而二哉由是而充之上泝墳典經傳不遠矣其不採本索源而足謂之學哉豈徒纂組葩藻之習以爲取利禄之具而已耳所以克己誠身乃希聖希賢之大端也矧飬諸中者必修諸外也和大而天地位萬物育幽足以承變化而行鬼神明足以修禮樂而贊化育豈惟致君澤民者哉所謂經綸大經者也然而出世之道必資於老關莊列之言又豈申韓刑名處士橫議者可同途共轍哉若釋氏之特立獨行明心見性抑亦出世之一助也其邪說戾行則有不能無可訾斥者焉烏可一以虚無空寂病之哉下逮術數𥘌祥之文則不暇究也所愧質性駑劣不足善繼其志嘗闢室以儲藏之因銘于屋壁以自警且貽諸將來以勗厥志其無忽銘曰繄自書契稽于典墳彝倫由序道義之門惟帝降衷皇建有極天命流行必順其則純粹誠明是復厥初形役物化孰潜吾虚惟聖惟賢昭示謨訓愼思篤行滌滓融藴體立用行動靜克持含英咀華發見乎辭心統性情百慮一致廣秩崇篇大音醇味燭妄返眞探微造玄氛垢洞釋不違乎天聚辨而居孰貴圭組永言珍之尚友千古古琴銘并序蘇塊生家藏古琴一或謂雷氏所斲也生嗜琴尤切嘗告芒芴生曰予生也後道不能窺聖賢之域志無聞達之期其托跡於丘林者惟鼓太古之音與林風石泉相酬答若之何而非羲農間人也余雖非伯牙之善鼓也而子之善聽豈獨非子期之所謂高山流水者哉是宜爲我銘銘曰質潤而清兮以發吾鳴體圓而方兮以持吾莊恭默齋銘有序芒芴子短褐弊裘遊于鳳臺之顚客有笑而吿曰子學夫蒙莊氏者也其所知惟淵默之道乎其亦知夫吾儒之謂恭默也乎芒芴子避而趨客曰子何懼歟是果不願乎其外也耶吾王賢而愛士自胙土於安非道德仁義之說未嘗入乎耳存乎中也是以力學篤行而不怠揭恭默二字於坐隅蓋將以自警且遇子厚豈無一言以進之哉辭不獲因作而吿曰夫道之於物也雖天地之大萬彙之衆無古今之殊晝夜之異極其微妙窮其精粗盡其消長詘信通其徃來變化舉不違乎寸心之微可以配天地之至大萬有之至衆隂陽動靜循乎無始無端者雖萬殊之紛紜而實具乎一本而已耳操之要執之固則無存捨之失而融會乎天理本然之實也苟怠乎操弛乎執則人欲之蔽何狂瀾逸驥頃刻千里之不若也哉然操執之工其惟恭默之謂乎恭近於禮也允恭以成其德靖恭以守其位克恭以致其節是以禮盡乎恭而後安也默近於道也守之以愼默思之以恭默養之以淵黙而後極乎道之工也若默識默容黙契不假力而至矣雖然其亦必有以致乎其中也庶無過而不及者哉故行不過乎恭默不逮乎隱則其恭也盡乎禮之不可不恭其默也存乎心之不能不默也則其動靜語默皆主乎一矣非外欲之足汨吾中也設宜恭而失乎殆宜默而失乎操是不足以盡隱微之至也矣所以恭則無息默則無欲無息則一無欲則靜一則足以制紛靜則足以御動若是也雖極夫存心飬性以全己之天亦莫是過也其遊乎沖漠之初乎又豈雷聲之轟乎幽黙者獨何異哉今賢王之有國杜即知考德問業䖍恭愼靖孳孳焉以藩輔帝室爲心其問業之端厥有源委上際聖明在位友愛彌篤猗歟盛哉敢系以銘銘曰於昭上帝降哀在兹凡厥懿質斯具秉彝卓哉賢王允矣自持克一克存罔敢忽隳于莊于敬曰志緝熙既恭既黙曷或殆違穹齋言言令訓巍巍不邇華靡高眀是資守之勿斁執之足熹益佐藩屛益廣德基世際厥美皇眷赫曦茂翼千祀永昭鴻釐藏脩箴方寸之心宰乎一元所以配乾坤而同體爲三才而並立者曷由而具焉夫必曰理以爲之主極以爲之淵非理不立非極不全不立無以制諸内不全無以合諸天藏以自晦脩以自率庶不爲塗人而己其無昧於虚靈者孰愆是以靜一以固其本徤順以濬其源充之以仁義裕之以辭篇返而求己用則以兼善當世之責舍則以守吾之玄此之謂遁世而無悶居敬而守中古之學者孰越於是吾何敢怠於希賢雖然究老莊之道探周邵之言固吾之自礪而不偏惟斯言之確踐必日夕以拳拳古硯銘蘇塊生少嗜書藏古硯一紫質而白章或謂端溪歙者疑若是矣間請銘于石以示諸將來云銘曰質之澤因以靜爲德章之素因以默而固惟其容斯以書不窮養性齋銘虚靈湛然淵澄鑑淨毫髪溷漓狂瀾垢鏡秋宇涵空寒江月瑩孰持炁機靜而後定晦息齋銘萬有一源洞然至理操存以誠端本克己汩昏蔽妄念慮紛起動靜交養復斯敬止最哉士徒聖言是啓向晦而息惟仁吾體凛焉廣居愼求厥履莫月鼎眞人像贊心遊乎太初跡超乎空漠施之則彌六虚歛之不盈一握是乃佯狂乎麴糵亦或曠談於糟粕其餘事也可涓滴以寓靈即霆奔而川愕世孰睹其身外之身奚可得而描額瓢笠像贊猗余之生玄胄少趨學問之門長有圖史之癖謂其爲顯也則曷嘗祈纓衣組謂其非晦也乃已嘗枕流而漱石是豈不羈窮達之所移也必矣惟其脫落於世故凛乎若孤鶴之唳清霜問乎若澄淵之湛寒碧夫又孰庸其博聞强識之所寄抑將寓其高潔聊託簞瓢而自適者耶孔子問禮圖贊孔李殊途道本同源禮吾所履持敬克存天地經法商周典墳大音希聲余欲無言伯夷叔齊贊商弊周隆運移鼎逝道在彝倫確乎仁義曷存曷亡孰鑒孰眎言采其薇高風百世王重陽眞君像贊道著元興運移金墜樓觀終南蓮芳衍系虬龍之姿風霆之炁廓然天遊仙風奕世樂眞唐眞人像贊縱閉玄造光振眞宗肖形象外合景規中妙運風霆心見帝則宸眷赫曦湛然淵默希夷眞人像贊華山白雲惟意所適曠謝浮榮默守玄極至人無夢乃踵眞息控駕扶遥象存太易侍宸王眞君像贊宿資靈質道契眞傳囊括暘雨超乎象先光贊宸猷淵澤之會木葉遺傳啓我蒙昧雷淵黄眞人像贊博大之資清明之炁混融萬殊了徹無際玄經至道妙範微言俯仰今古見乎一元衍素勞眞人像贊江海之器山澤之臞發揮妙用莫測有無秋空林籟石室囊書洞視遐邈風霆卷舒貞白周先生像贊於維皇元顯達斯盛德義之容仁淳之令有大厥宗昭文斯永平湖靜淵氷雪齊勁潁濱蘇先生像贊雲日之姿芝蘭之炁忠肝萬言文采百世眉山蒼空潁水天際千載遺風肅瞻光霽耆山羽服像贊山林羽服江海清衿氷雪其操春陽乃心翔鶴扁舟飛鴻素琴匪象可圖寥寥大音九光丹室銘京口侯公勉氏學道馬跡山世傳太上嘗降焉遺馬跡而升居福地之一也性敦厚嗜岐黄書以求養生焉洪武初以選侍祠竹宫者有年法術亦著於時扁其所居曰九光丹室走書黄箬山中徵予銘銘曰乾坤爲樞闢虚室泰宇發光注金液神丹九芒兆無質火龍飛奔水虎逸坎離搆精凝太乙有夫峨冠珮鏘翐寳書垂輝耀星日風行雲馳駕軿軼峴泉集卷之五
