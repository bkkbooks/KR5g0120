front:
  text: 峴泉集卷之三轉三
  hash: sha256:883239ac57898c3769a0720b9e186bf60595ff990bdfc85dc114442c3d600dd1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_003-001a, image: hfl/1019/1019-084.png}
body:
  text: 耆山無為天師張宇初撰記蚊睫窩記吾里象山之麓綿亘數十里起伏百折隨其淺深遠近皆秀結氣融而幽室玄館必踞其會篠嶺最幽而甫近由嶺南行數十步至榆原茂林曲礀聲潺潺若環珮泉石幽僻而愈勝行不半里為朋山山之耆德士張如愚栖息所也以樂其勝與朋友共因以名焉洪武辛酉剃榛莽築草蘆數楹環堵一室左右竹樹交蔭礀鳴鏘然丁卯秋余與如愚登龍井象山還即其廬指而告曰此吾蚊睫窩也余少讀列禦寇書聞老商氏之道其言曰焦螟群飛而集於蚊睫栖宿去來蚊弗覺也螟至小而栖於蚊之睫蚊非大而可容况其睫乎吾少志瀛渤視湘海不啻坳水山嶽不啻犂土直欲遊乎無形達乎無隅栩栩而快蘧蘧而覺不知天壤間果何生何化而時其來順其去而己矣今已息我以老其放藪澤逃榛萊所樂也衣短褐茂菽菽庇蓬室視昔之志者大而玩物小其大者若此况其至微者歟吾居窩中不知其幾年矣忘形忘物不知有短褐之衣茂菽之味蓬室之覆但存乎一息之微亦不知其居蚊之睫也亦不知蚊之睫果能容乎果不能容也耶余諤然若不知所止與之徜徉樗櫟之下坐臃腫之栂執支離之疏而歎曰余聞之損一毫以利天下去一毛以濟一世士弗為也子非不以一毫利物舍國而隱者歟耕者物之以其利而有焉故不以一毫為小也矧損我一毫無益於世世亦何用於濟此非聃尹禹翟所以異而不為也乎蚊之睫以一毛微於肌膚螟栖而弗覺此其忘於一毫之容也尚何損益之纍亦無所用其覺耶然蛟之睫且望之不見聽之不聞惟心死形廢以神視以氣聽然後見之若崇山之阿聞之若雷霆之聲其能以一毫利天下濟一世乎始之不可聞不可見而卒無不聞無不見也其無形之與有迹之相去也豈不甚遠矣哉遂兩俱默然莫知其孰為湘海山嶽之大而蚊睫之小也亦不知卧於樗櫟之蔭也栩栩而蘧蘧亦忘其何所從來復何所止也返而命其弟子執簡書以為記靜復山房記吾山上清宫之洞玄院居宫之奧地僻而林水最幽東則象山巋嶷其支隆然特起院據其會西則瓊林臺鬱然前則雷壇丹井在焉其重屋奧室皆耕隱劉真人元盛時所建也其徒昊尚絅闢堂之奧室以靜曰復命之旨扁曰靜復山房一日請以記昔其祖張貴德氏職教幕間延登覽焉凡庭宇軒户皆佳山美林不知去纏會而幽僻者也天光四明幽趣互發信足以凝神淡寥日造乎道矣而尚絅居是也不寓於水木園池之好不洽於塵垢凡易之見而獨志乎靜復可謂善矣夫學必靜而能復復所以靜也止者動之君闔者闢之根易之復也動初之體隂剝而陽復道之復也靜極之真夫物藝藝各歸其根若冬之藏氣所以培若夜之息動所以寧物之復也人不能復乎靜也萬變汩其靈府旦暮作息之頃意慮交擾機欲紛鬥動者流闢者散矣其體天地之運行順隂陽之消長濳於寂感之前發於顯微之際惟能審夫動靜賔主之辨外物不能窒其虛外欲不能蔽其明則洞達融徹周子之謂無欲故靜也若循天地之盈虛齊萬物之生化流行不息推符候以乘其進退抱冥寂以絶其染奪然後若太虛之瑩而不翳止水之淨而不波此守靜之篤也然儒之謂誠之復也道之謂命之復也皆至幽至微而與天地參矣故非造天人一致之工未足盡事物本然之性也若飛跂行不能離乎靜轅趨軾憑不能舍乎動大而風霆之變江海之奔龍蛟之怪始寂而忽喧方往而倏返其來莫測其止無迹惟能養其至者所以備其神也乎抑余聞昊為撫之望族世以儒顯尚絅少穎秀質淳而氣清余近職以文史力從山中及江海高人異士究性命風霆之説其志篤於自修視古之超逸者其將輝揚先德有不惟吾之所謂也豈徒使人歆艷誇譽之為足哉且學之至養之素久則神發其和妙著其用視天壤猶一息六氣輪轍八荒庭除不知遊乎溟涬胚暉之初觀乎沖漠虛寥之表非動非靜而與天為徒是豈一室之足居我哉尚絅勉之因記其槩以俟焉妙靈觀記天下名山川古今真仙之名迹在在有焉而大江之東西猶為仙真窟宅晉許旌陽興於豫章以地靈而法闡既祛蛟孽遺五陵八佰地仙之讖嘗遊郡之建昌道過南豐州望軍峰之秀曰異日當産一地行仙也逮宋王侍宸以道著則其人矣按行實侍宸姓王氏名文卿字子道號沖和子世為撫之臨川人後徙居建昌之南豐今為縣神龜岡去縣五里而近大溪南環軍峯北峙支阜蜿蜒而氣集昔嘗産異龜地因以名母夢赤蛇蟠於庭紫雲覆上因躡其首蛇奮起化黑雲騰空而去覺而有娠生宋元祐癸酉二月五日也幼卓異不凡事親以孝聞嘗為詩告其父有方外志父殁辭母遠遊將度揚子江行野澤中雨暝失途微見若燈明前就之有一老嫗若為逆旅者得書數卷篝火燭之乃致雷電役鬼神之説因録之紙盡繼以木葉雨止天且明乃息大樹下也及渡江遇異人舟中神宇超逸遂前禮之叩其姓名答曰吾乃玉府火師也今治華陽洞天子既得法當佐君祐民以應玄徴他日俟子於神霄玉清之天復出絳囊祕文以授之竟失所在己而還軍峯密修大洞回風合景之道飛神玉京遇徽宗駕於帝所顧目之進曰臣昔為三天都史掌文吏陶伯威降世為王文卿乃臣也會上夢亦然召侍宸林靈素訊之對曰臣向所奏王文卿是也即詔求之時方以法驗名聞江湖間纍召莫可得聞遊高郵軍皇叔祖廉訪巡歷淮南且卧疾有請疾徐愈遂聞於朝詔真州守臣賈公望以禮聘之力辭不赴復詔道録董沖元同監司守臣厚禮之乃行時天子崇尚道教入見以肖前夢問對大稱旨拜玉府右極仙卿寵賚益厚每固辭不受時宫人疾詔劾崇禁中俄雷震擊白龜一上飮之酒拜大素大夫凝神殿校籍父肇贈承事郎母江氏贈宜人京師有狐為妖率祠祀之又黑鯉為妖奉詔劾之即築壇墠置鐵甕雷震狐狸皆磔死奏建司命府於壇上未幾乞還上命修鍊度齋於內廷若有現於前者上神之是年冬將有事於明堂雨命禱之立霽有詔奬諭拜金門羽客由校籍升侍宸賜號沖虛通妙先生加贈父曰承議郎母曰宜人準南北以無雪來奏上憂麥以命侍宸遂雪麥且熟賜金帛辭不受盜起山東徒黨號巨萬纍遣師不利上召見便殿以為言對曰請醮於內廷命神力助討他日獻捷者言交戰之頃天大雷雹賊乃潰上遂歸功侍宸轉沖虛大夫奬賞有差揚州守臣以旱告上以命侍宸對曰下民積罪凡川澤帝命悉禁惟黃河水可借三尺乃仗劒役之數日揚州奏得雨皆泥潦上悅侍宸知天運有變數以青犬之兆為奏請修政練兵不聽遂請歸時三十代天師虛靖先生林侍宸靈素劉宗師混康會于京侍宸嘗請於虛靖先生甲庚混合之道深奬語之復力請還上繪其像親為之贊會金虜犯京師欽宗受禪靖康元年賜還山將上道京師有於元夕為妖婦馮者來告亟與符遂愈暨還惟怡神山水間郡有妖怪皆頓息高宗都江南聞侍宸猶存纍徴弗起紹興二十三年癸酉八月二十三日為酒食召鄉里飲别命弟子視雲起西北俄雷震書頌而化既殮遂葬神龜岡舉棺甚輕蓋尸解云後或遇於龍虎川蜀其神化常莫測凡經籙科法祕奧之文傳於世嗣其法系者若上官氏而下靡不顯異侍宸殁數百載凡水旱疾癘禱之輒應是能福其一鄉而澤乎無窮者也元至順三年夏同知南豐州事蒲汝霖禱雨應上其事於朝時臨川道士唐樂真以法術承應內廷亦禱雨應復聞于朝加贈靈惠真君在元盛法犬闡由樂真發之也洪武二十三年庚午豫謁神龜岡時祠墓榛穢弗治遂命建昌之嗣法者章恢彥弘募官重搆葺之彥弘志惟謹余仲氏彥璣克贊其成以洪武甲戌某月某日始工而是年某月某日落成凡殿宇門廡像設之具皆畢備仍題曰妙靈觀舊址在城之南久益廢因更名是祠云其明年伐石請記其槩惟仙真靈化之迹所以相傳弗泯者蓋其至神與天地並行而不息焉侍宸之功行是也代祠於其鄉以昭其惠宜矣今幸易弊以新之孰知其神之不格降乎煙霞空漠之表歟異時一鄉之人將千百世蒙其靈貺神休之被又豈前之顯著而已哉主祠者必愼其操束善保其廢興以相承而弗墜也則其悠久尚何啻璿宫琳館之無窮期哉是不獲以蕪陋辭為之記正一玄壇題名記道書所載洞天三十有六福地七十有二而吾龍虎山居福地之一也山川雄秀風氣融會有非他山比者是以名聞天下為道門之洙泗東漢之季我祖天師以豐功神德親受太上之傳肇業伊始而子孫世繼之今凡千有餘載自宋崇寧間遷真仙觀為上清宫厥後莫盛於元而上世之傳以正月七月十月三元日建齋於宫以傳經籙願授持而有請禱者居其首焉凡其澤幽濟顯則隨所請而從於首者禱之此其代傳不息四方皈仰之衆愈久而愈著焉余不敏襲教以來上際熙朝聖神撫運凡故家臣室願有請者歲無虛或聯驅並進不期千里而同者有之是按前製為之建齋三日而其齊明盛服通誠天帝羽節霓旌星裾霞珮敷闡玄範於陟降之間恪盡寅敬務竭孝感若雨而月霽晦而日麗嚴烈而風和皎亢而露潤所謂祥鸞瑞鶴飛繞乎上下祥風慶雲升騰乎遠邇時若有之而形乎夢寐見乎薰蒿皆精神之所感其祥祉之集禬祈之感有兆焉是蓋由乎神而通之其冥合非可以法術徴測之也然而所藉者國朝之鴻禧祖宗之宏烈山川之神靈有以默符潛運而至是又豈余之行能足以致焉因恐其歲月之久姓名無所紀載日至迷墜是倣古官署題名之製刻石于亭其氏名歲月之先後用昭一代之盛典非欲矜己之私以取譽於後世也抑其默運玄機隂翊皇祚因以識之亦抑惟恐有弗逮焉間詢之故老曩嘗立石而後廢於兵燹逸不復舉矣亦甚有足慨者焉而四方之善士其睹夫是也尚必思夫吾名山之重天下在在聞之欲一叩而莫遂者有焉矧獲紀名於無窮也哉然其趨善之澤宣有以同躋乎不泯者焉福慶觀記吾道之謂洞天福地者皆據東南山水之竒勝故非人迹所宜栖息而必仙真之奧區也信之玉山又曰暉山蓋嘗産玉而有輝因以名焉舊之宫宇益廢黃谷山始於道會李顔則也洪武十五年壬戌皇上聿興玄教詔天下府州縣皆設司以隸從道者吾山佑聖院李顔則以法術稱於人有司檄至命趨闕授縣之道會以董治之所未宜十九年丙寅秋子入覲間指示之曰溪南之峰特秀整下宜居必往擇焉道會遂旋登之遇樵者因問諸樵曰此寅谷山昔謂大王峯也其地去縣二里許崇亢聳拔高可數十步山之半折徑而上有泉出石竇中布石為井曰氷壺徑左一石洞去洞數步有石若鑼鼓狀擊皆有聲石前近溪為大黃潭溪之濱曰功曹山山之下為龍洞唐相國閻公立本宅其東禪師貫休寺其西東嶽祠創寺之右即懷玉山也寺之北為三清山峯秀若筆立昊葛仙公玄暨德興李尚書某修鍊其間宋端明殿學士江澤亦居其下青鰲峯拱列其北二十年丁卯道會乃剪蕪芟穢中建三清殿後為法堂堂之東曰紫雲軒若廊廡庖庾皆畢備翳以杉松竹柏風磴雲簷迂回隱約軒之前下俯鄽邑闤闠近接衽席間而其平洲遠水竒巒秀巘皆層見疊出於雲煙出沒之際惟身與太空為鄰不知其有塵世信所謂仙真之境也余趨京還輒登而樂其成道會請以舊額合而命曰福慶觀觀乃宋侍郎韓公某創於鄉廢且久因復以名云玉山之東嶽祠也山水雄麗甲他郡由懷玉山之金砂玉龍洞為江東發水之源閩水逆出其東而風氣會焉故世稱其祠為泰山之二余嘗謁其下必低徊不能舍去而黃谷山近在目睫間其爽塏幽勝不亞外祠是豈非宇宙清淑之氣發而為山川也待其人而後興焉矧道會光際天朝優著非昔倫比其統隸乎一邑也必發揚吾道之玄德靈休上翊皇祚於億萬年則山谷相與無窮期也使吾徒涵詠乎鴻釐之間雖居閬風玄圃殆不是過也後之繼者亦必是志乎則黃谷之謂豈非吾老子谷神之旨也歟道會名顏則字自勗為鄱陽令族其秋還山狀其實請記因嘉山水之勝是不能無以紀之翠微觀記撫之翠微觀道士嚴與敬氏間持揭文安公所撰翠微觀記其修創之顚末謁余文余未遑執筆今春謁南豐侍宸王真君祠道過翠微其膏田沃壤溪山回揖皆層青疊翠蜿蜒十餘里而岡阜支麓起伏不已信風氣所會之佳處也按文安公記應真之山在旴汝之交是為金溪之南郡唐天寶元年有道士結廬其下扁曰谷林宋宣和元年賜額翠微觀元泰定二年住持周君應悌復撤而新之是為之述焉歲久弊陋元季已為榛莽之墟我朝建國之初金溪后車何氏以資力雄鄉里嘗延旴之南城延禧觀道士羅則銘住持延壽觀其徒則熊益謙嚴與敬也與敬於洪武六年請部牒度為道士七年禮部起充太常樂舞生未幾丁母憂還八年起服仍就樂舞員十二年以故得請賜還益謙則居青州藩府十七年道會疏延主翠微觀事二十二年則銘解化與敬厚葬之遂率徒黃用素李用光領延壽翠微二觀事凡殿堂廊廡多繕葺之三十年秋構亭山之顚松竹薈蔚額曰翠濤且得文安公記於里之李尹誠所抑符其增創之志因重有請焉余聞古之仙真靈迹率據山川之雄秀所謂地因人勝者信矣吾郡山水豐麗莫過旴撫而翠微始於唐而興於宋元豈非地勝而人傑也哉矧獲託不泯於當世知名之士有如文安公者可謂盛矣而與敬以俊敏之姿善鼓琴繪畫其興創改作必尤有侈於今日也則主觀事為得人矣余豈不樂道其成而記之其山川觀宇之規制已備前記兹不復贅義渡記南豐之為州今為旴之上縣山水崇秀人物繁夥而商帆賈舶常往還為市其道則上通南昌袁贛下達旴撫閩廣而義渡適當其要衝舟不可不設也溪去縣五里而近溪上重岡疊野引映若環帶北面軍峯之秀是為神龜岡也宋崇寧間侍宸王真君以道行之著受知徽廟晚瘞蛻其地而神龜之徴益名邑之賢良有鄒鐵璧者嘗受法于上官氏上官侍宸甥也已而復遇侍宸親授其奧而道亦顯時有知南豐州事王質嘗師事鐵璧及付受之頃忽雷震壇上鄒曰吾將度矣王驚喜遂傾資奉之鄒謝曰吾雲水徒也用此奚為王乃請以廣妙靈觀以祠事侍宸故舊觀在他里乃遷而新之以是凡旱潦疾疚者居民禱之必應懇謁者日至而渡猶病涉有不惟利趨之弗宜也是設舟於渡而亭其上因有以憩息之地焉元季兵興亭廢而舟亦毁洪武庚午春豫嘗謁真君祠時妙靈蕪穢弗治是命旴之嗣法章恢募力新之工既畢歲乙亥復新候仙之亭設舟以為義渡且施水田若干畝以贍舟師而備易舟之費其為悠遠之計亦至矣而惻隱病涉之仁具存矣數徴文以記之夫義者事之宜也舟之象渙以濟不通此聖人於物取象之宜也雖凡溪渚不通者皆得設而濟之矧南豐為之上縣而神龜乃仙真之遺迹流澤在焉使無商賈往還之劇舟故不可廢也今彥弘椎其慕道之心博於仁愛其亦功用之勤且篤矣尤將托之以義其為悠遠孰大焉蓋義之所在會衆志而一於久者也衆必持乎義以成彥弘克紹之志尚何廢興云哉然嗣其守者必公是心以愼其出納則雖久而勿墜必資弊者可集守失者可易豈不仁人之惠無窮也哉豈徒便於趨謁之一而己耳豫聞而樂其成也遂為之記詒善亭記吾山上清官之寮院凡三十有六其源同而支異故毁而復興者有先後焉至正辛卯宫災越數年延焰而毁者更新之紫微李仲冶作曠逸堂於丁巳冬己已歲復構亭堂之南友人周孟啓為額曰詒善仲冶揭扁於上請記於豫曰吾鼻祖都監洪公始得於浙之紫微閣因號曰微叟宋天聖間入道於吾山嘉祐間知上清觀事度弟子王太素等時徽廟崇道益篤太素嘗侍天師虛靖君領祠事於朝寵賚有加及易觀為宫賜田畝蠲賦稅築圜靖通菴成而院亦就因曰紫微者示不忘也派火益盛五傳為沖靖劉公道著孝光寧理間宫賴以顯重元戊戌壬戌院災者二隱居史公倡諸徒擬新之嘗以上世曠逸金公有光於院宜揭號於堂致存思焉言未就而殁未幾兵興先師汪伯清遷安山堂同草創故址間方如治命也而祖覺菴朱公嘗建玄潤齋以訓其後亭之建尤不忘金史二公慮迪之意亦將若覺菴之有所資焉故孟啓謂雖君之祖詒謀之善而君亦善繼之宜置其扁歟非賴一言以警勉吾後可乎亭成余聞而善之仲冶具告其志此受托於其先者之盛心能無言乎抑心為身之靈府善吾所固有其或欲蔽物奪而有弗善焉苟能克己自反制諸外無移其內則善固存矣雖然仲冶學吾道者其以禍福之戒之為善則與孔孟荀楊施之事為者異焉然發乎心而復反乎心理一也是必抗節勵行汲汲於自修則藴諸心而存諸躬者無不善焉則福不待希而集禍復何自而至哉然人人之宗祖期於將來拯於己廢者莫不欲善而福而後卒以不善而禍古今何紛紛也故凡為人後者視其先詒謀之善豈不甚可畏哉非愼持而敬守其可謂之能嗣乎矧仲冶敏厚而文於孟啓雅交厚是扁深有契夫望於其後也其必求諸實積深而培遠則不徒繼乃祖之訓亦以副孟啓之命於余言豈不重有勉焉是為記企雲樓記元運方興天地渾厖之氣鍾其餘於山川者一時鴻生碩士並起迭出黼黻皇猷以成一代之盛典而遺澤流芳不世而益永者何其偉歟旴為江西大郡山川之雄秀人士之宏雅風習之淳美他所不若也是時程文憲公以儒而登顯要光際纍朝文章德業之懿穹爵令望炫赫當世有若趙文敏公揭文安公胡僉事公皆一時以學行名者悉出公之門凡懷才抱藝紆朱曳紫之流多所薦拔者焉其言論文旨雄毅贍蔚具見于忠節晚以高年退老猶時錫存問宜其鴻聲峻耀垂之汗簡光昭於無窮也哉公之子若孫簪組蟬聯代官翰苑故以名家顯宦冠於旴焉曾孫彥錫生於燕暨長侍提舉公南還少穎敏有文蓄先世手澤具存以元季避兵遷嘉永因家焉得西南爽塏之地卜居之己而親老去旴猶數舍身不克侍養而興旦暮之思焉别搆重屋數楹日以企望之因額曰企雲蓋取夫狄梁公之義也軍峯峙其北神龜聳其南大江環於前崇麓負其後而麻姑芙蓉諸峯遠近映帶乃引流為池植木為林而亭其上若嘉禾之勝舉集於目睫間矣洪武丁丑春豫因謁侍宸王真君祠獲登其堂而故家餘俗藹然具存豫之祖妣而下世戚非一日矣然而姻舊凋落豈不重余之感且喜焉間延覽于斯樓也屬以記豫辱姻婭不獲辭夫人之營居室也率嘗娛山水之秀城郭之麗溺田疇之養植蓄之奉此特苟一身之資而己耳則托之得所用之有餘其志為足矣若斯樓也山煙水靄之出沒商帆賈舶之往來魚鳥之適花竹之玩皆足以悅乎心目發乎詠歌者也而彥錫眷眷不忘其親一舉目之頃猶侍親側可謂知孝之大倫而賢於庸衆人遠矣是猶見夫詩書之澤厥有庭訓其所企慕之切有不惟梁公之望矣哉且提舉公嘗迎養于兹其奉甘旨篤溫清必踰年而後還得不謂之盡孝矣乎暨公捐館且斯須不忘時有松楸之慨焉抑上世之休德嘉猷垂裕於無窮期也而彥錫之企慕亦將無窮也哉後之嗣人尚克厥承異日或復登斯樓其聲華之著殆不惟是而己哉是為記靈谷山隱真觀記洪之曰名山福地仙真靈迹之奧區者莫甲於旴撫而撫之竒勝必華蓋三真君居焉按傳記真君為秦人即古浮丘公也王郭其弟子焉往從之遊已而俱升真矣世謂三仙云靈谷山在撫之臨川三峰峭拔去郡邑三十里而近高峻雄峙冠於他山山頭東有古牛石南則漉酒泉西為石門關退心石瀑布泉北連文印峯山之半有南北二井水清洌不竭井傍立駐雲亭棋枰石靈鶴常集其下西南第二峯為謝靈運洗墨池盱江之水縈回於前西苦龍虎之塵湖琵琶雲林諸峯暨巴陵華著芙蓉軍山庥姑羊角諸山皆環峙互拱於目睫間其層見疊出一舉而皆仙都真境也宋大觀己且冬十月山人丘祜樵於山巘遇星冠霞服者三人奕於地遺祜以桃奕畢叱祜歸徐莫之見祜及家越三載矣祜復往奕所掘地得陶燈器三香爐一衆異之即纍為龕像三仙祀之疑奕者即三真君云正和丁酉道士易安寧始建觀其上請於朝賜額隱真凡民之旱潦疾疫禱之輒應元盛亦顯著纍毁於兵旋復修創我朝衆日益繁而舉廢為多觀之張大順氏洪武十五年壬戌授府之道紀葉良貴氏二十七年甲戌授山川壇署丞或謂皆山靈之隂有祜焉而皆以法術名間請記於余余方退偃林壑有高蹈遠引之志凡仙真靈異之迹豈不願遊而樂道之故不辭然豫嘗觀堪輿家之書凡山川風氣所會皆合乎天之星曜地之精英聚焉是故扶輿清淑之氣所鍾亦豈苟然哉若靈谷之勝雖相去不數舍聞而未即而三仙之靈休偉貺在在有之其著於是也宜必與山川之壯同其無窮期矣士産其間亦豈非宿修預植而然哉良貴溫賔夷靖知其必能大先業矣尚當挾冷風襭飛珮一覽其上或將有異遇焉乃記其槩以俟凝正齋記凝正齋者從兄用鼎名其燕居之室也其言曰昔元盛時我宗第宅之壯雄峙於閭里皆雕楹彩柱干霄麗日而東南莫之能擬也自燬於兵而向之穹廣者率為灰燼矣是構居故址之側丘園林麓環其中溪壑洲渚固其外其峯之卓然而秀者山回之地之偃然而紆者徑縈之雖接闤闠而幽深自宜吾於是樂夫古之人謂小隱者亦未絶乎巿朝也歟乃環吾居植以佳花美竹通以虛簷敞牖蔚然而翳蓁然而滋舉足以自娛適懷乃闢一室凝思怡神以致力乎道家縱閉之工因額曰凝正蓋有取夫易之鼎也吾曾大父三十七代天師希微公視先留公為之伯仲則某於豫宜親且密矣幸有以發之豫聞易以道隂陽聖人所以極開物成務微顯闡幽者深矣大矣是豈易言哉夫五行根乎太極也隂陽判而為一竒一耦而六十四卦由之以變易焉鼎居二隂二陽而兆體於臨遁次革而受震鼎之象吉亨以木火從飪而足以享祀上帝養賢也以柔進而得中宜致亨矣君子之所以正位凝命者觀鼎之象端以正位止以凝命則正其所居之位而凝重其明命也必矣若初之顚趾三之取革四之折足皆能無咎終吉蓋知愼所之也其二之有實五之黃耳六之玉鉉以剛柔節而無不利矣豈非命凝位正而獲吉若是哉是故天之明命自降衷而具夫人可不克修以致夫吉亨之道乎奈之何悖而趨乎凶者衆矣抑易之道有以見天地之至頤非惟鼎然哉六十四卦吉凶進退靡不然也是以聖賢必正心而後意誠正德而後道凝道既凝矣其所以參天地贊化育成變化而行鬼神也者亦未始與吾道異焉從兄嘗以文學見稱而猶篤於致雨暘劾鬼物之説求之於雷風相薄水火不相射鼓以雷霆潤以風雨剛柔相摩八卦相蕩之機尚必資於易以充乎道也則其探幽致遠以盡乎窮神知化之工將學益深而德益茂使豫之慨乎族姓凋落者宣必有以振大之抑余之志乎退藏於密者久矣尚當洗心以聽餘論或有以啓之是記其言以俟桃溪丹室記凡山水之雄秀名天下者莫昊若也其地廣人繁最名者錢塘姑蘇江右則會稽上虞豫嘗愧不能遍探力覽以盡其勝而昔幸托知於時彥或從而詢訪江湖之故迹閭閻之餘俗文物之遺風猶足以少慰凋落之感相去不十餘載舊交殆盡豫亦退卧山谷志與世遺間涉乎經行目歷之地惟歔欷慨慕而已此亦古今代謝人情所寓之常也乎蘇之昊江有桃溪焉去太湖三十里而近東西洞庭二山不數十步聯屬其上大河繞其前四面膏田沃壤南連沈漲湖東通驛河西接苕溪而桃溪縈帶左右長堤小蕩僅通舠艇而入昊氏世家溪上凡上世隴兆具據其會丹室則文剛氏所創也嘗以記請於豫曰世為汴人鼻祖諱充宋神宗朝入相其下數世皆顯宦六世祖諱思賢以護駕高宗至臨安蒙錫田宅於蘇之松陵因占籍焉以是簪組代著而文剛雅不樂世味自髫稚慕道篤學嘗棄生業留志雷法針砭之術窮探博究束書千萬言猶孜孜參問不怠乃别居溪潯之幽日與清湍修竹竒峯遠渚為之寶友可謂超逸絶塵者也夫士之窮達或出或處惟義之從初未嘗容心於其間哉然而存心養性之地必山幽木腴則穹崖谷茂若林麓坘島垤伏汀渚回合是乃崇其居環其室而栖焉則户庭之間檻牖之外有泉縈焉有池湛焉有卉蓁焉若山之高溪之深皆爭妍獻伎於目睫之頃是乃心融神釋內虛而外暢足以潛心進道於寂寥間曠之濱其視轇轕塵垢汩溺紛華者為何如也雖然文剛生貴富間一旦能捨妄返真棄末求本抑亦賢於流輩遠矣獨未知其曰丹室者果神氣之變化風霆之鼓蕩水火之運行而亦金石雲霞之謂也耶然其得乎溪山之適心虛慮澄發而為法養而為丹何莫由斯道也他日浙水之西能以符藥已人之疾疚者大其功用非文剛而誰哉因其志之足嘉也是書以俟充其未逮者歟歸明軒記凡士之處顯晦榮悴其窮達常相代也此古今之必然其少也血氣之剛心志之鋭凡耳目之嗜好事物之酬措櫛比綺錯於前莫非聲色勢利之競情慮交擾旦夕無須臾之息其能少寧乎中哉及夫血氣之定心志之一其視向之膠擾乎耳目事物者如脫氛垢去桎桔所謂聲色勢利競乎情慮之間者雖燕趙之麗鄭衛之音綺穀藻繡之華旌旄車馬之盛舉不足以動其心則拳拳乎反身修己是務直欲絶氛華并峻鋭懲忿欲而日趨乎高眀正大之域其有不造乎充實光輝者歟雖然求能一旦捨舊習故染而思志乎是者亦甚鮮其終身溺而忘返者衆矣饒之安仁箬嶺張氏為邑之著姓其先皆以儒登仕籍思禮之曾大父伯遠元以能詩與黃公均瑞張氏仲舉並名當時大父子東嘗從遊趙文敏公善真行書父叔達值元季兵興以驍勇授職千户叔達以老辭家子某襲未幾不祿姪某繼不踰年升廣東指揮遂家于番之雙溪日有林麓魚鳥之樂詩酒足以自娛若忘乎富貴榮達者也雙溪據湖山之勝湖水周環數里丘樊墟浦挹其涯沍島洲渚抱其中其山之巋然而秀者湖泛之岸之穹然而高者水帶之浦之窈然而深者阜縈之若夫煙雲起滅鳧鶩浮沈與波光雲影上下隱顯朝夕姿態舉集於几席間堂既成乃蔭以松筠蘭竹被以菱茭葭葦雜以魚蝦鴈鶩望之蔚然而幽就之邈然而邃凡遊觀藏息之美悉專於是矣思禮乃闢一室以篤慕吾老莊氏之言日致力於虛極靜篤之工今夏過吾里與之道宿昔敘契闊間請額其軒豫告之曰吾老子之言曰用其光復歸其明子嘗從問乎縱閉之説夫以簪組之裔撫事有道是用其光也而能探乎操存之要是能歸其明也斯足以額之夫老子之謂知子守母塞兊閉門者道為萬物母也得其母是子萬物也故知其子復守其母即返其本還其源也能返其本還其源必致塞兊閉門之工焉則終其身而不殆矣苟開其兊濟其事不知返求其母則危而不救矣是以其所見者大小而盡其微豈不明哉所守者剛柔而去其鋭豈不強哉以其能見小守柔是以善用其光也故善用其光則必復歸其明用而不知歸乃遺身之殃矣此所以歸其明則造夫天地之始矣抑亦一隂一陽為之闔闢動靜往來周流不息內而守之曰道外而施之曰法何莫非斯也尚何縱閉雨暘祛劾鬼物云乎哉其有見乎是者必重內而輕外一毫不足以纍其中矣矧思禮生豪右之門長奢靡之日能無浮侈驕逸之習乃知求乎返還之道也可謂賢於流俗遠矣斯軒也湖山之幽勝若有待焉而嘉子之志知樂夫靜逸也歟思禮勉之他日或道過湖上尚當相從於煙波雲水間叩其所願講者未知滄浪釣徒能與語是否乎新城縣金船峯甘露雷壇記江右真仙靈迹之勝莫著於盱若南城之麻姑仙壇南豐之神龜岡新城則金船峯甘露雷壇居其一也峯高踰百仞蜿蜒支阜數十里許去縣十里而近日峯峭其前香山挹其後峯之顚為三濟禪師壇元至正甲申有為白蓮師者虞覺海聞閩之杉關戴某延武夷山月間汪真人禜禬有竒驗遂迎居焉真人姓汪氏諱道一字朝道世為信之龍虎人父文富真人生有異徴暨長超悟不羈丙子秋武當山張真人守清來遊龍虎嘗旅文富家一見異之謂曰是兒非庸質幸侍我後當為令器遂挾入武當守清授以金丹雷霆祕訣一語有省復往武夷禮蓬頭金公野菴卒其業元季兵興閩多疾疫光澤杉關為甚戴某黃某聞其賢首致之皆驗一日登高歎曰盱之新城山水差秀麗吾當往焉未幾覺海果延居之所治輒神邑大姓若范張王劉者皆禮之於家以是凡雨暘疾魁叩之皆驗一歲三月不雨士民遍禱弗應縣苗侯命釋道禱復不應時達魯花赤貼木赤獨延真人禱于靈山寺真人穴地而坐煙松葉為雲須臾雨大注士民爭迎之間乘竹輿從數十童歌呼而行雨隨至禱畢即火磚撫身自謂假以補真陽云縣北石硤龍潭深淨莫測一日褰衣躍入竟日乃出衣不濡袂或問故語皆神誕厥後言輒隱異人莫之悟逮辛卯民罹兵燹言皆驗或復叩之默不復語壬辰兵愈覺海延真人居三際壇登山右低佪久之見山勢竒絶曰此勝地也宜居之因藉茅栖焉其徒陳覺堅復欲慕衆充大之真人笑曰焉用是為異日自有成者是豈久耶翌日果災隨復新之山素不泉或請之曰但居無憂也一日酒酣踞山隂巨石注酒其下曰是當出甘泉也旋命工起石泉奮出且甘洌雖旱弗竭因題曰甘露雷壇云已而或數日不食或一日輒纍食人莫能測癸巳二月久不食惟飲荆汁數斗仍火磚撫身起謝衆曰吾從此逝矣乃端坐而化二月二十有六日也世壽五十有三衆瘞于山側其徒廬濟川居焉逮我朝洪武癸丑秋盱江李大顚同邑人黃德繼哀略庀村度工創正殿兩廡未畢工邑人裘可大慕瓦石完之大顚從子道弘克紹先志禮表為師力修飾之甲子建飛天法輪於堂後凡殿廡像設皆邑人江興翁李黃琛成之且甃路百丈以便往來復置水田若干畝以給衆戊午秋衆起藏塑飾事之像儼若生今年秋道弘走謁余文將伐石刻之余嘗聞於閩人曰真人居武夷時民有女疾瘵叩之諾命闢密室抵足卧塌上女號甚踰頃蟲出於口疾隨愈時有邪所馮亦叩之召健兒數十人以椎交擊真人欣笑若常馮者旋愈其怪誕神縱多若此惜未能盡述也豫讀馬湘傳觀湘狡猾竒誕若投深淵踰日乃出自謂項羽召飮而酒氣猶逐人未之盡信今觀真人靈悟曠邁之迹不異於湘始知其言之不誣也嗚呼吾道之士一志於超脫幻化必外形骸絶氛垢其視埃榼紛華若蟻羶蚋腐乃一切屏斥卓然高舉遠引而遊乎物初是以飮寒顚困不足動其中日與太虛溟涬為徒所適者惟惚恍寥廓而無一髮之可拘也故乃雲馭風行而乘天地之正御六氣之辨而超乎無窮與後天而終者其亦灝氣之專而然歟其真人之謂乎宜其委形苦蟬蛻初不繫乎迹之存亡也兹雷壇之建葺飾彌備豈不使真人若遊神閬風玄圃間而或來歸哉此余聞而樂道之後之人尚克謹其承使悠遠弗墜乃經始者之志焉崇仁縣玉清景雲觀記撫之崇仁以山水穹秀道家所謂洞天福地者多居焉凡邑里皆浮丘王郭三真君顯化之地不啻數十區輒據風氣之會而獲悠永者也景雲觀居縣之西不數里而近巳山屹其前浮黎峰聳其後由峰之隴蜿蜒數十步觀建其支也其南則澄溪激湍北則方池涵碧平衍虛曠林木四翳雖居闤闠猶處山林之幽寂也觀創于唐景雲間因以是名既成額未之書忽一道士夜至篝燈大書而去筆光煥動急追之顧曰吾簫子雲也其識之因珍飾以為門扁後危太傅全諷為州將奪置黃田寨乃逸去蓋以子雲嘗為梁黃門侍郎以善書名後於玉笥山仙去而異焉舊懸大鍾一夕遁去漁者或覩溪潭間取竟弗起後鳴者開元二十七年物也殿設大爐上題旌陽許真君名相傳皆以為異云昔之穹簷廣宇自黃巢之變迄於灰燼顯德間彭城劉元載尹兹邑乃延道士蔣道玄闢而新之道玄善科典祈禬乃復振焉遂謁前進士樂史記之皆開寶九年江南李氏未附時作也暨宋復興逮元道士黃養素力新之未仍舊觀其徒傅自成克相繼之洪武初以樂舞貟召赴闕居祠宫者三十年辛己春始獲請老還復新其未備者授教檄某法師采遺文以記來請豫嘗謁三真君兩過其地今年秋復叩焉則刪剃榛莽建立殿廡曩之狐免霜露之墟一旦豁然高出煙霞之表是亦靈蹤竒迹晦於昔而著於今也殆亦有定在矣其非自成才能幹濟將亦終為荆棘埃壤也矣尚能使山之秀者益明水之麗者益瑩草木之蕪蔽者益挺拔矣乎矧自成嘗受法於仙官傅公同虛究靈寶雷霆之奧猶以道術稱焉則他日之纘承先業者能不失其所託矣後之人尚必是志焉則其悠遠弗墜也必矣又孰知其虛寥冥漠之際不有若浮丘公者襭飛珮御冷風自華蓋己相之山飄然而來下也而其玄休靈貺其有涯哉可無以紀之也歟是次其實以記稽古齋記聖人於易則曰探賾索隱鈎深致遠以其精微幽妙也於書則曰稽古師古學古以其危微精一也皆所以致力於學焉聖賢相授其曰博學切問愼思明辨蓋非稽諸古以盡其幽微藴奧豈足謂之學哉是雖孔子之聖猶曰祖述憲章而於夏殷之禮為不足徴也當是時也典籍散亡而况下逮秦焰之餘也乎故六經火於秦後多漢儒穿鑿附會失聖人之遺意者多矣其非稽探考索之能至哉豫從子懋孚穎敏嗜學間請鄉先生楊孟頊額其讀書之齋曰稽古謁一言記之豫雖志乎古其能以己之不逮而淑諸人乎然豫聞羲農而下二帝三王為世至古為道至尊稽諸開闢之先鴻荒溟涬遂古之初六合之外不可得而盡知也自結繩書契以來墳典而下鳥迹蟲書孔孟之所迷惟黃帝堯舜始太史所録其稽諸載籍未之先焉奈何世之嗜古厭常之士鮮知求夫堯舜禹湯文武周孔之謂道也徒知寶夫三代秦漢之器若神農之耒耜黃帝之裳衣兊之戈和之弓垂之矢軒轅之鼎陶唐之鬲有虞之敦夏后之璜殷之爵武丁之卣伯乙之罍楚姬之寶盤仲之詰義母之匜崇磬離釜渦盤孔鼎桓碑罘刻岐陽之鼓鄒嶧之碣均所謂至古者也人得其一則緘縢庋置扃鐍祕藏若有神護而不敢忽極其嗜好者且求之故家大宅山崖墟莽仙蹤鬼塜竭其才力而取之不倦將以怪竒偉麗有足誇一世之雄而然也故雖湮倫磨滅破壞之餘愈弊而愈貴之也亦宜惜不能以是心求諸六經皆上古取賢為道之要得之弗遠搆之弗艱返身而誠皆吾固有也古之賢哲是以孳孳屹屹不遑朝夕含英茹華研精育粹於訓詁辭章史氏之未苦鬻侣楊墨荀楊管晏莊列申韓騶愼之述屈宋班馬董賈商孫燕丹淮南之言靡不搜羅纂拾攟拾離合該博參互以充其識博其趣焉庶將有以極其探索考輯之工也雖然而其汗漫浩漠雖皓首不能窮者有焉夫聖賢之謂開物成務也者將以彌綸天地之道輔相萬物之宜凡形諸六藝大而參贊化育立民命建人和皆由得諸心而措諸躬也必求濓洛關閩之緒非徒事編簡惟操秉翰於占畢之末以爭妍取憐於雕繪剽竊之謂足也則不徒志稽古乎哉抑余家上膺祖澤世載厥美某知求乎古而不流乎貴富之習驕逸之趨則其度越庸衆人之歸也必矣尚必旁搜遠紹涵泳膏腴浸漬穠馥然後明體適用真知力行以觀厥成也則其所造詣又豈讓桓榮專美於前哉此豫之望於將來也惜齒髮向暮日就荒落因嘉其知所趨也姑以是勉其進焉建昌府武當行宫記旴為江右郡治之首稱且多名山川若麻姑之著於唐王侍宸丘河南之名于宋皆他所莫倫擬其亦仙真之奧區也歟武當行宫在府之南去百步而近始南唐升平間以隂陽家拘忌或謂不利午水之衝因以祀玄天上帝而鎮之且傳帝嘗降武當太和山示創於旴若有默符云己而有司請于朝賜今額逮宋咸淳五年安撫使西郢程公飛卿命郡之延禧觀道士宋養浩主祠祀而李沖虛繼之己而宋杜既屋廢興亦靡常元至正元年辛巳翰林程文獻公巨夫有聲于朝宫賴以振豫叔母公之四世孫也施水田若干畝以祀其先大夫敬甫公而衆藉以安我朝高帝有海宇凡郡治釋老之宫總轄者咸新之時嗣領者則張太古危本初危大有利洞玄皆以行能稱於人洪武九年大有懼其創始之艱泯而弗舉命其徒王思微具顚末請文刻諸石思微善科典禜禬克志葺治凡像設法器靡不繕飾之增贍水田若干豫少遊旴嘗即其地雖處闤闠而爽塏可栖息故仙真顯著之久其亦宜矣然旴之繁麗嘗甲於江右自宋元之更纍冒兵燹雖昔所謂大姓巨室掬為灰燼者有之其亦造物者消長盈虛之常理也而宫乃巋然獨存廢興相續則上帝靈庥神貺信有自也若叔母昭祀之孝其不有所感而至焉今兹增益之備猶先志也後之繼者守而勿墜時能格神明闢氛滓以貯其陟降則儼然雲旌霞旆凌厲乎埃榼之表霄漢之間若旴之人必皆蒙其休矣則其宏久之規又豈亞於麻姑諸峯也哉峴泉集卷之三
