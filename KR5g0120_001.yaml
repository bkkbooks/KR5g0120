body:
  text: 耆山無為天師張宇初撰雜著沖道至虛之中坱圠無垠而萬有實之實居於虛之中寥漠無際一氣虛之非虛則物不能變化周流若無所容以神其機而實者有詘信聚散存焉非實則氣之絪緼闔闢若無所馮以藏其用而虛者有升降消長繫焉夫天地之大以太虛為體而萬物生生化化於兩間而不息者一隂一陽動靜往來而己矣凡寒暑之變晝夜之殊天之運而不息者昭而日星威而雷霆潤而風雨霜露地之運而不息者峙而山嶽流而江海蕃而草木鳥獸若洪纖高下之衆肖翹蠕動之微一皆囿於至虛之中而不可測其幽微神妙者所謂道也理也非道之大理之精其能宰乎至神至妙之機也乎是所以範圍天地發育萬物以盡夫參贊之道者焉故知道者不觀於物而觀乎心也蓋心統性情而理具於心氣囿於形皆天命流行而賦焉曰虛靈曰太極曰中曰一皆心之本然也是曰心為太極也物物皆具是性焉凡物之形色紛錯音聲鏗戛皆有無混融之不齊而品物流行者特氣之糟粕煨燼也人與萬物同居於虛者也然以方寸之微而能充乎宇宙之大萬物之衆與天地並行而不違者心虛則萬有皆備於是矣何喜怒欣戚哀樂得喪足以窒吾之虛塞吾之通哉庶乎虛則其用不勤矣吾老子曰道沖而用之或不盈淵乎似萬物之宗沖猶虛也莊子曰惟道集虛列子曰虛也得其居矣惟虛足以容也道集則神凝神凝則氣化氣化則與太虛同體天地同流而二氣五行周流六虛往來不息者俶優交馳同其用矣苟虛心淨慮守之以一則中虛而不盈外徹而不溷若淵之深若鑑之瑩則吾固有之性與天德同符豈不為萬物之宗哉是故養其體也去芬華忘物我絶氛垢以盡致虛守靜之工則復命歸根也深根固蒂也滌除玄覽也抱一守中也則谷神長存思淨欲寡虛極靜篤復歸無極則虛寂明通物不吾役而物吾役矣充其用也墮肢體黜聰明以本為精以物為粗以深為根以約為紀則未有以見夫天地之先氣形質之始曰太初太始太素者混沌之昆侖也及判清濁分精出耀布度物施生精曰三光曜曰五行行生情情生汁中汁中生神明神明生道德道德生文章陽不動無以生其教隂不靜無以成其化以之治國以之愛民託於天下而天下清靜而正也是皆以清靜無為為宗以謙約不爭為本其所謂內聖外王之道也歟然塞乎無形無極之間者皆天道之用乎是有相蕩相生相傾相形相倚相伏之不可齊不可測也其神之無方易之無體者乎而天地之機事物之數可以前知可以祕藏由虛則靈而神運其中發其知也雖有萬變萬化由斯出焉惟以誠事天以和養生以慈利物則上天之載感通無間矣非有甚高難行之事非常可喜之論也尚何譎誕神怪之謂也哉特沖氣以和順物自然而已矣昔之用而驗者廣成之授軒轅曹參之舍蓋公黃石之訓留侯漢以清靜而治是也或謂竊是以濟其術而自利不知有害夫義也殆亦過歟而史稱黃老刑名處士橫議雖雜老莊於管晏以申韓田愼騶孫商吕朝淳尸吁之徒出於是焉流而為蘇張甘蔡縱橫之術因以其為害慘矣固不惟以虛無寂滅病之蓋由魏晉劉阮王何高談妄肆倫理顛喪而韓愈氏謂甚於楊墨而以老莊亡者也奈何學之之徒溺於偏而失於放卒所以致傾敗之患亦宜幾何其不取世之抵排訾斥也哉殆有甚於刑名橫議者矣雖然必審之精求之約也然後知老莊之道大且博焉噫道一也微妙玄通之體神應幾微之妙豈岐而二哉且窈冥有精惚恍有象吾中黃之扃內虛外融暢於四體合乎百靈則五氣凝布而與天地健順之德合矣乎其要也一其性養其氣遊乎萬物之所始終而得夫純氣之守焉耳矣抑司馬公曰萬物皆祖於虛生於氣氣以成體體以受性性以辨名名以立行行以俟命故虛者物之府也彼之謂虛也虛之焉行始於五行一六置後二七置前三八置左四九置右通以五十五行所謂虛以惟玄也是亦術數之一端歟惟虛其中則窮神知化原始返終之道得矣若夫制鍊形魄排空御氣乘天地之正御六氣之辨神遊八極後天而終以盡返復無窮之世變而遊心於淡合氣於漠以超乎胚腪馮翼之初溟涬鴻濛之表洞視萬古猶一息也死生猶旦暮也若蟬之蛻若息之吹前乎天地之始後乎天地之終皆吾虛之運乎又豈徇生執有物而不化者比焉苟徒竊名徼譽於時其蔽於詖陷於淫孳孳汲汲與塵垢粃粳者殆何異焉其亦尸名盜誇之徒也嗚呼知致虛則明明則淨淨則通通則神神則不疾而速不行而至無不應無不達矣否是則豈善學吾老氏哉其可與語至虛也乎愼本學必有本焉經世出世之謂也故學非所當務則不足志矣其所當務者經世之學則聖賢之道焉聖賢之道者何道德性命仁義之謂也三代之始道在唐虞後之言道者必曰是焉蓋道明者三皇德著者五帝法備者三王以堯舜禹湯文武之為君盡君道也臯陶伊傅周召之為臣盡臣道也孔子顔曾思孟之為師盡師道也千萬世之所法者未之有改也聖賢遠矣而其道具在者六經焉夫易以著隂陽推造化之變通也詩以道性情别風雅之正變也書以紀政事序號令之因革也春秋以示賞罰明尊王抑霸之統也禮以謹節文明上下等役之分也樂以致氣運達天地之和也凡聖賢傳心授道之要於是乎具蔑有加矣然六經之精微幽妙悉具夫吾心昭晰明著何莫由夫是哉自堯舜相傳惟曰執中持敬宅心而已耳孔子之謂仁子思之謂誠大學之謂敬孟子之謂心中庸之謂中其歸一也能造乎天人一致之工則致中和存誠明窮事物之理盡人物之性然後位天地育萬物裁成天地之道輔相天地之宜是以智周乎萬物而道濟乎天下也此君子之道本諸身徴諸庶民考諸三王建諸天地質諸鬼神百世以俟聖人而不惑大而為天地立極生民立命維持綱常扶持世教孳孳焉矻炮焉守之為大經行之為大法明則有禮樂幽則有鬼神故不可一日而廢焉須臾而離也必致戒謹恐懼之工於愼獨之頃操舍之際而後體立而用行矣始則止而後定定而後靜靜而後安安而後慮慮而後得久則曲能有誠誠則形形則著著則明明則動動則變變則化莫不得諸己者其惟盡性致命矣乎居仁由義矣乎斂之則退藏於密施之則小而為天下國家用大而用天下國家者也下建荀楊董韓周程邵張朱吕之言皆所以載道足以羽翼夫經者歟左氏屈賈班馬李柳歐蘇曾王之文皆屬辭言道而作非載夫道雖工無取焉是故藴之為德行發而為文章皆得夫道之正也抑自秦漢以下有記誦之學詞章之學智術之學於是有别焉舉無以逮夫聖賢之學也其立言將以澤萬世垂不泯也窮天地之大不知其至焉合隂陽之和不知其信焉極鬼神之幽不知其祕焉又豈徒藻繪雕琢剽獵緣飾以驚世衒俗之為足哉苟不求夫真知實踐則何出處語默惟義之從哉此孔孟間關列國將以行其道焉道不行則退而獨善以全其進退於用舍之間而己矣故高舉遠引之士將欲超脫幻化凌厲氛垢必求夫出世之道焉則吾老莊之謂是也老子始為周柱下史已而遷藏室史其著道德上下篇所謂內聖外王之道也其同老子者鬻子之授文王關尹之為令亢倉之居畏壘莊子之居漆園列子之居鄭圃猶巢由之高夷齊之潔商皓之隱皆持節不屈其視名者實之賔乃寧處污瀆而恥為文犧也日抱甕荷篠以自得誠貴富貧賤欣戚得喪一毫不足纍其中焉斯其一志心齋以得乎環中而應無窮也乎是能官天地府萬物以天地為大爐造化為大冶宇宙不足喻其廣風霆不足喻其神江海不足喻其深山嶽不足喻其高鬼神不足喻其幽乃蹩為仁踶跂為義澶漫為樂摘僻為禮以一死生齊物我違窮達獨立特行而不改者也由是三才以之一也萬物以之齊也物理以之制也形器以之寓也治天下猶土苴也無為也則用天下而有餘有為也則為天下用而不足者焉故以生為附贅縣疣死為決疣潰癰外生外物而同於無欲者耶則固多寓言雄論放誕不羈而宏且博焉然而靜則聖動則王靜而與隂同德動而與陽同波其動也天其靜也地則命物之化而守其宗凡囿乎形氣之內者一不能介其中馽其外也同乎天和合乎天樂休以天均和以天倪而委順萬化獨遊乎天也是其天守全乎非體盡無窮而遊無朕與天為徒而能若是哉其視膠轕攖寧於軒輊之途聲利之域亦復何預焉是非矜偽以惑世軻行以迷衆欲為矯傲怪誕之資也其道固若是乎後之學者不求道德之歸性命之本而欲以卑陋謬妄之習而將窺夫太初混芒之始吾見其不可得矣矧有聞者食藜藿栖蓬翟戚其容薄其養飢餓其體膚壞爛其裳衣使人視之殆有不堪者焉所居也樵牧鹿豕所樂也煙霞魚鳥其心固若死灰形固若稿木其自處也高其自視也遠其自待也重豈外物紛華毫髮之可動哉是雖結駟懷金不能至焉苟強至之倏忽去來不礙其迹不滯其形道合則留道離則去惟安其素有者焉又豈華美之奉雕繪之居權勢之位足以羈馽縻束之哉此所謂高世之士也其接輿荷篠之徒也歟或假是要世者則不然其退也妄其進也鋭是將吊名幸譽於時一旦起於草萊之間欻然遭遇即移所守淫所習華其服甘其食驕其氣誇其辭充斥其騶御侈美其居處所與遊也穹赫顯貴左右奔走趍為儔侣睢盻單咺更相號於衆曰彼道也德也學之精也術之神也孰得而不尊且大焉求其所以奔走競逐者勢也利也尚何道德之云哉噫假名以飾實者若之何不取世之抵排攘斥也耶是欲欺世悅時而作也孰知縱駭一時之惑卒無辨之者其能信夫天下後世哉此固有道者所不為也吾懼夫頽風陋俗流而不返挽而不止日益滋熾皆不知愼夫本而然也抑亦君子之於出處語默一失於義乖於道何謬且戾之甚乎可不愼歟知愼所本則會道於一矣捨是則吾未知其謂學也已矣玄問或問曰道家者流其謂玄者何也曰玄天也即道之大原出於天也曰其亦始乎老子玄之又玄之謂乎曰然吾聞諸史氏曰道家者流使人精神專一動合無形淡足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多至於大道之要去健羡黜聰眀釋此而任術則無所取焉又曰道家無為而無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先後能為萬物主此太史氏之先黃老而後六經者也老子生周末嘗為柱下史周衰述上下經而隱其徒則關尹亢倉莊列是也其言一本於修道德全性命而已內而修之抱一守中所以全生也外而施之不爭無為所以利物也惟處乎大順動合自然愼內間外而純粹不雜靜一不變淡然無極動以天行乃合乎天德者也雖用於世以慈儉謙約為用不過固守退藏不為物忤一返乎虛無平易清靜無為柔弱素朴是以天下之物本以謙則無纍含以虛則無礙行以易則無難變以權則無窒使民自化自朴自正焉耳矣蓋將全物之本然而復乎一初也乎故不拘乎仁義忠信政教俗化之絲紛棋布也非以是為不可周於世也矧周衰俗薄亦將拯弊救危以還乎純古者焉其採儒墨之善也孔子嘗問禮焉其言曰聰明深察而近於死者好譏議人者也博辨閎遠而危其身好發人之惡者也此孔子之謂博古知今而聞諸老聃云楊子之兼愛遇老子而舍者爭席墨子之尚同明鬼殆若類焉而莊列之書且雜其説名家者則治國用兵尚賢愛民近之縱衡家者則翕張強弱與奪似之而傳世之久為道之宗莫過精神專一淡足萬物去健羡黜聰明為要是以虛無為本也若無欲而朴不言而信其挫鋭解紛和光同塵後其身而先焉外其身而存焉故曲全枉直知盈守窪知新守弊則明而若昧進而若退辨而若訥巧而若拙直而若屈不割其方不穢其廉雖直而不肆雖光而不耀以全其用也若其操以誠行以簡待以恕應以默蓋以事物為粗迹以空虛為妙用故儒以其寓言放説皆荒唐繆悠之辭不切於世用雖然抑亦不出乎通三才之理序萬物之性違死生之常外事物之迹而為言也固有以見夫六合之外天地之先斂萬有於一息散一息於萬有者歟是曰凝寂曰邃深曰澄徹曰空同曰晦冥信所以渾乎洋乎遊太初乎且天地之運輕清上浮者積氣也重濁下沈者積塊也周流六虛往來無窮而詘伸消長剛柔進退通乎晝夜代乎四時其風霆流形庶品露生自生自化自形自色自消自息萬物相渾侖而未離其氣形質具皆天地含精而化生是故常生常化之不己其晦明禪續無一息之異也所以外天地遺萬物庶出乎理氣之囿而造化無極無朕之先非聲臭之可測象數之可求也溟涬芒昧超乎萬物而為萬物根本豈不至玄至微也哉楊雄之謂玄也以數準易設方州部家踦嬴之用其亦曆蓍之一端歟非吾所謂玄也史遷曰世之學老子者則絀儒學儒學亦絀老子亦何互相譏議之甚哉然而虛玄之長也後之宗之者舛誕偏繆而至也豈皆老莊之失使然哉善學者故必求夫虛無之本也是之謂玄或問子之言玄也若本諸實而經籍之謂皆先天地而卑宇宙陋霸夷而尊王道其所貴者返求諸身修己以厚生超形以遺幻然後神化莫測後天而終與夫老莊之言何若異哉曰道一而己豈有無虛實之殊也哉豫稽諸載籍信不誣也特老子之傳以道德上下篇為本後之人不失之雜則失之誕其謂內聖外王之説也非無君人南面之術焉特用之不同耳其於修鍊則曰谷神玄牝致虛守靜守中抱一守一處和而已後之倡其説者則有真偽邪正之辨焉若隂符之言兼修身治世則與道德合矣若龍虎上經之文則與石壁參同合矣然學老子者舍仙道尚何從焉其曰內丹莫不以神氣為本外丹莫不以鉛汞為宗金液與天地造化同途蓋神室為丹之樞紐日魂月魄為真鉛汞也陽升隂降不離子午之方日往月來必居卯酉二位陽火自子而升至巳為陽極而隂生於午也隂符自午而降至亥為隂極而陽復生於子也神室中虛徑寸圓高中起以混三才即吾中扃也出隂入陽以生真汞內鍊玄精則火自坎生水自離降是以坎離以南北為經砂汞乃其異名惟水火為乾坤之用即金土二用也其曰三五與一天地至精順三一而得其理則三五相守金火乃相運持丹砂生於真鉛之中金火即真鉛也故經曰鉛者金精水者道樞也參同亦曰乾坤位乎上下而坎離升降於中坎戊月精離己日光五行為經以坎雄金精離雌火光也皆居中宫土德自震而起至乾而滿歷巽而消至坤而盡抑有無相制白者金精也黑者水基也金為水母母隱子胎水為金子子藏母腹金歸性初乃水金還性也蓋丹砂乃木之精得金乃并金水既合則木火為侣金木相縈水土相配而成丹矣其曰藥物也乾陽生坤坤隂包乾乾金生坤土象乾之中爻居坤之內是乃金水同宗象坤之中爻居乾之內乃木火同位乾坤寄體坎離之中而坎離乃為乾坤之用火之成數七返居東震為七返金之成數九返居北坎為九還故火鍊於土金入為水包裹飛凝開闔靈户也然必得火鍊鉛而成丹也其曰火候也斗樞鍾律之運本九一之數合二六三九之數終必復始含元抱真播精於子寅申為隂陽之極策數之法蓋月以十二卦分之卦得二日有半各以本卦之爻行本卦之策自八月觀卦以後至正月泰卦陽用少二十八策隂用老二十四策自四月大壯以後至七月否卦陽用老三十六策隂用少二十二策十二卦周即為一月之功十二月周即為一歲之運返復循環無有餘欠此與邵子先天圖周始具同皆伏羲易象位次也是故天根月窟之妙陽始於復極於乾隂生於垢極於坤循環六十四卦無毫髮異焉此其陶冶萬類終始無形合乎大通混冥也乎故深閎廣大不可為外拆毫剖芒不可為內抑亦弗畔於道矣其納甲之説乾納甲壬坤納乙癸震納庚巽納辛艮納丙兊納丁皆定位也而坎納戊離納己初無定位也且六卦之隂陽即坎離中爻之周流升降也朱子謂姑借此以寓其進退之候是也則火記之作其有本哉後之人因砂汞假喻之説遂有內外丹砂之别各託文以詫世然以人靈於物又豈全假草木金石而後能造神化之機也哉參同所謂託號諸石覆冒衆文是矣然雖諸子之所罕言而即性命神氣之謂耳若夫窮隂陽之至理奪造化之至神丹道其盡矣乎矧丹之喻特假象耳又何爐鼎火藥鉛汞龍虎嬰姹牝牡之謂也若關尹有曰嬰兒蘂女金樓絳宫青蛟白虎寶鼎紅爐誦尼土偶之類老子之時無之或謂偽書者此也苟執象泥文舍源求流姑好為神怪譎誕以誇世眩俗皆方伎怪迂之言少君欒大文成五利公孫之流是也若抱朴子黃白變化之事類之務以左道惑衆僥幸一時其肆妄稔惡為有不敗亡者哉噫嘻善言仙者止曰無視無聽抱神以靜是以忘形以養氣忘氣以養神忘神以養虛而己矣故執道者德全德全者形全形全者氣全我未之能易也抑虛極則靈明靈明則神化乃與天為徒遊物之初矣輕清之氣上浮則至陽之質與之俱升或曰聖人不師仙是豈來誣世也耶而求之道其惟守中乎或問丹之守中中已矣何教之設衆法異術之紛紜乎是果亦守中之可盡乎而必外資術數而然哉曰道豈岐而二乎天也者積氣也上帝則天之主宰也由溟涬未判之初三氣化生即梵清景玄元始也妙無者性之始妙有者氣之始由三氣而生九氣即九霄也虛無之界無窮輕清之氣無體而宰制之神亦無方也以宰之有所隸焉是降經籙以訓之符法以闡之以是法立焉而其傳尤著者漢天師茅真君許旌陽葛仙翁丘真君也曰三洞四輔清微靈寶神霄酆嶽者洞輔之品經籙是也清微始於元始而宗主真元闡之次而南嶽魏君陵郡祖君祖宏四派之緒倡其宗者朱洞元李少微南畢道黃雷淵李虛極而張許葉熊而下派益衍矣靈寶始於玉宸本之度人經法而玄一三真人闡之次而太極徐君朱陽鄭君簡寂陸君倡其宗者田紫極寧洞微杜達真項德謙王清簡金允中高紫元杜光庭寇謙之留沖靖而趙林白陳而下派亦衍矣是有東華南昌之異焉神霄則雷霆諸派始於玉清真王而火師汪真君闡之次而侍宸王君虛靜真君西河薩君伏魔李君樞相許君倡其宗者林靈素徐神翁劉混康雷默菴萬五雷方貧樂鄧鐵崖而上官徐談楊陳唐莫而下派亦衍矣酆嶽則朱熙明鄭知微盧養浩葉法善倡其宗者左鄭潘李而派益衍矣然究其要也俱不出乎三氣五行之妙焉經曰三五與一天地至精即河圖三五之數也是以雷霆合九一之數陽雷隂霆霜生霆煞樞隂機陽雷善霆惡皆藏乎太極之中求諸身則中扃雷垣也五氣五雷也心為靈府五官之主宰也以己之靈合三氣五行之妙可以燭幽破暗者以至陽而鍊至隂以至明而燭至暗也南斗陶魂六水數也北斗鑄魄七火數也以鍊己之工鍊魂聚其昏散之氣超其沈著之念而化生陽明之界以脫隂晦之境矣可以縱閉隂陽者會二五之精凝九一之氣養之內曰丹施之外曰法以五氣激剝而成聲雨暘之用備於呼吸之頃以己之神役彼之神則寂然之中此感彼應矣所以發天地之煞機合隂陽之制化皆己之靈與之合德通神者也若驅劾邪魅禦除災癘則猶末事耳且古者𥸤天禴祭之設流而為禱祠榮禬者自漢武以來有之傳曰薦之上帝齋戒沐浴以祀上帝皆所以達其誠也雖蘋蘩澗沚之微亦可事也特寓其誠焉故曰鬼神無常享享于克誠黍稷非馨明德惟馨務修德音以享鬼神苟誠怠德虧惟假外飾文繡繤經綴華繪綺縱衡交錯務極耳目之衒以誇世駭俗厥所事也果鍾鼓玉帛云乎哉矧道之設象皆則夫天真地祇昭布森列之儀是有科範儀典之制焉皆致敬竭誠之端耳使瞻禮之皈斯有格也後之人則不然惟聲利是趨藻黻是尚皆棄本逐末舍真競偽又何異夫巫祝貪佞之徒以僥口體貨財之為計哉且高其閫奧異其蹊徑神其機緘以惑衆鼓類使嗣之者習為儔侣不究諸內惟眩諸外豈不去道遠矣尚何冀感通之謂也哉噫雖授之之異而殊途同歸無二道也善嗣之者必博參而約守以辨疑解惑而己非徒號多鬻異之謂至也法不云乎真中有神誠外無法由是觀之果符呪罡訣之云哉抑古之謂師德者草而衣木而食飢餓其體膚摧礪其身心澡滌其氣慮物欲情垢無一毫足以溷其中制其外也則混乎天人一致之工神明與居心與天一吾心即天也故以天合天不可彼天此非天彼玄此非玄也則感應之機其致一也豈有一髮之間哉所謂純素之道惟神是守守而勿失與神為一一之精通合於天倫不亦宜乎舍是而汩於塵垢流於聲耀蔽於紛華而更相師友若蟻慕蜂聚而曰我仙也我靈也非邪則妄矣豈莊子之謂大宗師者哉嗟夫經所述也微彭魏則幾淪於方伎矣法所祕也微王白則流於巫祝矣然官天地府萬物與鬼神合其吉凶尚於豫言廓而求之所謂致命通玄也將可默識矣太極圖釋太極者道之全體也渾然無所偏倚廓然無得形似也其性命之本歟性稟於命理具於性心統之之謂道道之體曰極五居九疇之中曰皇極易曰會其有極詩曰莫匪爾極以是求之即心也道也中也周子曰中焉止矣程子曰太極者道也邵子曰心為太極朱子曰太極者理也陸子曰中者天下之大本即極也理一而己合而言之道也夫五行隂陽隂陽太極五殊二實二本則一二實者天以陽生萬物地以隂成萬物動而陽靜而隂陽變隂合而生五氣由五氣而生萬物故曰五殊也五殊本於隂陽互為其根也兩儀生於陽交於隂隂交於陽而生四象四象分而生八卦八卦錯而萬物生焉是曰一動一靜天地之至妙也歟是以五氣布四時行萬物生生而無窮五行一隂陽也隂陽一太極也太極散而為萬物則萬物各一其性各具一太極渾然全體而靜者常為主焉兼有無存體用涵動靜為萬化之源萬有之本者妙合二五之精焉朱子謂太極理也動靜氣也太極乃本然之妙動靜乃所乘之機機動則氣行而隂陽運焉理有不著者乎蓋氣負理生理由氣形性為之主而隂陽五行經緯錯綜合言之萬物統體一太極也分言之一物各具一太極也且鴻濛溟涬之初則元氣為萬物根本其體謂之理其隂陽流行不息者氣也是故未分之前道為太極己形之後皆具是理則心為太極沖漠無朕萬理畢具隂陽既形則理氣分矣太極判而始生一竒一耦由竒耦而生生無窮則一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四是也聖人無以發之伏羲始畫以一象乾一象坤體吾心之太極也一竒一耦以象變重之而為卦拆之而為爻皆一隂一陽至著至明之幾也是畫也至廣至幽至精至微非氣質形似之可見非聲色狀貌之可求昭昭焉熙熙焉虛而靈明而妙散之為萬殊斂之為一本無須臾之間毫髮之異循環無端浩渺無窮若天地之運行風雨之潤雷霆之威霜雪之肅山川之流峙草木之榮悴飛潛之微動植之衆舉不違乎天命之流行而同所賦受也所謂有極以理言無極以形言也抑理之至極本無形似而言無則不能為萬化根本矣邵子之曰無極曰有象有則言其本之實體無即無聲無臭形而上者是也其見夫道體者固不可以無加於有矣若老子之謂無極者無形無窮也莊子之謂道在太極之先是也若河洛之數先天之象雖有詘信進退盈虛消息行乎其中皆以虛中為極也能虛其中則太極本然之妙得矣尚何晦明通塞之異哉故易曰心學萬事萬化皆本諸心心所具者天地萬物不違之至理也程子謂有理而後有象有象而後有數人道之始於陽成於隂本於靜流於動與萬物同也然陽復本於隂靜復根於動一動一靜皆天地同流惟主乎靜則性立性立則中正仁義定矣是以體用一源顯微無間矣是圖朱子謂周子得之穆伯長穆得之於种放种得之於陳摶以陳摶學老氏故陸氏闢朱子以無極出於老氏也而易曰有極未嘗言無周子通書亦止言隂陽太極明矣然朱子以無形訓之亦弗畔於道矣且考之潘志以為周子自作無疑或又謂周子與胡宿邵古同事潤州一浮屠而傳焉然其説豈浮屠所知也且先儒以周邵之學先天太極二圖其理一也其傳未必二焉其體至大而無不包其用至神而無不存也故曰自天地幽明至於昆蟲草木微細無不合也將以順性命之理盡變化之道焉萬古聖賢之心同也非返求諸己有以見夫遠而六合之外近而一身之中暫於瞬息微於動靜豈言辭口耳之足知天也哉必致夫會歸之工探索之奧則吾靈明靜虛之體充乎六虛宰乎萬變久則誠精故明神應故妙幾微故幽其立象畫意剖析精微無不備於是焉性命之道死生之説原始返終於是盡矣其銖視軒冕塵視金玉亦孰得而易之敢為疑者釋焉先天圖論先天圖伏羲作也其卦爻次位皆本之始畫非文王後天次位比也夫易有太極是生兩儀兩儀生四象四象生八卦乃陽上交於隂隂下交於陽生天之四象剛交於柔柔交於剛生地之四象八卦相錯而萬物生焉其數則乾一兊二離三震四巽五坎六艮七坤八四象交而成十六事八卦相蕩為六十四卦此先天之象也邵子所謂一分為二二分為四四分為八自乾至坤皆得未生之卦若逆推四時也傳曰易逆數是也其位則乾南坤北離東坎西震東北兊東南巽西南艮西北自震至乾為順自巽至坤為逆隂為陽之母陽為隂之父母孕長男而為復父生長女而為垢是以陽始於復隂始於垢也傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆明交相錯而為六十四也數往者順左旋皆己生之卦知來者逆右轉皆未生之卦也其六十四卦之序即八卦成列因而重之也故下三畫即前圖之八卦上三畫則各以其序重之而下卦因亦各衍而為八也若逐爻相生則邵子所謂八分為十六十六分為三十二三十二分為六十四者皆法象自然之妙也此則四圖所謂先天之學也陽之類圓成形則方隂之類方成象則圓圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數自坤之息歷艮兊而極於乾自乾而消歷巽艮而極於坤震始交隂而陽生乃震坤之接巽始消陽而隂生乃巽乾之接圓圖隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂皆自然之理其數自一而二自二而四自四而八以為八卦圓於外者為陽方於中者為隂圓者動而為天方者靜而為地方圓之象雖異而其布卦次序皆四圖所同也故曰始自伏羲非邵子所作也藉令邵子自作亦本諸伏羲而成也乎且先天之謂即先天而天不違也餘則文王周孔之所不言也或曰先天即河圖也河圖之數天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五聖人則之而畫卦或曰八卦即河圖非也况先天之卦與河圖次序同異相半也哉且河圖乾坤縱而六子橫為數之祖先天不可以數言也其次位皆八卦之生數也陽一而隂二故陽之生隂二而六之為十二隂之生陽三而十之為三十是以乾始於一而兊為十二離則十二而三十為三百六十震則十二而為四千三百二十自巽而坤皆竒耦之生數也釐之為六十四卦則以所生之數而乘之此總數也其自子中至午中為陽初四爻為陽中前二爻皆隂後二爻皆陽上一爻為隂二爻為陽自午中至子中為初四爻皆隂中前二爻為陽後二爻為隂上一爻為陽二爻為隂三爻為陽四爻為隂在陽中上二爻則先隂而後陽陽生於隂也在隂中上二爻則先陽而後隂隂生於陽也其序始震終坤者以隂陽消息為數也此蔡氏之謂皇極經世者皆本先天也蓋數皆起於一其周旋六十四卦相生之數若日月星辰水火土石暑寒晝夜飛走草木分隸於八卦得生生之數是以感而變者之善暑寒晝夜性情形體走飛草木色聲氣味也應而化者之善雨風露雷走飛草木性情形體目耳鼻口皆先天之數也在經世則天有隂陽曰太陽太隂少陽少隂也地有柔剛曰少剛少柔太剛太柔易所謂八卦也是故隂陽盡而四時成焉剛柔盡而四維成焉天竒地耦之畫陽九隂六之數皆起於四數朱子所謂視萬物為四片也則日月星辰之類皆由八卦之變也天地之變有元會運世人事之變有皇帝王霸元會運世有春夏秋冬為生長收藏皇帝王霸有易詩書春秋為道德功力各相因而為十六十六者四象相因之數也凡天地之變化萬物之感應古今之因革損益皆不出乎十六十六而天地之道畢矣邵子所謂一動一靜之間天地人之至妙者歟是曰先天之學心後天之學迹也是以圖皆自中起萬化萬事生乎心也又曰先天圖者環中也圖雖無文吾終日言未嘗離乎是蓋天地萬物之理盡在其中矣且圓者河圖之數方者洛書之文也弄丸者以先天之圓象言也皆順隂陽消長之往來而已矣冬至居子之半陽之始於復也月窟乃乾遇巽也天根乃坤逢震也即自復至乾陽也自姤至坤隂也陽主人隂主物然乾至巽五卦也即垢為月窟坤至震五卦也即復為天根而其三十六宫者積乾一至坤八之數天根於時為冬至為夜半所謂天地心也左方自震之初為冬至離兊之中為春分乾末為夏至右方自巽之初為夏至坎艮之中為秋分至坤之末交冬至循環無窮所謂一月一日一時靡不有是理焉其循環不息者自姤至坤隂含陽也自復至乾陽分隂也坤復之間乃無極自坤返姤則無極之前也自乾接復則有象之後也乾坤交而為泰坎離交而為既濟乾生於子坤生於午坎終於寅離終於申以應天時其隂陽生於兩傍中虛即太極也自冬至至夏至為順自夏至至冬至為逆和氣周流於一環之中則皆春矣朱子謂易中二十八卦翻覆成五十六卦惟乾坤坎離大過頤小過中孚八卦反覆止本卦以二十八卦湊八卦是曰三十六宫也此皆天根月窟來往循環之妙焉是以先天乃伏羲本圖雖不假言辭而所該甚廣凡易中一字一義無不出於是者論其格局則太極不若先天大而詳論其義理則先天不若太極精而約而太極終在先天範圍之內而物理本同象數無二致也自初未畫説至六畫滿者所謂先天之學也卦成之後各因一義推説所謂後天之學也邵子之謂先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文止一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王八卦之序離南坎北震東兊西乾西南坤西北艮東南巽東北乃入用之位後天之學也孔子雖因文王之易而作傳而十翼之中如八卦成列因而重之太極兩儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意不以文王所演之易即為伏羲始畫之易也或謂是圖邵子得之李挺之李得之穆伯長穆得之陳摶者故與丹道同也若曰自復至乾為陽自姤至坤為隂即乾坤定上下之位離坎列左右之門天地之所闔闢日月之所出入冬至之後為呼夏至之後為吸此天地一歲之呼吸也冬至之月所行如夏至之日夏至之月所行如冬至之日春夏子至辰巳秋冬午訖戌亥其四正者乾坤坎離也參同曰牝牡四卦以為橐籥坎離之數一二以南北為經道以坎離為真水火為六卦之主而六卦為坎離之用是也隂陽二氣皆從子午為發生之終始坎藏六戊為月之精居於北象水中生金虎也離藏六己為日之光居於南象火中生汞龍也自震而起至乾而滿歷巽而消至坤而盡象乾之中爻者居坤之內乃金水同宗象坤之中爻者居乾之內乃木火同位以乾生三女而居東上巽中離下兊兩陽生一隂也坤生三男而居西上震中坎下艮兩隂生一陽坎胎居於午離胎居於子西假金之元東假木之祖乾退位寄居於坎坤退位寄居於離納甲之法乾為望坤為晦坎離升降於中即乾納甲壬坤納乙癸離納己坎納戊巽納辛震納庚兊納丁艮納丙皆與之合也坤初變震為生明月出於庚再變為兊為上絃月出於丁乾初變為巽為生魄月現於辛再損成艮為下絃其曰晦至朔旦則震受符復卦建始震受庚於西方其象如震卦之納庚也八日則兊卦納丁十五則乾體純陽而乾卦納甲十六則巽卦納辛二十三日則艮卦納丙三十日則坤卦納乙是以壬癸配甲乙乾坤括始終也此與火候同也而朱子則以先天八卦為一節不論月氣先後且與納甲相應謂天地定位否泰相類者是也故謂伯陽參同恐希夷之學出其源流蓋其卦位布置皆與參同默符其陽始於復極於乾隂始於姤極於坤則十二月一月三十日一日十二時各行一周天而六十四卦三百八十四爻為一周天之數以一爻直一日俱與易準世以參同倣易而作孰知隂陽之妙不求合而默合也或以先天太極圖同時而出周邵二子不相聞則二圖亦不相通其曰大而天地之始終小而人物之生死遠而古今之世變皆不外乎消息盈虛之理也此邵子之獨見乎恍惚氤氲變化回旋之始朱子所謂向上根源者也且謂但當日諸儒既失其傳而方外之流隂相付受以為丹竈之術至希夷康節乃返於易其説始明信不誣矣則其尊信是圖豈小補哉然是信非若楊子雲太玄擬易方州部家皆自三數推之關子明洞極列二十七象司馬溫公潛虛用五之數五十五行皆補湊成書而已非得夫道之全者也善探隂陽之賾造化之機者自太極觀天地則天地亦物也是知天地作於易而易非出於天地也人能盡太極之妙先天之用則範圍天地曲成萬物而造化在我矣則先天一且亦無尚何容言哉河圖原易曰河出圖洛出晝聖人則之即易繫曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此孔子以河圖之數而言所以成變化行鬼神也即天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生士地十成之之數也顧命曰河圖在東序河圖八卦伏羲氏王天下龍馬出河遂則其文以畫八卦禮記曰河出馬圖龍馬負圖而出也論語曰河不出圖孔云河圖八卦是也則伏羲之則圖以畫易明矣豈得詎曰妄哉是圖蓋出於書契未形之先天地自然之理也包括造化之妙無窮萬事萬物象數之源也鄭康成曰河以通乾出天苞洛以流坤吐地符河圖九篇洛書六篇劉歆曰伏羲氏繼天而王受河圖則而畫之八卦是也河圖洛書相為經緯八卦九章相為表裏王肅曰河圖八卦也王充亦曰河圖從河水中出易卦是也關子明曰河圖之文七前六後八左九右劉牧曰河圖數四十五陳四象而不言五行大戴記曰二九四七五三六一八傳云九寶法龜文又曰秦以前文也歐陽修曰圖者八卦之文也神馬負之自河而出以授伏羲八卦非人所為天所降也然則八卦者人之所為河圖不與焉若河圖之説信乎生於神馬負八卦出於水中乃天地自然之文爾何假伏羲氏始作之也王安石曰圖以示天道書以示人道也蓋通於天者以象言也中於地者以法言也蔡沈曰自孔安國劉向父子班固皆以河圖授羲洛書錫禹關子明邵康節皆以十為河圖九為洛書惟劉牧意見以九為河圖十為洛書託言出於希夷與諸儒之説不合又曰伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追考河圖而已與之符矣而河圖數偶偶者靜靜以動為用故河圖之行合皆竒一合六二合七三合八四合九五合十河圖體圓而用方聖人以之而畫卦程子曰聖人見河圖洛書而畫八卦古之聖人只取神物之至著者爾如畫八卦因見河圖洛書果無圖書八卦亦須作河圖洛書之中數皆五衍之而各極其數以至於十則合於五十矣河圖積數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虛之則但為五十又五十五五中其曰十者分為隂陽老少之數而其五十者無所為則又以五乘十以十乘五而亦皆為五十矣邵子曰圓者星也曆紀之數其兆於此乎方者土也畫州井地之法其倣於此乎蓋圓者河圖之數方者洛書之文故羲文同之以造易禹箕序之而作範也朱子曰河圖與易之天一至地十者合而載天地五十有五之數則皆易之所自出天地之間隂陽之氣雖各有象初未嘗有數也至於河洛之初然後五十有五之數竒耦生成粲然可見河圖之位一與六同宗而居北二與七為朋而居南三與八同道而居東四與九為友而居西五與十相守而居中不過一隂一陽一竒一耦兩其五行而已河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也河圖以生數為主而十數者因五得數以附於生數積五竒而為二十五積五耦而為三十合是二者而為五十有五河圖主全故極於十而竒耦之位均河圖之虛五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也吳澄曰河圖者羲皇畫卦之前河有龍馬背毛有此數也其數後一六前二七左三八右四九中五十五竒五偶相配羲皇觀於天地人物無非陽竒隂偶兩相對待見河圖之數而有契焉於是作一竒畫以象陽作一偶畫以象隂加而倍之以成八卦又倍而加之以成六十四卦所謂伏羲因河圖而畫八卦者此也河圖之數亦五位合於天星五宫之圓一六居北二七居南三八居東四九居西五十居中河圖之位五每位各有一竒一偶數雖十而位止五周之時河圖與天球寶玉同藏於玉府陳埴曰二圖五為正變主河圖而言則河圖為正洛書為變主洛書而言則洛書為正而河圖為變二圖雖縱衡變動皆參互呈見此所謂相為經緯也翁泳曰河圖隂陽之位生數為主而成數配之東北陽方則主之以竒而與合者偶西南隂方則主之以偶而與合者竒也胡暖曰河圖以生成分隂陽以五生數之陽統五成數之隂而同處其方陽內隂外生成相合交泰之義也河圖數十七者對待以立其體故為常胡一桂曰書之中視河圖惟有五而無十然一九二八三七四六之合環而向之未嘗無十焉此先儒深究隂陽造化之理探幽索微己極河圖之妙矣然而同異之辨不能無焉劉牧曰一六居北二七居南三八居左四九居右五十居中洛書也戴九履一左三右七二四為肩六八為足者河圖也是以九為河圖十為洛書張文饒精於邵學亦以九為圖十為書而邵子止言圓方而不言數之九十亦以十為河圖九為洛書與夫子箕子之言合或謂邵傳於穆修劉傳於种放皆得之陳摶朱子謂陳摶以先天圖授种放放授穆修修授李之才之才授邵子放又以河圖洛書授李溉溉授許堅堅授范諤昌諤昌授劉牧穆修以太極圖傳周敦頤敦頤授程皓程亦本劉氏及朱子力詆其非此萬世不易之論也魏氏復詆朱子謂始以九圖十書為劉長民作託之陳摶靖士蔣山復以先天為河圖五行生成數為洛書戴九為太一下行數羅端良嘗謂受河圖於蔡季通得於蜀隱者其象如車輪白黑交錯而八分之以為八卦白者純陽象乾黑者純隂象坤黑白以漸殺之而為餘卦謝方謂嘗傳河圖於異人其狀倣八卦為體坎離中書而相交類於丹道坎離之術張平子乾鑿度中九宫數即太乙圖劉牧以為河圖或曰九十二圖皆河圖也又豈紛紜至若是之殽雜也哉朱子謂以河圖洛書為不足信自歐陽公以來有是説然顧命繫辭論語皆有之諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱橫曲直皆有明法其説至矣歐陽公惟不見本圖特承用注説直以圖書為無並疑繫辭非孔子作何不思之甚哉圖書所具皆包括萬物造化之機孰有違乎是者且聖人實因圖以畫卦可即謂河圖為八卦乎而其所與洛書合也洛書與洪範之初一至次九者合而具九疇之數固出於洪範而洛書以五竒數統四偶數是以竒數為主二四六八各因其類以附于一三七九之側洛書之縱橫十五而七八九亦迭為消長虛五分十而一含九二含八三含七四含六參伍錯綜無不默合此變化無窮之妙矣是故河圖洛書之數皆五衍之以至於十則合於五十矣洛書積數四十五散布於外而分隂陽老少惟五居中則亦自含五數而并為五十矣洛書主變故極於九而其位與實皆竒羸而偶乏隂陽之數均於二十雖隂陽之數異然五居中太陽得五成六少隂得五成七少陽得五成八太隂得五成九則與河圖隂陽相錯而為生成之數無異也洛書之竒偶相對即河圖之散數未合河圖之生成相配即洛書之數合而有屬也故先儒以河圖洛書相為經緯八卦九章相為表裏者此也若大衍之數五十者亦五數衍而成之各極其十則合為五十亦不異焉且河圖洛書皆虛其中即太極也竒偶各居二十即兩儀也縱橫十五而互為七八九六即四象也以乾坤坎離為四正以震兊巽艮為四偏即八卦也先天圖之圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南未始不與河圖竒偶錯綜同也此先天之為丹道之祖也而河圖者陽之生數五五行之本也隂之成數十萬化之根也一九四六各合為十金水同宗二八三七各合為十木火同體總為五十有五分為五方一六居北二七居南四九居西三八居東五十居中以生數除之五方各除本數乃五行之源也又以成數除五方之本數乃五行之本也除外五方各剩五數共二十有五為五行之根象戊土之體復除五行之本則北一南二東三西四中五則北剩四數象金金本生水而金反自水而生如鉛自銀而有即金虎也金産水中乃虎向水生也而南剩三數象木木本生火木反自火而有如汞感鉛而結即木龍也木生火中即龍從火出也東剩二數象火火生於木砂中抽汞乃木汞藏於離母隱子胎曰七返也西剩一數象水水生于金一氣還元乃金鉛藏乎坎子歸母腹曰九還也虛中以象太極四象相合而成十乃真隂己土之妙理是皆天地隂陽顛倒生化之機至神莫測之妙用存焉又豈太一曆緯星數方伎之所竊取可同日語哉然或謂傳自希夷者圖書皆作圈故謂三代以後圖書隱晦千有餘年幸方伎家藏之至宋復出而方伎之所取用不過以其數之多寡以竒偶消長配之刑德生殺此特曆緯術數所本而己先儒以參同為不足道殆亦過歟嗚呼傳有之河出圖聖人則之是倣之以畫八卦也故不可以八卦即河圖也且河圖出於伏羲之世其間群聖人未嘗言至孔子固嘗言矣而不明言其圖孔子而下自關氏劉氏以來又紛紜各持其見而卒無所指歸焉然朱子之以十為圖九為書足以盡之其或以先天為河圖或謂如車輪白黑交錯或依倣八卦以為體或以九十二圖皆河圖也是皆無一定之見使後世將孰從之而繫辭之本文自天一至地十其中五為衍母次十為衍子自一至十五皆本文自然之定位也十五點之如星象故謂之圖也亦何涉於怪妄也歟亦復何疑焉噫程子之言曰有理而後有象象而後有數得其義則象數在其中矣自圖書始止於畫上見義其中反復往來上下消息自天地幽明飛潛動植微細無不該合則易之順性命之理盡變化之道皆託象以明理而已矣或溺於象數而謂專為卜筮設不推義以求理去道遠矣所謂郭璞管輅之學者也其所謂極其數以定天下之象著其象以定天下之吉凶者得之於精神之運心術之動特其一端耳卒本是以求易文又豈能盡夫體用一源顯微無間以造死生之説幽明之故而彌綸天地之大也哉以是而欲求諸聖人之端緒固余之所未之信焉廣原性性命之道一也學者求道而已苟求諸道於性命之源其有弗見者焉蓋求之未力則見者鮮矣韓愈氏之原夫性也發乎未見以繼聖然理有未明將以廣之古今之言性者多矣得其本者復幾人焉若夫堯舜性之湯武身之得性之本然也故其命舜曰道心惟微是也足以發王道之本焉周衰孔子生足以繼矣其曰性與天道成之者性也各正性命知性則知天矣道之源莫切著於是哉子思之謂天命之謂性天之命於人者為性知率其性則謂之道孟子之謂性善是也人心統乎性情本無不善所謂天命之性也其具仁義禮智不假為而能也即繼之者善也蓋天之命於物為性善所固有其惡也所謂氣質之性也即性相近也由乃感於物動於欲蔽於習而然是有上智下愚之分焉則其善也猶鑑之垢水之昏直不過太空之浮翳也若垢淨而明固存昏澄而清固徹其本有之善孰得而易故於聖賢不能加於愚不肖不能損焉惟能盡其性則物不能感欲不能動習不能蔽則其至虛而靈至清而明者猶太空之昭昭也又豈善惡可得而混焉是以靜專而動直誠立而明通明睿生矣是為五官之統宰百體之所從令四端之所備七情之所制其大無外性命之正死生之理幽明之故具焉其小無內洪纖之體含類之情形色之質係焉充之為周孔悖之為桀跖行之為伊傅潔之為夷齊安之為顔閔皆特立於明善之效也其澤夫一世垂之無窮也和之為禮樂治之為法制率之為綱常繩之為典則凡得乎天秩天序者非天理之公用哉且夫楊子之謂善惡混特情習氣質之偏而已豈天之正命也告子以生之謂性是情之所欲所為皆性也荀子之謂性惡以其善者偽也又情習氣質之固於性之正則相去遠矣韓子謂之品三其為性者五情之品有三而其所以為情者七則天之所命與者何紛紛之多也將奚自而立焉凡出乎性者皆情也又豈三品之拘而又加五性焉是蓋皆氣質之偏耳後之論者特以其秦漢以來鮮言之而愈獨發之也歐陽子謂性非學者之所急而聖人之所罕言也又何大本之未明哉董子曰命者天之令也性者生之質也情者人之欲也道者所由適於治之路也仁義禮樂皆其具也王子曰性者五常之太極而五常不可謂之性庶幾若近道焉而或有别於孟氏之言而以荀韓為似是何繆妄也哉其亦未之辨焉耳獨周子曰性焉安焉之謂聖程子曰天所賦為命物所受為性性即理也可謂著明矣是足以繼孟氏者周程而己矣其度越諸子槩可見矣然而老釋之謂異者何老曰性即神也元初不壞之靈也釋曰性即覺也全其本來之虛靈也必絶事物去嗜欲庶幾無所染奪以徹其澄以立其徑則靈明之積神化著焉是則以天地萬物凡有形氣者皆虛空幻妄也故虛無空寂而失理氣之實也歟若其究夫死生獨善者又豈與申韓楊異之徒共轍哉抑亦天人之道一故道之至精至粹理之至幽至微人之不能與天地並行而不違者不能辨夫天理人欲之一間耳是以不能盡聖賢之心也能盡其心則盡性致命之道得矣問神或問曰道家流以鬼神為務是果有乎曰孰謂之無有也特辨之不精而或疑焉夫天積氣也地亦氣之厚者形而上者是也氣行形之內即天命之流行也以其流行不息必有宰之者焉程子曰主宰謂之帝妙用謂之鬼神又曰鬼神者造化之迹二氣之良能蓋隂陽之運迹不可見而理可推焉理之顯微有不可窺測而神居焉故雖聖人未始言其無也特不專言之而已若孔子曰禱爾於上下神祇鬼神之道敬而遠之鬼神之為德其至矣乎非果無有也特子不語怪力亂神恐溺於誕焉耳易曰隂陽不測之謂神與鬼神合其吉凶是也夫心存則道明而理著焉其為隂陽之機出入往來非外乎吾心也其吉凶故與鬼神同鬼神非是則不能存又何吉凶之云哉惟顯道神德行者有以合之以通神明之德則大而化之之謂聖聖而不可知之謂神所謂妙萬物而為神也窮神知化之道於斯盡矣此聖人體乎天地之妙用合天人一致之極功然後不知其神而所以神也故曰事天明事地察惟誠其心以感天天感則發乎其機也以不可見不可知者則曰神存其間也雖上天之載無聲無臭而感於此應於彼未嘗間也是以雖有惡人齋戒沐浴可以事上帝鬼神享於克誠惟知誠其心則足以事天矣其祀之禮燔燎羶薌見以蕭光以報氣也黍稷肝肺加以鬱鬯以報魄也是皆氣感而至焉若明之為神也鼓以雷霆潤以風雨滋以霜露其晦明變化倏忽萬狀是非至神其孰能哉幽之為鬼也不可得而迹求之然焄蒿悽愴之集或聲或狀或氣感或慮至高而無形卑而有物其滯而不化屈而不伸者是也所謂精氣為物遊魂為變乃囿於隂陽屈伸而然也此陽精隂魄所以為鬼神之情狀也惟觀夫造化之迹則見其有無之端矣問者曰有之理信矣或見世之疾患者輒曰某鬼神之害也必血食禱之則免禱之應則爭相告曰神驗矣或不應一旦有夭壽之變則怨忿而謂曰某鬼之侵神為之助矣求其禱則果非天地社稷所宜祀之神而皆淫祀者有焉謂之神且不足稱焉又豈能助夫鬼以賊人之天命乎是豈非至愚也哉曰是非一朝夕而然也蓋井巷之習庸夫愚婦惑於流俗之言以驚世駭俗因而成風矣苟知乎生者氣之神死者氣之屈伸者為神屈者為鬼魂氣本乎天體魄本乎地則豈淫僻之足惑哉能存吾心精誠靈粹與天地合其用者若魯陽返戈止日烈婦哭而降霜韓子之開衡山之雲驅鰐魚之暴可見矣先儒亦曰有其誠則有其神無其誠則神何存焉道之曰役諸鬼神者發吾之靈明精一之神合天地變化之神而已董子之謂縱諸陽閉諸隂者是也侍宸不曰先天之氣真皇正法也吾心之神雷吏嶽伯也殆是之謂歟或未之詳而病其為方外之説是豈果知神化之機鬼神之變者哉觀植芒芴子行山澤間見木之喬者偃蹇低者蕃茂曲者拳操直者森鬱大者數尺圍而小者不盈一指豐暢薈鬱乎山崖澗谷間雲煙與之上下禽鳥托之和鳴子顧而笑曰吾嘗愛物之藹然生意津津者莫植物若也彼翼而飛鱗而潛足而走者非不皆賦物之性而植之理最可見而可喜也乎若四時之代謝一華一草或紅或紫或白或黃不違其時不奪其色而寒暑應節萌孽兆焉若其眩彩競妍綺繡粉黛所不能狀而春者不得而使其華於冬夏者不得而使其茂於秋節之踰者不可促其急時之未者不可強其緩雖居之堂室培之盆甕曲其枝體以取容和其性質以就養雖若不能順其天害其性亦莫知其傷於曲且隘而不能遂其自然之質卒死矣亦伺時循節而華且茂焉是果孰使之然哉此其宰造化者之工也至微至妙者於是可見焉而物各賦物而各一其性所謂物物各具一太極者乎然而資於培養者或時之所至而使然也故不耗其實不抑其長理有不足怪焉今夫山澤間也糞壤之所不及灌溉之所不至若雨露之所濡霜雪之所凌燥濕不時寒暑不均無美惡薰莤之異一資於風雨之潤土石之固而已耳而其高者低者曲者直者大者小者各遂其自然之性而蕃衍碩茂無所不至也其得乎賦物之性之全者雖山葩野卉爭芬並秀亦不讓盆甕間者又非一花一草之比也故松柏楩楠足以為棟梁柟樟檜梓足以為榱角其明者可以為膏為漆其稿者可以為器為薪實之甘者可食本之佳者可藥氣之瑞者可紀且各適其材而未始以其無所可用而産於深山穹林以全其本也其各一其性得天者全皆誠之不可掩也如斯之廣且神哉道之在天下猶水行乎地中無所往而不至焉豈草木可謂之無情無知而能若然哉余乃今知夫萬殊一本之理古今之所同然塞乎宇宙而不可易也不知其樂之極矣有笑於後者曰子何樂乎是觀也曰非爾所知也吾觀乎植物之性足以盡吾之性故不知其樂歟笑者曰子之所觀者特子之所遊息而目歷者也尚孰知乎木之豐暢薈蔚者閲歷盛衰與時消息豈一日而然哉使非居乎山陵之險僻一旦爭取群盜之罹斧斤之禍無老弱曲直堅脆大小之擇摧風霜殞氷雪不舍晝夜而𢮎之剡而為舟揉而為耨琢而為廬斫而為車摧而為薪不可勝紀皆明之為害質之為仇也則木之性毁矣尚何生意之足觀也直不過莊子所謂山木之支離擁腫足以全其天年者或存焉若所謂樗與椿之久且大也則吾未之見矣子不懌而去乃顧之曰孟子之謂牛山之木常美矣奈何旦旦而伐之木之性傷猶己之性伐而不知存者也豈特木之謂歟矧邵子常達夫數也雖木石瓦礫各有一定之理存焉余復何悲抑亦賦物之性固不得而傷也其所適於用則有幸不幸者係焉是則其有定在者也若才之美者宜為琴瑟簠簋則薦之清廟質之徑者宜為盤盂凡席則處之堂室下者置之卑陋朽者棄之埃壤各信所遭者何如耳於其本之全乎天者孰得而毁絶之也哉此之謂盡性笑者曰然讀觀物篇孔孟之書出而其道明逮其道晦則王化弊非書之不傳言道者之不明也列國而下漢唐之盛稱知行者寡矣宋興而道著周子暢太極未明之藴於前邵子發先天無窮之理於後由是而羲文周孔之旨繼絶學者莫若是也聖人之道本乎心易心學也邵子之言曰心為太極為學養心先天之學心也其言心至矣其論理明矣暨圖方圓以盡易之妙雖天地之大隂陽之微鬼神之幽象數之奧有無之變物之至廣理之至神皆出乎太極復歸於太極者斂之於一心而已充而宇宙散而毫忽其潔淨精微淵深幽眇可謂詳矣密矣此其所謂觀之以心而觀之以理又曰不以心觀物不以我觀物不以物觀物也若堯舜禹湯之禪有德功放殺之異周秦漢楚運祚之修短擇乎善惡而已是知治亂由義利之所尚邪正由言行之所致凡三皇五帝三王五伯之事若水鑑之燭毫髮不能隱則其反觀者所謂聖人能一萬物之情哉是為窮理盡性至命之道也大而化之則天地隂陽之數以無體之一以况自然不用之一以况道也用之者三以况天地人也故曰無極之前隂含陽也有象之後陽分隂也則天根月窟之往來存乎無極之間矣與周子之言豈不合歟自有易以來後之疏議者千百其人而造聖人之旨者幾何能達夫未畫之先乎然世之慕者徒求幽間逸樂之餘於其道則未知有聞焉韓子讀荀取其近孔子者復以雄亦聖人之徒歟若太玄之於易方之邵子之謂先天之學心也後天之學迹也出入有無死生者道也若用智數由徑而求之是屈天理而徇人欲也其見豈不相去遠矣是足以知其見至廣其聞至遠其論至高其樂至大能為至廣至遠至高至大之事而中無一焉豈非至神至聖者乎其亦信不誣矣孰得善養心者與之言心學也乎嗚呼或曰六合之外聖人存而不論若邵子者可謂窮神知化矣復有謂之聖人所不論者歟讀董仲舒傳豫觀三代之下周衰而王道息秦承戰國之習氣灕志悖火詩書於灰燼道之傳遂竟泯泯無聞矣漢興而天下大治而其腐儒曲士猶循故習不能彰先王之教於既絶之餘者皆然文帝號稱賢主有一賈生而不能用千載之下讀其言尤有悲憤者焉况有非賈生比者哉若董仲舒下帷講誦三年不窺園進退容止非禮不行學士皆師尊之武帝舉賢良文學而仲舒對策焉當是時君臣遇會又豈秦所敢望哉其言足以發周衰之弊得王道之正者仁義禮樂為之本也性命情質之辨著隂陽刑德之論切由是觀之天人相與之際禮節修於身善惡感乎天堯舜禹湯之相傳不已者守一道而無究弊之政也是豈秦漢庸庸之徒所能至哉以武帝之英果卒三策而不能略行之乃出為江都相亦豈不為當時惜哉有如公孫弘希世用事以治經得侯乃嫉正論而遷之膠西仲舒雖不獲倡其道正身以率下兩事驕王而皆尊禮之卒以修學著書終於家是非能全乎進退之道也哉其言曰正其議不謀其利明其道不計其功逮宋二程子出而後述明之始足為後世法蓋當是時己非班賈劉楊之足倫擬況其後也哉太史公以為劉向稱仲舒之才伊吕無以加管晏殆不及也為之過是向子歆之言誤矣使仲舒遇其君行其道亦豈不伊吕之效哉又何管晏之足方歟何也以管晏特霸者之佐所能行者霸者之事也又豈王道之大者若乎且以其師友淵源所漸猶未及乎遊夏則周元公繼絶學於不傳倡道於宋至今學者皆宗之道未始亡也又豈淵源之為戾哉使太史公其見乃爾矧後之不足知仲舒者乎而或知其槩者欲禮之於廟配祀孔子以不忘乎推明孔氏抑黜百家之明而卒莫之行豈不惜哉然以仲舒之道之言故不係乎祀否也抑亦何其遇知之難也歷百代而同焉夫以漢武之智尤舍而弗用矧下乎是者哉其亦不足感也矣晝文章正宗後三光五嶽之氣發而為文文所以載道也文著而後道明而必本諸氣焉元氣行乎天地而道所以立矣古之有德者必有言蓋其和順積中英華發乎外也非道充義明其能見於言哉是以真文忠公集文章正宗以得源流之正者曰正宗也其編次之目凡四其體本乎古其指原乎經否是辭雖工不録也首曰辭命次曰議論次曰敘事次曰詩賦惟虞夏列國西漢及唐初之文本於左氏繼而可則者班馬韓柳續以歐蘇曾王首焉餘所不載其立法辨制嚴矣蓋以道德為之基理義為主而發乎詞章者必得性情之正而後合乎是也由是觀之則雖古人之言允合者亦幾希矣矧後之未達乎此而妄謂之文欲求名家合轍者其可得乎然亦惟道未之著氣未之充焉耳夫學也所以窮理以致用必本乎道養乎氣知所養則氣充而道立文有不工者乎余志於文凡二十餘年間探其要六經而下若漢唐諸家盡味之將上泝三代之言以究與經為之表裏者焉所愧學力駑怠未之博洽貫通深所自懼及究是編而後明徹廓達而信之益篤得之益大矣或所適未正所養未至而不足預是者亦瞭然可辨矣嗟夫世之鮮知此者惟藻繪雕飾纖碎委靡視此不啻千里之遠萬仞之危孰知其行之未至亦必由其方而後達也哉其或知探源流之緒於菁華抹截者求之無斁其於文忠之餘意孰無所得哉且獲忝繼其末者得不自幸歟辨荀子荀子書三十三篇其始於勸學修身本諸仲尼而言儒效君道臣道王霸禮樂次之似知王道之端矣而富國強兵之辨雜焉乃明言性惡之不可治皆得之本然而偽堯舜闢思孟是所以成李斯之亡秦戰國縱衡之習可得而逃哉斯師於卿斯之亡卿之道可見矣當是時孟軻與之時上下曾不聞萬章之徒所記軻之言果何如哉使軻之言性善首對梁惠王曰亦有仁義而已矣其或不足法之當時以及千萬世則卿之言其患去楊墨豈遠哉韓愈氏以為倡道於不傳之餘乃曰語焉而不詳是果不暇辨夫性惡之悮而亦有未明者焉其必以卿視軻之言未必曰非特信有未及乎抑齊襄時卿以老師大儒見重豈無一人能與論王霸之異而皆宗師之是非以哀公堯問之説以誇誘之乎蓋以營巫祝信𥘌祥之術然哉此其後世惟知其言之善而鮮辨矣辨隂符經史稱黃老者以黃老之道同也而黃帝之言未之見焉若子列子之謂黃帝書曰者大率與老同而世傳惟隂符一經為黃帝書其文質而雅深而要非有道者其能是乎昔唐李筌得之嵩山云魏大武中寇謙之所藏筌之言曰百言演道百言演法百言演術道者神仙抱一法者富國安民術者強兵戰勝而其句義三者未嘗不備邵子以為戰國時書程子以為非商末則周末終秦之先有是文也蓋以其先王之時聖道既明人不敢為異説及周衰道晦才智之士鮮知所趨故各以私智窺測而立言又曰正言者或駁不純此獨用反言而合於正其必有取夫大要以至無為宗以天地文理為數謂天下之故皆自無而生有人能自有以返無則善矣而朱子謂或曰此書即筌之所為也義於筌本非深於道者也則筌之不能至也必矣程邵以其必商周之文非秦之先則唐固所不逮矣豈非儒者諱言仙而必以其非黃帝作也然朱子之疏正以其詞支而晦吾恐人見其支而不見其一也且夫觀天之道執天之行能若是者與天地同體則道在我矣此為一經之本天性人心其理一而見乎機者二焉立天之道以定其機過動者變化反覆存焉則天人合發矣惟能立道以定之則萬化定基矣動靜自得其常矣雖修煉之道亦可知矣若五賊九竅三要生殺克制皆盜夫機者使然其盜既宜則三才安矣惟君子則知固窮而不敢妄作小人則輕命而致患矣蓋其莫能見莫能知其非不知不神之所以神哉故聖功由是而生神明由是而出矣是以三返晝夜以復其初也絶利以守其源則通晝夜一死生矣以其瞽善聽聾善視則其心專一而用師十倍矣故天之大恩生於無恩至公其存於至私生死恩害道無不然皆理之自然也惟至樂至靜者能合三返之道可以動靜而復見矣其所見者天地之文理人見其為聖也而我之時物文理未嘗不同乎天地所以謂之哲也此愚人之所以以愚虞聖以竒其聖而我獨以不愚虞聖以不竒其聖也是以自然之道靜而天地萬物生天地之道浸故隂陽勝則相推而變化順矣且天地以至靜生萬物其道浸漸而長則剛柔勝而隂陽相推變化無窮矣此其至靜之中自然之道萬物生生之不息以天地乃竒器也雖律曆卦爻所不能測故神機鬼藏也八卦甲子即邵子納甲之説皆隂陽相勝之術是可以造乎卦象者也其始末文理未始不貫通也然世傳褚氏蔡氏本皆止於時物文理哲而下有二十一句乃朱子所深取者則褚氏張氏本為正也推是而言之三章之分雖曰各具一事然明體達用以至體立而用行其非明乎動靜之機死生之説者所能至哉非黃帝之書亦必商周隱君子所作也信矣孰可偏於道偏於法術語也哉峴泉集卷之一
