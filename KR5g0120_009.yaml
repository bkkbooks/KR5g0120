front:
  text: 峴泉集卷之九疑四
  hash: sha256:35144a1475430ebfe949325eee0ee46e271408faf066f22f0b164381f34773d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_009-001a, image: hfl/1020/1020-108.png}
body:
  text: 耆山無為天師張宇初撰五言古詩題清白軒堪輿運元化萬有備貞一至理含妙機澄虛耿無息秉哀本明善汩蔽競膠軼上公知體仁端本貴操率圖史盈坐隅軒窗敞林苾丹堊崇搆明芳馨蔓花蔚趍陪總耆彥講貫每編帙帝戚二重藩持忠贊寧謐秋霜濬淵潔寒月皎川逸曠視塵垢徒浮榮等昏窒鯤鵬眇天池振翮靡回遹簪紱揚世勳榮名仰穹鬱願安宗杜隆千載著熙密題靜學齊太易兆胚腪隂陽運無始虛靈妙莫測動靜該至理萬彙同一初殊分鮮端紀人文判羲晝賢哲範衡軌聖學斯主靜卧龍乃潛啓天人罕一致理欲爭紛靡外溺蹶奔騑中移疾張矢澄淵既汨溷綗素亦蒙侈敦復若回轅驚馳忽恬弛寸心苟明定霜月皎秋水維揚一故胄溫篤志前軌習利稽化元靈樞究玄指詩期鮑謝工操慕關閩履遵養際時雍顯庸見旌美泛觀鄙世流顚悖竟何已敏求貴勿怠持敬以安止題修省齊虛靈宰五官四體囿衡氣至理具寸心天人斯一致脂韋情慮紛物欲肆交蔽放僻生隱微顚危焉內制凝淵昧淪溺焦火汨炎熾典謨具聖哲濓洛啓幽閟敦復匪途遙返躬若紬棄操存在持敬逸驥安六轡動靜時厥中戒愼奚必意襄江有俊彥久造岐黃祕問學鄙庸流儒先篤高志潛修致震亨內省惟恐懼夕惕若覆冰休光乃蕃賁克研遵養工日益將罔既體仁宜博施食報豈遐替寂感妙莫窺羶酋競狂戾願言肅薄夫明訓發矜勵題繼志齊乾坤運無息斯道具六經君子繼先志廓焉觀厥成宇宙育精粹矧資川嶽靈婺郡卓文胄奕世蛾簪纓詞林振高步聖域揚休聲文節茂家訓終艱欣嗣英幽潛奮舉翮雅譽躋王廷賢屛著令德錫言周睿情王君揭華扁至澤惟忠貞砥礪藉明習涵濡資內澄積中發妙藴麗藻紛瓊瑛仰止光祖烈崇編垂令名昔賢貫金石千載歸誠明題黃茅庵圖扶輿奠高厚萬化兆溟漠妙道潛至和隂陽藴磅礴名山抱環樞遐視凌海嶽一氣旋規中三花孕鄞鄂外施神靈役內固風霆握環堵藉黃茅孤笻步丹壑伊昔濟旱枯江流奮鯨鱷瓊葩祕洞笈踵嗣紛超卓嘉譽益神州玄裳嘉雄角再瞻壺子圖運墨契精朴淵默寂無聲翔飈睇寥廓題南山霜隱圖至道邈榛塞弛張安預謀玉川啓遐慕宛託林塘幽雲林被膏雨風泉響崇丘玄姿煥文豹隱跡嘉南陬淡泊鳧鶩趣微茫江漢流適兹藉肥遁焉迷機辟籌伊吕不世偶含章終見求蒙莊善違患蔚爾觀藏修九日登樵坡自遣朝旭解微隂侵晨步幽谷丘園遂遠託世網何局促千嶂聳瑶昆孤泉潄鳴玉衡門藉崇丘虛牖面漪竹物候感湍駛勞生信羇梏君子愼行藏得喪奚榮辱譖巧競危機孚誠愧鈎曲抱中守義命肥遁素安足悵懷箕穎徒瓢棄曷所欲脫屣撫喬松傾醪對叢菊秋花艷夕姿聊復適心目長嘯邈空冥達觀恥流俗傲睨雲漢期豈暇忘鹿逐居虛了無貴委順焉蹢躅課耕耦耕南畒上資植日己茂藝種各及時相知或新舊原林多豐壤泉谷每深竇耘耔己覺勞紡績夜深晝耨耜侣鄭伊先農仰周后素懷解塵合曠跡依巖岫深扃讀我書於世復何咎貧賤樂乃常蒙莊斯在宥出巿歸多遲在山起常早風霜秋已冬衰榮豈長好脫葉靜寒柯農穫藉深稿躬耕聖且然伊寧逹王道龐葛事菑畬窮通可終保群言慨古昔撫己增幽抱倦拙愧長沮揠苗僧蔓草俯謝農圃人榛蕪愼除掃課樵宿慕山澤招於焉樂肥遁幸逾羈羅偃蹇寂無悶還䇿陟荒途林栖美敦艮衡門翳蔓緑方沼涵清汶穹巘聳藍孤飛泉瀉瑤混夕聞樵揉音伐性感遐論休貞謝蹇拙澆惡何利鈍紬繹託遺言資生付農畚素諧魚鳥歡豈汩鮑醨溷養拙知曲金持盈戒滿損抱道達先機迷常信衡運曷嗟原憲貧獨契閲休困俯仰心志違流光慨經瞬濯足聊委纓狂歌滌幽憤山舍夜坐紀興潛僻非世圖幽恬足真賞晨招逸人來遠策緩藜杖叙别罄春醪園蔬兩餘長延歡喜就宿窗籟風泉響草露喧候蟲林星曜虛敞芳池瀉初月山氣襲膏壤沉寂諧靜便栖遲愜敦養輕蜩蛻污濁冥鯤絶痾癢久違商皓遊焉期漆園想燃薪盡永夕聊與謝塵鞅乙亥季夏還山居偶興末夏熾餘暑幽期諧素襟川原蔽繁緑溪渚澄滄潯田舍靜雞犬荒蹊抱深林圓淵敞靈構疊嶂羅高岑荷氣薄朝露魚波衣重隂披荆遂恬息濯㵎清間心遺世匪塵傲養真宜自任秋風動早思寫我丘中琴題山林幽居圖素業得幽勝壯遊知早還讀書匪干祿杖䇿恬丘山卜築隱原野翛然林水寬礀橋度虛落夕靄滋崇巒怡樂事耕釣謝徴足投安論交久凋落抱器無外干圖勝得仙繪高情寫幽潺顧我迂鈍質遺形丘壑間披覽啓中好從兹期歲寒山居晚興孤笻入暝壑秋思滿丘山適此松桂託倦翮宜知還商飈動淒洌池溜鏘鳴環落木秀陽岡荆扉被臯蘭起窗理散帙遠籟微鐘殘夕露浥叢菊傾樽少怡顔困亨纍咎往夷晦無尤艱懿德美攣孚反躬惟內間知天久達命樂止聊吾安大化本漚泡䖱丸邈浮干清霜藉叢薄流景倐已闌蜩翼匪雲垂何嗟遲慕間餘齡付寂寞卧疾窮幽潺冬日山居嘉遁抱素期樊籠淡高躅殘流響遠蹊杖策還幽谷野雀鳴晝屝方塘湛寒緑迅飈蕩清氛霜葉滑林曲撫感心志違含情塵網束衡門足栖息豈愧鶴鷯木久藉孫登悟曷煩季主卜養真付餘齡明命孰吾欲宗嗣屬天倫哀煢愴顚躅誠身愧靡逮崇德念虛篤洞視委順流浮羇妄煩促所悲負夙懷遺響邈轅轂積靄淨遙岑澄空皎霜月寒流響珮環露下衆星列高閣凝霧姿嚴風度凄洌反躬在立命居俟志寧輟黃鳥止丘隅馳鶩苦塵蹶有斐空谷徒玄機夙耽悅曷能昧俗趍得喪摧徑節達士固樂天何由太空閲至和妙一初滌此幽憤結聊欣梅竹芳歲晏卧冰雪負喧息南榮簷旭曖衡宇滴露響叢篁冰澌度林水寒梅競雪含藉莽並風靡四運盈縮周初陽曠天雨層岑翳薄靄鳴㵎續冷耳偃坐雲水幽澄虛足安止知天敦匪躬盡性端在己疚往謾祗晦懲初必敦履曷窺元化機遺迪仰前軌矯首慨彼蒼採芝欲誰語山居小酌贈王吉二高士初陽曖旭霽靜侣喜聯訪衡宇淡朝暉林泉足清曠偶延雲水娛豈謂匏樽廣久謝埃壒情禽魚遂間敞虛恬與道俱淡漠益天放了觀鵰鷽趍昏晝溺塵網慨慕鄭李招奚能汨飄浪愧豫日衰鈍靜退託榛莽何幸協耆英浩歌激蕭爽春雨霏雨集崇阜言旋白雲岑嬰麋感浮慮愜靜惟中林水木寄恬逸芳春意彌深遊魚躍圓泡悅鳥鳴叢隂近澗始流長落花荒徑侵愧無先幾識空此懷沖襟天道屬幽默存誠惟素心愼修匪有俟斯志將誰任水檻遺懷好遁契遐舉端居無外縈方池敞靜搆水木含餘清苦雨厭行潦聞寥諧素情園淵足鑑止內炯符清明風㵎驟喧瀑雲岑高隱冥幽篁解初籜野卉飄殘英畎谷增夏緑閲時塵慮盈玄渾有定命少洽鷗鷺盟夜宿杭之祜聖觀東圃弱齡志海嶽未冠研詩書篤慕山澤蹤恬與俗尚辜錢塘昔曠覽憩此東園廬故友昔綢繆新交協歡娛偃息青桐隂高歌黃鵠辭窗筠解初雨床月來前除橙顆正霜圓煙葭長平湖羅樽集盟好間情契高符一聞離别言漸與心跡疏陽鳥鳴悲風寒潮下蒼蕪逾紀候五載撫事因循餘坐感凋悴久仙真故何拘明發奮遐慕言返田園居王喬笙鶴音獨爾淩虛無負暄負暄愛日和雲靄薄向舒窮山積寒翳庭樹凋亦踈下泉方斯蟄田野聊安居禾黍藉隴畝返刈多空虛感念曷為整世漓跡亦殊焉知溫煦樂尚及散與樗繁霜悴百草幽花雜園途獻君亮何由蕪穢益自除寥寥太古意涵詠自有餘投身寂寞濱自謂此生足環堵翳蓬蒿清隂覆園緑聊支風雨淩寧與世緣觸息交輪鞅稀寡慮鮮惰束蔬食不求餘高趺惟弊服結習塵障生虛妄薰陶熟若淡視莫親浮縈互趍逐孰探天地和心境堪敦復大哉艮始終碩果契山木野眺北風吹狂瀾江水濁不澄牛犬行平岡木落山縱橫輕霧散林渚孤鐘度危城泊舟且無寐長河終夜鳴弊服倦馳邁積雨將寒生物情異旦暮幻質奚將迎悽悽葭菼間惆悵徒撫膺天霽風稍息朝雲度冥鴻江草淡微旭蘆洲散行蹤言旋情既舒息倦惟蒿蓬寄形區宇內浮生隨化終窮達奚足念百感徒煩忡存誠返自然修己惟時中何當謝蹇拙永託巢由風宿句容青原觀乃葛仙翁故宅道模有微運至人隱靈蹤崇構著名邑昔遊感深衷鄽埃絶委巷曲徑縈頽墉池草滋夕露輕飈響高松殿廡儼穹像凋落嗟餘蹤玄緒契踵習井竈遺西東别館延偶酌燒燈起房櫳終宵靜繁慮仰慨膽遺風涉覽在明發惕修兹勉躬神功匪遐邈萬古昭昏蒙甲戍三月二日山行霽雨解前峰幽原䇿歸路荒蹊蔓草春野水平橋度悅鳥近聲圓耕牛緩犂步豐泉隂壑鳴密竹中園素靈岫敞虛軒荆屝護雲固新流泛池溢繁翠盈窗户掃塌理殘書扶笻歷榛顧丘林適所娛垢濁豈浮慕虛淡美遐蹤顚危惕冥務安由絶世緣木石藉深處倦翮止枝巢先迷感餘悟聊舒栖遁情生意足農圃登陸文安公象山祠堂故址羲堯體乾運王道持倫綱舜禹襲神器精一斯傳彰周亡雅頌息仲尼語張皇伊說佐受命況軻司振揚偉兹大經奧百世垂輝光陵夷幾更歷明晦違天常濓洛啓潛閟建中續虞唐青田荆山璞宏聞皎旻蒼寸心宰靈妙昏塞非遠傷動靜該至理惕焉惟內强聖訓炳日星卓操踰冰霜橫經宅雄勝古象增渾厖雪館夜燈集風庭春雨長關閩覺支蔓昊楚被餘芳駑質愧庸昧師謨幸遵詳雲岑慕遠謁佛剎榛萊藏探陟訪遺舊荒田屹崇岡肅襟悚膽睇天宇澄秋陽翠臺聳前挹曠眇歸毫芒浮觀勵先躅敢意窺鴻荒湍駛難砥砫大音孰儀凰八表視環轍千齡仰休光癸亥元日初陽改歲運積雨晨將疏微和兆春育雲物薄向舒清瀨散幽汀佳禽語荆蕪飄梅藉苔徑叢竹橫交疏池萍斂稚緑密藻含清漪玩理足自悅物清豈無餘年更愧齒長學鈍終焉如嚮晦惟愼獨紳言良足書元夕後喜晴登靖通庵春陽藹微和扶疾釋餘怠真館肅虛寥幽尋倐逾載小徑迷積葉雲蘿遞空籟飄梅散輕颸竹柏紛映帶淡寂每清神晴岑列窗黛燈宵雜市喧鵲佇凌空界撫心倍仰止素託抱深賴叢隂支倦還由兹悟懸解題夢鶴軒至人造冥會踵息匪形寐物化等魂交胎仙偶靈契神區哦石房嘉子志研礪池月生蘿隂林峯蔚庭翠東書抱玄悟萬有燭衡氣隱几鳴臯音恬愈靜纖慮翩然冷風行輕舉倐騏驥仰昔軒穆遊蝶蟻漠埃棄解敵曷于髠乘軒空衛懿憂噩感情思死生孰莊委膠擾紛桔亡凝虛了浮視愧懷軒冕期控翮奮輪翅曠協緱山徒千齡渺遐逝觀鑿泉隱者事耕鑿泉源欣灌通汲遠非懼勞得泉可鄰同僕夫倦且喜世謂或神功源深流益清石潔澗且豐至化育元海周流浩無窮萬殊具一理原返知始終斂視不盈勺孰彌晝夜工怋彼庸昧徒曷窺有本宗從兹抱幽素飮潄巢由風寒雨宵雨積餘寒晨鐘入林阜枯條鳴烈風泉瀨清可漱樵採返煙扉山禽靜霜柚攄懷含隱憂慮淡無機鬥田野日飢虛天和恐傷候孤懷曷與論跬步愧良後撫景感頽波睽遠信誰搆養心在貞素拂袂絶氛垢題繼善堂璧經秦亡出遺訓幾湮倫至理纍榛塞皇哀曷迷湮濓洛啓末緒由兹見天仁貞良本彝則踐習乃益真昭晰具一本精微宜珮紳覽古遵聖謨始卒斯明淳矧子繼家學善承猶素敦山暉藹春澤茂林含夕氛談詠契朋益規針良足馴從兹勉徑操先轍宜追聞題泠風臺圖蒙莊悟吹萬達生誰足論俯仰宇宙間衰榮等毫均斯人慕貞操息此林水濱明月度清瀨空歌入流雲飛鴻遠莫睨遺曲懷陽春題無垢陳東堂清都真館抱真悟恬逸樂兹林壑居象麓雅幽託肥遁皆菑畬群峯斂几席石㵎交盤紆秋雨響鳴瀨春雲濕耕鋤迂橋步蘚徑窮島通樵漁茂樹憩晚息丘園足栖娛從知絶塵久內養宜潛虛先德副遠志休光恆與俱我昨謁衡門曉風黃葉踈傾樽滌遐慕晚别深躊躇淳誨寡俗契宿膺良匪愚典