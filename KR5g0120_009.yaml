晨凉投簪適榛穢煙濤迥塵絶心跡淡高睨豈謂續蚊鳴何勞溺禽戲空嗟夙志違局蹐增遐睇憂憤終莫排聊兹藉流憩言從肥遁賢永謝人間世步南澗作謝拙契衡茅還笻熟登眺丘林滿秋氣澗谷集藜藋隂壑翳微雲層岑屹孤峭平原過雨滋落木輕風僄嗟余困蹇運退遁匪觀徼卧病日衰遲資藥慚非少由知悔吝長得失從嗤誚擇執視污隆哺趨媚顰笑疏淪恥奔流凡陧慨殊調絲氂或勝用薄缶難終嘹息躬事抱甕適趣逢荷蓧寧效窮途悲欣洽蘇門嘯降衷屬明命玄默閟機妙哀哉狷狹徒日夕自倫燎萬化會有歸投簪藉漁釣枘鑿異所投艱貞曷漓耀譖諛遽成虎矜宥仰明照雪後早還幽人素嘉遁勵節抱貞獨冬候喜久和言旋課樵牧囂塵頓斯滌沖漠久常足雪巘翳層雲風崖峭孤木初梅含衆芳涸沼沁寒緑開軒理遺帙燃薪續明燭自悲世網嬰息倦謝羇東强涉川途艱荒徑凋松菊幸蒙休明眷往吝鑒披腹孰志後簪裾惟懷友糜鹿矧兹氛祲馳轇轕迭摧踀志心恥軒途污隆豈藩觸願諧冥寂徒洗耳臨澗曲非乏解牛硎慚媚忘羊逐席溫勾漏松棹佇山隂竹永託歲寒期冰霜靡萎馥玄隂未改春流景遽何速悟幻信若浮虛中了無欲鄙哉鱣鮪趍鯤腐甘驅促千載付室言浩歌還浚谷初秋山居雨懷暑雨解凉秋微雲濕孤巘尋源訪故廬隴升人家遠伏稻藉衡門靈泉發深峴幽岑空翠明落木崇岡展蛩語雜嘉禽行蹤靜苔蘚新流繞庭户群植日葱蒨抱此中林清寧羇俗塵遣支離信大年任拙隨偃蹇豈乏孫登期猶懷葛洪勉閲世謝萍浮狂闌曷清淺賀了庵李東堂八十玩劫每遐壽高山龜鶴齡清都屬耆德大年宜夙膺悟幻茄和久瓊房咽華精矧資儒素言存養安吾誠樂止蓬閬會涼天湛重楹晨飈注時雨夕水澄秋冥志以敦雅契悅諧簪褐盟雲濤洗瑶席月露盈金莖安貴鳩飾美宛追蒲穩行後凋越曦景名嶽須儀刑玄曆乃遲歲潛真衛群靈由兹永黃髮洞視超神經遊仙巖靈嶽冠方蓬秋清氣蕭爽駕言物外遊放棹浩幽賞溪渚抱索紆灘瀨逶迤上河伯水成宫天機錦為障仙壇雄漢基虎嘯發空響膽謁步瑶宫丹崖列竒狀賀醖釀盈瓢孟機絲在紡探尋興凝謝曠逸情過向大具聳飛樓精金赫穹像夕酌盡歡論群才各尋丈曉發澄潭濱微瀾楊浩蕩靈蹤肆險怪憂患孰痾癢姜被感情深陳膠羡才暢王恭貌愈純昊猛志須廣詞鋭善袁宏談優懷郭象島嶼僻花源汀墟蔚相望問津螺俗非幻語曷浮誑斥鷃等塵趍文犧慚世想坤維渺溟渤天籟靡霄壤適意豈猿攀忘機信鷗往預諧斟菊英臨眺孰輸曩泛覽記漚輕遐情矚虛曠榮衰倐古今雅度試豪放自非金石姿應昧玄珠罔舉首候佺期高風莫能忘信河曉發靈溪及曉發遠趣延江樹野屋帶村居朝煙散寒渚輪舂雜遠瀨浴鳥泛深浦霜露叢薄幽層岑秀鸞翥鄉還覺自慰别緒論親故久曠希世懷相知耿星曙驅馳固未久物候倏遲暮瓢飲少自如披襟藉零露雪晴夜月朔雪霽晨曦群峯峙蒼玉遲回空林眺逸趣浩心目野艇渺殘流荒煙淡疏屋層柯鬱秀姿叢薄餘寒緑曠世抱竒懷研心寡塵欲幽居怡遁貞繁帙資先勗曠跡眇遐思孤騫寧躑躅含章亦尚絅悅古宣內足萬化同氣機舒陽藹潜蓄無慚尺蠖伸頗藴藏珠櫝圓月淨霜輝高情委庭竹幽居自適天字淨春明幽居愜虛敞言從山谷栖意此林泉賞風磴濕松霏池流增雨長肥燒秀嘉木迂途隔塵鞅紫壑閟龍淵蒼岑矯鸞往焉期芝皓隱宛赴松喬想八表會靈蹤千春躡遐仰貞遁匪長年觀頤足遵養爰資飄笠慵適詎樊籠强或詢持竿語間和負樵唱萬竅各善鳴聊兹託餘響題夏山過雨圖夕雨過凉樹流雲吐層峰橫橋蔓緑翳仗策宜立中煩意俱滌貌然塵外踨鍾山豈竟隊清瀨聞高淙題淡味軒至和在醇初真味貴悠譫瘏文畫太始蚺孔論虛湛復道信匪遙履貞視宵旦幽恬中林士脫跡謝縻絆雲臥高茅峯茹芝石華粲松濤雪滿蘭偑風驚檻內固神宇完浮營慨觴濫釀酣棄元酒妍薄精鑑白首混一無寥天靜陶範題樗木生卷莊周悟齊物衆有等吹萬群植根一體竒言愈雄誕惠施拙用大廣漠匪涯岸非抱樗散姿支離豈終算淮陽一偉夫師帥久膺宦矯慕早世流高騫泝鵬翰用拙貴樗全託情契宵旦步武巳李廉馳輝何鄴鄼曰余嗜櫟杜散木與資灌千載或調同塵趍靡憂患犧樽漫姻緒倘共論排風迅霄漢峴泉集卷之九
