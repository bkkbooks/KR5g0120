華東閣畫圖新九霄鶴駕馳青瑣八極鸞璈下錦輪藩屛皇猷攄至孝佇瞻旌寵煥絲綸宿武當別峰一宿琳宫最上峰折旋石磴杳捫空六鼇洲渚浮金粟萬馬峰巒帶玉虹玄武旌旗黃道北紫微臺閣緑華中仙姿喜有虎眉叟月下期招鶴背風題雲林泉石清溪華胄舊家聲西望雲林劒閣橫壘翠排霄浮塹劫空青洗露出滄溟妙探靈笈存中谷道佐玄樞駐上京願割好峰三十六未應泉石結芳盟題周仙官禱雨卷自是蘇臺鶴上仙神州濟旱領鈎天阿香車動玄晶脈織女機翻太液泉焦稿頓回皆聖德豐穰荐致屬靈詮詞林幸睹爭推美肥遁猶欣大有年題自像玄胄何才振後芳早從問學識行藏兩朝寵渥傳青瑣八奏威儀儼緑章松菊雲中吟夜雪鶴猿谷口卧秋霜幻形底用丹青貌浩劫終期視大荒中秋憶昔琳宫夜氣清又看秋色拜恩榮友朋交義書偏積京國離懷酒倦傾前席纍承人鼎重尚衣猶愧翠羅輕深蒙眷渥知何補不寢徒聞禁漏聲賀周仙官禱雪有應內制黃麻降近臣聖衷欲雪念黎民六花幻劫融千樹八景通章轉萬鈎銀燭光浮瓊沆瀣瑶臺聲動碧嶙峋詞林頌美過枚馬共喜玄都眷渥新訪獨菴少師清晝春和十日深城南迂徑訪禪林蓮花刻漏真如性貝葉傳燈古佛心鴈塔倒垂臺殿影虬池方抱檜松隂遠公久被恩光重結杜詩盟許再尋次獨菴少師韻一棹趨馳似鶴輕喜從禪伯會神京五燈慧劒山靈護千佛泥珠海藏驚春換鳥巢應洗竹雨消齋磬過班荆茶瓜絶勝東林味况是詩郵慰野情東來雙履與雲輕久被恩光駐鎬京説法雨飛藏虎嘯談經花滿卧龍驚詞章巨擘過裴白文史雄鳴盡許荆方外同盟遭聖代禪機無惜滌間情次葛煉師賀賜衣韻春王正月始書年曉待朝珂擬洞仙禋祀九鳴聞大護雲韶八闋聽鈎天寅標夏正瑶圖建甲紀周官寶曆傳草野纍沾殊眷厚應懷園綺竹梧邊踈才自昔愧高岑豈謂浮名感聖心內醖纍承鍾鼎美尚衣猶覺芰荷深道探黃老思玄賦治洽軒堯擊壤吟歸向林泉語耆舊鳳池清夢繞于今泰階簪紱列周行殿制新頒體上皇冠冕才華聯管樂絲綸文采過班楊金閨待漏瞻天側玉輅承顔侍帝傍玄褐世承宣室重君才應未侣馮唐次董煉師賀韻樗散由來樂大年登瀛敢謂次群仙端門待漏趨綸省祕閣鳴砢候木天虎衛排霄環鵲籥龍章煥日聽鴻傳外臣豈足禆皇祚眷命重頒日角邊神州秀壓閬風岑物候陽舒會帝心雪滿建章欣晚霽雨消太液覺春深愧耽隱士鷦鷯賦願獻賢臣蟋蟀吟應怪董春便靜退每辜椎譽重來今幾陪天仗列千行昭祀攄誠並九皇學負浪名慚鐵檛才違定價愧青楊官袍晝錫風雲表禁臠時沾雨露傍歸愛耆英爭頌藻林泉共擬樂虞唐次前韻答王煉師三首寶曆宏開大有年朝班幾視羽衣仙春融貝闕明千雉雪霽瑤階敞八天綸語密乘金馬重歡聲時聽石渠傳顒瞻聖化流荒服不用銅符促警邊樵漁久藉玉山岑聖主從容閲素心優渥纍頒嚴執玉殊恩荐降倍臨深虞廷禮樂關雎化漢室衣冠梁父吟疏野惟慚無寸補尚懷砥礪自芳今五夜壝壇列鴇行陽回物候兆東皇誠通海嶽稽占畢職亞尊彜愧植楊枚馬聯芳鑾旆側蕭曹接武衮衣傍緱山久屬王喬卧詩律長懷邁兩唐題龍虎山圖道區今昔著江東虎踞龍翔萬壑雄紫翠峰巒三島外金銀臺閣五雲中天低絳節來黃石地亞瓊旌候赤松橫槊停驂肆登覽展圖何俟覓方蓬玄都道域重仙山翠水丹崖四望環萬竅摩空喧地籟九霄飛佩謁天關丹光夜燭驪龍躍劒氣晴追羽鶴還喜授靈詮探禹穴大廷好為説幽潺題孫康映雪圖積隂飛霰下瑤臺四庫懸帷晝不開大地瓊花光有隙半空玉樹淨無埃山隂蠟屐妨尋竹官閣蓬窗類對梅千古高風增起慕雲仍遺澤喜多才重登大華山三謁高仙萬仞峯躋攀百折上層空星垂華蓋青冥表天接句陳莽蒼中近擬梅欒還羽珮遠招揚許躡泠風真猷千古齊山嶽玄澤題洞霄宫天柱珠宫海嶠寬餘杭别道擬躋攀白茅洞隱雲中虎青嶂山空月下鸞杯泛湖波千頃碧瓢翻泉溜九霄寒覽圖便作憑虛想卧滌炎埃一挂冠登河圖仙壇仙伯神丘失故宫河圖遺墠護諸峰南溟海嶽懷秋佩北闕風雲憶曙鍾夜月影歸華表鶴曉雲光動葛陂龍塵情代謝渾前夢浩劫靈飈遠莫從峴泉集卷之十一
