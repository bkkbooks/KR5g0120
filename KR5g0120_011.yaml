front:
  text: 峴泉集卷之十一疑六
  hash: sha256:b9c0dac2167754ddafd655a213aba55a554a42616c789bf702bb559b07d3689d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_011-001a, image: hfl/1021/1021-024.png}
body:
  text: 耆山無為天師張宇初撰七言律詩聖節賜宴奉天殿天開萬壽正秋清百辟瞻趨感聖情金節擁雲來輦輅錦袍曛日照階楹禮陳內饌香緘近樂奏宫韶喜氣明盛典優隆垂奕世顧慚野服際恩榮癸酉九月二十一日坐冶亨蒙召賜還山賦此以紀聖德玄圃新亭王氣浮承宣飛騎謁宸旒綸音降闕融熙日天衛臨軒肅素秋野服許安松菊主崇班敢倚鵲鸞儔帝恩高厚慚何補瞻戀丹心仰盛猷欽承聖諭周神仙進藥之異於教有光喜而賦以紀之聖皇體道美玄綱廬嶽名仙啓壽康方朔未專從漢武廣成端候授軒黃千春鶴算丹砂妙九陛龍顏玉液光綸語從容欣厚德小臣抃躍誦彌昌立春早朝曉趨天仗拜王春喜睹陽回聖德新偶牧迎風分鶴禁彩犧乘露進楓宸千官佩紱歡聲動萬衛旌麾洲氣均從此太和臻至治山林疏野仰絲綸太廟陪祀歲暮東闕明禋肅廟堂玉階仙仗晝輝煌天垂帝几臨彝鼎日駐皇輿耀衮裳萬衛旌旄環鳳閣千官儀羽列鵷行微臣草野欣膽祀嗣服從兹履百祥已巳元旦早朝五夜晨鍾啓禁闈仰膽天闕曉雲齊掖垣趨佩香輿北阿閣鳴鑣彩仗西雪色遠臨青瑣闥春光微動錦韉泥盡祈帝澤同甘雨河嶽增年感鳳栖長至早朝侍宴日迎長至藹陽春天仗顒膽禮樂陳輦輅星輝銀燭曙珮珂雲擁錦韉新花明內饌傳青瑣柳拂宫袍侍紫宸深愧幸陪鴛鷺簉共欣聖德布淳仁癸酉九日賜宴華蓋殿曉城風雨總煙霏令節開筵拜寵輝玄館濕雲迷洞路官河疏柳帶皇畿菊英泛酒宫壺溢薇露飄庭苑樹稀祖澤沾濡蒙帝渥鶴袍惟覺愧身微九日上旨賜衣兩承恩眷錫宫袍琳館傳宣愧幸叨使出尚衣增羽珮寵頒阿閣引靈璈香羅日瑩浮蒼琰輕穀風和拂翠濤國祀精誠當竭報清光時被戴崇高十月九日蒙頒賜復戴殊恩出建章故山臺閣頓輝煌名聞青瑣傳常侍詔下黃門授省郎霞彩濃斟步兵酒雪花纍食大官羊獨慚野服知何補願覩黎元濟粃粳癸末十二月二十七日蒙頒賜法服內使馳宣降蘂宫金衣烜彩拜恩濃鬱蕭星斗輝三極警蹕風雲面九重聖澤雨濡沾禹貢皇猷天廣頌堯封極慚疏陋知何補敢俟圮橋禮赤松齋宿朝天宫貽王東白煉師地接瑶壇秋氣高獨慚山客侣耆髦長蘿市户玉勾鎖密竹過人金錯刀曉雨只耽憑棐几暮寒應愧想綈袍書鄰賴有華陽子孤鶴更闌鳴九皋題方壺萬壑雲煙圖絶世壺仙海嶽情慣憑灝氣混滄溟雲岑杳靄凝嵐色煙渚微茫遠瀨聲自擬靈峰覓勾漏誰從塵劫話彌明高風寂寞徒追慨八駿何如汗漫行中秋同周貞白飲湛碧軒秋色平分月正圓清論喜共會華筵鼎彝妙畫秦斯法科斗遺文漢象傳露瀉芳醪凝瀲灧雲濃琪樹藹嬋娟番湖耆德于今少幸播清芬樂大年觀溪右因懷舊藏靈辟玄玉竒峰孕秀靈九天雲霧夜還生燕山丈室仙洙泗昊渚煙濤海渭涇鶴韻每添書榻潤龍光時近墨池明山人故擬崆洞壽靜屹天根韞妙精題方壺雲山秋思圖玉立層峰曉翠寒最宜東閣靜相看霜林風露含珠潤秋水芙蓉瀉練寬折屐正須同野步直鉤誰獨倚長竿自緣北苑神清會有分雲山足考槃題方壺高深海嶽圖海嶽菴居鐵甕城壺仙品格會青冥鯨濤夜吐胥潮白鰲背秋分劒閣青待約琴高淩汗漫尚疑中散走精靈侯嬴家住虹光渚冰玉時看滿户庭遊昭真宫贈祝洞天煉師猶龍之徒鼓橐籥石室久與神明居群峰過雨暝投屐一壑卧雲晴理書丹爐光現虎時嘯雷笈風生龍每噓昨我尋真醉方起寤寐思君長晏如遊南山湖上蘭橈桂棹盡幽潯小劫真遊到夕隂雲護鶴飈蓮一葉波搖龍島石千尋竒峰遠貯金銀氣靈籟時飄紫翠音勝集幸陪塵外賞山林餘韻託球琳題三茅山卷遂古仙壇句曲東茅君觀閣聳三峰神經藏石追秦刻祕册傳家侈漢封到席珮聲春隱豹濕衣劒氣夜降龍我曾羡讀登真訣願住華陽若箇松題清白軒清白傳家仰令名高軒覽翠挹川靈空青珮綰留驄馬翡翠簾開展晝屏春滿圖書雲到席晚酣詩酒月移庭由來忠孝椒房重野服空懷睹聚星題方壺茅齋圖丘壑茅堂澗水濱清暉寫入碧嶙峋嚴光釣瀨雲為宅韋著書籖石作鄰樹色送涼峰斂夕瀑聲飛潤谷藏春壺仙飽得幽潺趣寂寞高風屬幾人題白雲軒侯門别館五雲西林壑清襟擬鶴栖月滿金罍垂柳重風回銀勒落花低皓衣雪瑩期朝鵠絳幘春明待曉雞高興豈同山野趣皇圖光贊與天齊題松筠軒貴戚高門倚繡屏松筠猶喜護長青雲濤繞閣茅峰秀雪色侵門剡水淳朱户緑纓回晚照錦韉銀燭戴春星幽懷豈比山家味拂石冰霜澗響泠題凝清軒甲第高梧碧樹秋清芬繚繞壯神州花凝煙霧空連佩風送江波月滿樓黃閣晚題鸚鵡賦玉臺春暖鷫鸘哀芳名盛喜過潛耀野褐馳情愧狎鷗南山淵靜軒宴集瑶池仙閣並方諸真賞何殊罨畫圖繡閣迎風回芰藻錦楹披霧帶菰蒲筵開晝日蒸霞穀臺瞰秋波絡月珠絲服獨慚踈旨養宴歡豈必讓東昊山人獻紫芝二本喬林瑶彩結靈姿野老窮幽解獻持玄霧擎柯瓊化璧紫雲垂蓋玉生脂清溪道士耽山癖甪里先生任世疑共我風霜老丘壑休禎豈必愧華詞遊水簾洞幽洞雙關入杳冥瑶林隂壑後先行層崖珠落簾收瀑疊嶂屏開錦列楹擊石尚須期嘯父捫蘿端欲候仇生礀阿藉地林霏暝寫盡絲桐世外清採瓊林間碧桃桃池自是仙家種絶愛林間碧海枝弄玉洗粧雲母障飛瓊整翰水仙墀驚風不動塵回劫和露微凝雪滿肌折向山窗寂無寐恍疑笙鶴下書帷飲湛碧軒賦石鍾乳杯石乳傾醪粲蘂花飛霖尤喜注仙家照衣練白含窗雨浮臉猩紅泛洞霞自愧酒酣倫庾衮宜添文彩屬張華衰容尚借資培力九日何須更問賒題赤壁圖雄文豈獨過莊騷千古高情仰素遭夜月扁舟經夏口秋風野屋倚臨皋周郎遺迹成孤鶴葛亮精忠壯巨濤擬似雪堂携二客丹青有待覓竒髦題孟浩然踏雪圖鹿門高隱卧冰霜踏雪行吟韻思長詩興自應淩鮑謝木名豈獨契王張野橋寒瀨偏幃帽山樹驚風逐縹囊猶抱孟亭千古意墨華寥落見微茫山人獻石石丈欣移紫洞雲幽人辭綴錦囊紋隂精墮地凝春雨水沫成霞集晝薰蒲牖風長疑鵲化芝房煙暖夢星分山家拾澗寧庸煮雅好深知滌垢氛楮帳雪楮乘筐寫練光方幃連緝稱雲床春冰暖動乾坤大霜月輝澄漏刻長華嶽卧龍從偃蹇漆園蝴蝶任飛揚本來內外俱貞白根蟄嚴冬氣八荒爐炭積薪穴火勢迎空霜雪嚴寒衆樂同煉質自堅非性黑敲聲舍響愈光紅木金成象明丹候離坎周天奪化工莫使吹噓煩橐籥天機流動六虛中題洞玄子卷早慕玄虛讀飬生久趨天仗住神京太虛本是渾侖體空洞中含寂默聲雲氣屢乘霞佩遠松隂長護石房清五千言意須融會坐贊皇猷答聖明訪朋山如愚煉師榆原真館榆晚高堂續搆成獨橋雙澗步秋清牽籬野蔓殘花影繞户林塘過雨聲種术圃通黃葉路採芝人老白雲扃纍曾約訪朋山主且遂茅茨話拾荆題白雲茅屋圖太學傳經荷主知謾懷山谷媚清輝短簷生白雲藏室老圃凝寒竹掩屝簪佩未應辭禁闥丘園底俟覓漁磯詞林信有歸田詔願假藜光照槲衣贈茅山王道士早住華陽六十春玉音琅韻異常聞白雲庭館鶯花靜紅葉林皋月露分鶴背豈須笙作譜龍光直使劒成文會須石室哦空籟楊許遺蹤絶世氛題太和山太和磅礴結高峰北極靈飈望拜中翠壁暖雲丹臼穩瓊臺疏樹劒光洪澗西梅榔分苔徑天外旌旄護蘂宫闕下多君蒙聖眷故山遙對晝圖工遊桃源山桃春盡徑難尋苔蘚階庭老屋深崖瀑蹤錚蒼澗塢石門曲折古藤隂雲中雞犬栖雷室谷口園田帶虎林曾就丹房留兩宿遍詢陳迹漫追吟繁禧觀訪友溪山勝處絶塵紛路入瀛洲訪隱君門外野航魚躍露松隂高閣鶴巢雲青藜曉值穿花入黃粟晴看掃徑分不有故人清誼久素懷寥落竟誰聞題方壺夏山圖越絶竒嶠趣最高一溪春碧未空舠雲連壼嶠從招鶴天盡岷峨已斷鰲老屋靜依村暗靄長林遠帶雨蕭騷江南遺墨今逢少轉憶方干獨世豪謁留侯廟昔從列國有封疆黃石三期授素章韓隙豈論車中復楚兵已定斗分降言回雍齒非仇士説奪淮隂易假王晚嗣叨光懷祖烈每經祠下意傍偟遊雷壇虎踞顚崖聳石壇風雷四望起林端紅塵下視渾埃壒赤日行空欲羽輪芳樹若煙猶路靄琳宫天闕正高寒坐令頓叱蒼精劒長躡煙霞響鵠鸞遊靈芝岩披霧朝尋虎豹蹤倚崖磐石獨嵌空紫芝煙暖靈根長翠壁雲深野路通古木千齡忘換劫落梅幾樹漫飄風澗阿蘚磴猶陳迹隔世清遊豈偶曰題湖光山色亭江左湖山百郡雄近椎賢守足高風官亭水泛天光裏芝角嵐深月色中皂蓋新謳聞德政玉堂遺澤見清忠春帆曾繫逢煙雨尚擬雲濤絶賞同題聖井山天瑞白雲圖金仙昔住龍湫頂萬頃白雲如海濤夜行石澗虎長肅晝坐雪堂風怒號太虛一息渺蝸角濁世萬有輕鴻毛西來瓢笠探道者妙墨倣佛超塵勞題方壺霖竹壺子神情廣漠遊獨傳遺墨照千秋石磐踞虎雷翻蟄竹灑驚濤鳳在丘甘雨作霖回呈劫靈書藏笈祕玄洲自應宿契凌前古尚使淋漓濕翠流遊南豐神龜國龍翔鳳翥結岡巒玉府神遺舄壇翠峭軍峰當北面青連龜嶺互東盤春藏林谷天光淨袖隱風雷劒氣寒愧我瓊函嗣真子仰求靈迹重躋攀黃堂觀答同遊者策鶴衝林度板橋仙姬靈館著香茅天垂四野雲雙屐地濕春空雨半巢翠竹繞簾疑卧虎紫函盈笈逐潛蛟誰家獨得西山勝借我東遊折幾梢峴泉尋山得勝地仙家區奧屬清都敢卜林丘有分居山色已分龍壑翠泉聲待致鵠庭書蘇門浩嘯疑聞度句漏丹砂稱養虛天付白雲安敢拙甘隨瓢笠寓屠蘇題山輝海潤圖關西華胄衍遺宗溪上林堂住楚東十畝春雲青嶂裏一庭秋水翠屛中丘園逸興推潘嶽編簡清芬憶馬融粉繪宛疑窮海嶽尚求先澤挹流風冶亭秋宴聖主開圖駐六龍冶城山嶽勢盤空鶴亭雙立煙霞表鸞路中分檜柏風瓊樹涼添侵袂碧瑶杯新酌照顔紅醉吟近屬仙都伯共仰殊恩宴蘂宫懷峴泉孤峰盤石記間栖贈蹬風塵夢不違闢野茅簷當夕沼鋤煙石磴媚寒暉半林花雨春隂薄一塢芝雲礀道微幾日秋空更黃落尚疑清夜坐苔磯壽曹道録永算欣看甲子周養真端稱上京留先春桃熟霞披氅長至梅芳露滿甌大庭清問過顔駟內典精論擅楚丘近别遽成雲漢隔高齡惟頌八千秋芝雲亭觀泉白雲谷裏營巢久為愛山泉類養蒙天窄户庭微俯蓋地分光嶽小盈弓良田際野同諸葛秀菌登畦後陸通雲畔紫芝時可食不煩人世覓孤風雪中宴曹道録玄都綺席宴西清晝雪繽紛瑞色明仙醖已春雲寫緑洞梅先臘霧飄瓊淩風皓氅環鸞署訪竹華簪列鵲楹愧我林蹤叨勝集遠期眉壽永恩榮題方真人秋風茅屋圖誰家磐石小漁灣淡冶林皋戲墨間靈籟濕空招鶴遠萼隂遲步共鷗間秋風老屋楊雄宅流水衡門謝眺山我德竹寒沙碧處看圖尤使夢飛還正月四日得旨還山賦別傅仙官纍月承歡集竹宫帝恩隆渥詔還東箕纏光動煙霞表鳧扁首傳月露中霽雪野橋春渡雨暖雲歸舸夕潮風臨觴愈覺離情厚鶴髮龜年冀與同別曹道録雪霽相過載笋輿瑶臺春晝玉堂如秦淮水泮春潮長昊樹煙消夜雨疏仙署紫貂雲步障江帆烏帽霧蘧廬别懷半載林泉隔煉液期探錦笈書冬日山居愛日暄和曝晝暉空山池角掩荆扉白雲席暖樵分住紫洞人還犬護歸雪茗湧濤泉乍細松醪炊露客應稀間清為促梅花早谷裏行看盡翠微上巳山居述懷涉世多慚覆徹蹤山居竟日坐松風水添龍井雲蒸澤林亞鯨濤霧障空池藻漾鉤分近緑若花滑屐步殘紅浮榮笑競真匏繫樽酒怡情豈世同冬晴尋渾侖菴故址杖藜窮谷信幽尋絶巘琵琶澗道深田野平原通窈窕草萊遺址歷