front:
  text: 峴泉集卷之八疑三
  hash: sha256:3326043f3ded8627d01149406b77af9988dd78a0b28527efd18aa4931abc3289
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_008-001a, image: hfl/1020/1020-076.png}
body:
  text: 耆山無為天師張宇初撰賦淡漠賦粵太初之沖漠兮紛萬彙之資生爰混沌之始鑿兮列儀象以為徑根動靜而始畫兮迭竒耦以五行曰圖書之是則兮立三極以權衡時俯仰於浩眇兮互消長乎生成維三五之妙合兮宛歷環樞而內凝絪緼以坱圠兮煌耀而惚恍漠虛靜而恬逸兮求玄珠於象罔湛一黍之空懸兮儼雲蒸而霓朗抱規中以濳淵兮廓浮游以𣶈漾旋乾坤之復垢兮協降升以轅輞濯暘谷而遹皇兮傑扶搖兮沆漭策茝旆聯惠縗兮謁靈君於輝晃咽玉液與桂漿兮翳綝纚之鬱怏乃授而曰混茫兮超淡漠乎寥聞是庸滌此淟涊兮返玄精於藴質駕黔羸之曖曃兮御六氣之豐蔚貫離明以實坎晦兮乃弭節而運一息何周始之無端兮曰涫𤄵而有淪期羡得而遐舉兮由乃味孚醇真松喬矯而壽考兮奚椿松之與鄰彼豈信偷生兮潛崖谷之囏辛志冰霜之高節兮眇幻有若漏塵豈紛華之謂美兮溺粗穢何由論慨豫生之蹇鈍兮徒留志乎昔芬漫先訓之紛糾兮悒豫中之莫伸怊惝怏樂大化兮薠衡槁而隱綸棄訑謾而釋䇿兮叩厖鴻乎問津絶桑濮之蛩嘒兮大音浩乎若聞胡康匏之見寶兮又何顧乎商敦慨枘鑿之鉏鋙兮若異質於𦳷薰尚何眷㸌煟兮每希榮而嘆悴孰不固豫之操兮仰老列之猶貴伊楊雄之守玄兮且美根而密閟矧屈子之遠遊兮亦中存其灝氣濬沉濁以虛待兮聊潄鑿而猶豫遠姱燎觀隅隈兮宜殉潔以蟬蛻惟賈誼之哀鵬兮了死生以奚慮孰若御厥冷風兮造列缺之何繫外爾躬之附贅兮豈為物之蟊蝟落晨星之寥落兮徒餘光之衍泄悲埃壒之厄陋兮獨徨徨而憯惻紉蘭珮而欲遺兮搴薛蘿以謇釋睇芳躅之欲追兮邈高騫而岝峉粲露華於菊英兮感質而形踖齊物我於稊米兮曠窮途而奚恤仰威鳳之高翔兮曷德輝之愔嬺懼跂鱉之跬㘓兮騎膠轕而靡軾將求之以叩丹丘兮詎知無言之玄默操耆山操山之巔兮莫瞻龜魯山之木兮莫中斤斧山之幽兮祗以栖處志之遺兮世獨豫忤皇初有作兮嗟余焉睹歸樵操我巢於林孰覿其憂伊我遐慕曷敢不由懷古之人惟守我常樵斯我探胡使伐傷彼牛有蔚我往曷銍世莫豫心奚悲我音佩蘭操蘭之芳兮其質漪漪我將佩兮孰覿我思遡其遠兮霜雪靡澌陟其邇兮榛棘維滋我植而晦兮悲其潜斯潜兮潜兮無揚爾馨兮無華爾姿擬神釋天倪邈難窺萬彙紛往復至理融大鈎一本森化育虛靈宰妙樞氣機運亭毒消長互詘伸玄渾體群屬昭晰亘一初垢氛曷驅束夭壽豈二途短修更羇促松喬古仙人騁駕逸颷躅嬌首願從之孤騫眇趍逐委順埃壒中攖寧去污瀆肖形等蟬蛻濡沫更統族曠視寓六骸贅疣奚見獨濳真絶町畦淵徹淨無欲誰云昧喜懼旦夕每藩觸廓然外天地吹息猶轉燭千齡垂耿光至神永昭煜述懷忳忳穹壤間一氣互磅礴宇宙充八紱虛靈湛真覺紛華苟螟聚橫戾競奔鱷爭論桀跖違曷志孔顔樂凝冰惕霜履熾焰撫薪愕孰達衡運幾聊從淡遭泊誠道洞一初精微曷綿邈秋空徹靚淵霽月瑩潜壑千古奚與同休焉守沖漠寒暑迭椎遷今古更代謝健行運不息圓方奠高下雨露孰非教風霆備生化至理宰氣機裁成範陶冶大哉體誠明遵養緝純嘏立命斯建本憲章足資藉曷令斧藻乖愆癘乏甄煆淇澳漠餘聲玄功漫悲灑孔墨素殊道孟徇良異功間關赴衛魯王道終誰從淳于志不屈堅白歸孫龍齊頌鼓騶爽美新慨楊雄玄言晦鬻老關鶡知求中莊列壇雄怪駢到師談空立言始周弊誕謾將焉窮善時苟不利曠達歸無終至道妙三極人文著皇哀仁義本天性賦質何智蒙主敬乃純一操持愼厥躬中和宰衡軌發育居神功鑽仰思纘緒危微惟篤恭昧彼夸毗子岡趍濓洛風幽貞抱遐慕郛郭將奚從樂只魚鳥住契兹泉石從寥寥太古調俯默還羲農抱真悟懸解齊物採吾玄偃月兆鄞鄂規中契潜淵虛明冏樞極妙契交回旋陽火溢真候隂冰解寒泉黃中運輿轍一息還周天瓊液孕靈根玉華爛芝田神化匪言測徴圖浩冥詮夙味玄命祕乘風招偓佺太和在葆合控駕凌高騫坐忘燕踵息薄俗紛馳縈苟知達生理洞徹性命情追提匪遊刃犧繪信天硎禍福相倚伏存亡宜自明贅疣盡土苴貍辨奚足徴申公竟返轍轅固終途行巢許愧清流叔時號賢卿浩歌揉苓吟豈復罹攖寧屣步誠跂鱉寵辱何足驚盜名鄙田史醯蚋奚足悲禽犢乃身美蒙鳩匪苕危仲尼返鳴犢虞公去之竒僖負豈蒲葦蹇叔空騏驪卓礪招遠風千齡美同歸吁嘻魏莊子胡獨嗟嘆為採葑行且歌永赴山林棲天地亦形器隂陽擅屯蒙吹萬紛錯行枘鑿焉偶通糟莩妄沉溺𪀊掇奚均同素履貴貞固含章視文中却缺藉耕饁蘧瑗潔有容弦章謝魚乘沉猶絶羊蹤尺蠖變蒼黃誹譽戒木公衛風慨柏舟川逝何匆匆林類默無言拾蕙歌幽叢擬古朝陽升東樹微月流西岑鳴河遡急瀾衆鳥亦交吟春夏氣候殊凉燠自駸尋遐慕期永託斯人藹蘭襟邈然與世隔空睇瑶華音騫修曷為言感慨授吾簮靈隂晦陽彩清風入床幃梁燕巢舊壘濱鴻起高飛庭木鬱南榮川流迅東歸枳棘塞道途躊躇竟何之陟彼崇丘高苞蕭四紛披去去勿復言緇塵易沾衣迢遞東山行透迤西北蘭佩之欲何歸烈風吹暮寒凝氛日沍凍霜露涉愈艱所惜芬馨質恐貽蕪穢殘泉流聲悲咽玄蟬號空山隰苓空欲採俁俁奚獨安東山高且夷溪流急何深翔鳥奮高飛浮雲結重隂春芳茂百卉悲風蕩陽林榮悴等朝暮老大徒駸駸富貴焉苟圖窶空恥千金商山紫芝秀園綺終何心驅車出西城城野多芳樹霏靄霑裳襦繁隂蔽庭户寒日下長河迢迢南征路念我久離居行行重回顧人生百年內憂歡知幾度明月照崇岡衆星才四五悵望欲何之凄淒秋風暮冬入寒氣至北風吹楊園落木號秋聲夕景照西軒不知夜未央星彩明且繁秣馬涉堅冰遊子嗟路難念我平生懷接跡難為言冰絲抽妙音餘響流雲端矯首千古思轉燭復歲寒東北有嘉樹日暮微風凉霖潦益載途浮翳猶飛揚夕照下西嶺餘光燭幽房白露盈階除明河低復昂披衣起徘徊胡為多內傷但恐志願違握髮倏己蒼擬遊仙蒼蒼山北芝英英崇岡术芳縟晨夕艷柯葉自蕃茁羽珮期天遊絶世倫高逸翹跡青溪外曠視濯淵潏暮昔浮丘翁永嘯駕輕䫻卓犖窺峻島翺翔控回靄遠引趍六合豈貴徐韓術浩歌企明轍漠然藉幽密閭閭聲利宅丘山潜遁區駟車奚欲營何事返蘧廬攀林陟崇岡援臯俯清渠層岑足低佪焉復被長裾崆峒隱柱史鄭圃卧一臞達則奮鴻舉超能肆淵魚冥棲煙霞表浩嘯窺元初靈峯高萬仞中有學仙子霧凝崖谷巔雲蔽泉源涘孰測彼何斯聞乃葛洪氏抗跡泝羅浮神丹資久視軒蓋東北還珠林佇鸞趾瓊姬逝我往泠然奮輕羽靈均辭曷通膽首竟何俟擬招隱步屩事栖隱幽蹊歷回迂林託匪雲構榛蓬藉荒隅幽蘭被崇臯餘芳翳環居遙岑列崎𡼲喬林亦葳蕤惟藉耕與牧疇畒己菑畬胡爾役羈峻谷乃吾娛商洛潛東園高丘憩長沮遲佪曷彼招誠欲歌接輿偃息中林阿杪日敷榮下下有清池曲足以滌塵纓薈蔚蒼森中松桂徑且貞叢薄蔓蒿莽寒泉瑩孤清組綬罕兼善退遁可獨膺荷篠跡荒途巢由絶紛縈至人非前厄大化聊斯乘悵望將孰契踟躇挹餘馨夙幕中未符行庭空徒倚徙倚竟誰從斯人卧衡葦晨陟西嶺阜暮返東臯址崇岡屹高屏繁木森茂扆企越慨風篁懷陽嗟露卉林孽奚亭亭流雲被層峙虛巢薄輕條靈蔭藉幽宇蹇拙寧有俟聊欲憩穹斐遁利足居貞振袂安所止擬形贈影萬物同一本盈虛乃其常天地亦形器流行藉柔剛健順恆不息太和胡內傷浮生等幻有靈明昭否臧窮達妄蝣蝟志違難合張趍馳苟污濁沒溺為身殃自昭耿不昧明德誠無方夕惕愼吾履乖違甚冰霜願言紳斯語庶以善自疆擬影答形寓跡俱朝露踐形貴彌肖乾坤等氣機隂陽曷窺徼萬有羅紛紜趍馳競喧耀昏冥日昧淪汨溺甚污蘸放癖忘羶漓何由返明照至哉聖哲徒針誨聿弘要跬涉猶履冰敬持乃熙紹誠身愼厥修毋墮百齡誚大化同一歸澄虛以觀妙擬古意養心見天則動靜環無端義命本一致降哀實幽蕃皇皇群聖言服膺惟肺肝盡性斯固執操存匪貞艱危微在主一居敬回奔湍馳鶩當寡欲炎凝生燥寒乾健宜不息化機運循環誠身乃立極歸會良非難哀哉曲辨徒嚄唶分外干蟺蝤金史華蟪蛄秦趙歡緬默謝浮趨憤悱增浩嘆云胡鴻碩生自昔含悲酸仰止千古期窮神斯大觀雜詩晨隂收陽彩風雨來北林節更物候變列樹增繁隂偃息庭宇靜園禽流好音仰止先民懷扃坐抱虛心高蹈慕原憲子貢嗟貧侵靈域安寂照藏密將自任崇情協逸尚慨獨散沖襟拖履歌黍離曠跡惟川岑曙星曜餘暉圓景艷秀木達旦隂蛩吟清霜淡叢菊遵渚鳴飛鴻汀葭翳繁緑美人隔秋水矯跡卧峻谷王霸邈遺風袁安偉若躅歲晏欲相從整駕聊躑躅逶迤朝陽暉倐已在林曲旦夕氣候變林園散餘清飄花委返照向暮蜻蛚鳴首夏暑未炎芳草交池生息倦步微月凉颸白露盈棲遲慕周燮偃蹇懷管寧高視悲幻化顯藏在人弘用懷泉石侣脫屣絶浮縈孟夏多涼風炎暑尚未周芳樹葉雲布晨鳥喧相求幽芳被叢薄徑草亦滋柔日入欣有託荆榛翳崇丘人生等過隙縈縶俱蟯蛻賦芋惑群狙外身固無尤玩道猶醯雞何復百世憂生無涉世意舉俗非吾知身幻每朝露哀樂常相隨天地觀大全一氣聚散之安貧覺富勞守賤忘貴危班彪素嗜古周黨良屈竒委和去紛鋭禍福非所貽世無黔婁士斯言當告誰寒冬無停運四野交重隂日暮浮雲馳悲風響踈林棲鳥鳴故條懷春發幽吟膏車昧往轍控翮稀翔音遐託祕玄招曠遊謝塵簪景光駛飛電曷由契筠心遠矚憩陽岡孤騫渺嶔崟浩觀漠萬化誰足攄吾襟旦氣忽舒和清明炯無翳流觀洞八垠長養萌萬彙膏雨鳴檐端春陽藹涵煦晨風動高林浩蕩長川逝枕藉惟群編虛中迪先志塵羈弭迅奔情垢息炎熾曷睇龐萌招奚投薛方契慨彼逐末徒寥天昭象帝秋興烈風鳴高樹悵然知有秋晨光變川谷日夕天雲浮積雨解炎候繁隂急鳴蜩延佇感代謝披襟獨綢繆浮生並蚊蚋吹息同啁啾含慨尹生怍緬懷閎夭侔委蛇中林託憭栗曷少瘳貪餧競鈎餌俇攘焉自由玄聖欲無言誰當解吾憂苦雨漲寒潦愁飈終夜鳴悲蛩響庭户野渚荒煙橫草木益黃落撫膺群慮增明燈起床琴理韻難成聲邈矣黃唐化愠倫徒內盈凝隂肆淫溢坎壇隨晦明達旦耿無寐徒兹悔吝生湮淪既自昔竭蹶焉遐征泛觀等一瞬聊復釋餘情耀雲提蓐收秋氣日蕭瑟霜露漸慘悽蟋蟀鳴寒夜晨霏翳穹林翔鳥息幽澤櫹槮被餘姿撫感動悽惻流俗競處羅先猷鮮繩墨隂氛蔽交衢𨁻蹀逐榛塞宋玉慨悲風靈修仰貞則濁醪餐落英軼駕企休德九畹蕙華滋凋林菊初白聊從淡容與疇能冒時責朱曦淨炎威商候變金素晨林揚迅飈庭草盈白露落木被微陽莎雞鳴近户通波泛平川鳧鶩鳴遵渚潛居靚杪秋代序曷停佇煩憺千古思高鶱邈遐愫徒增惠連感豈眷安仁慕結軫睇鴻軒濯纓欲河赴棲遲丘園樂俯仰藉幽顧怊悵樵採蹤浩歌漠中路謝拙契林卧養痾群慮消重隂翳肅烈漢潦瀰崇朝嘉木淨飄脫幽蘭長芳苗索居信虛淡中谷何悽寥郭泰己巾墊費貽宜轍遙埃風熾僄狡感惕煩中焦匪藉丘壑憩胡能絶喧囂偃息任寒燠操觚賦嶕嶢寒泉足自瑩一滌心神超放情歌谷風輟策羲農招次韻蘇素庵寓興形質俱幻有陽剛獨貞堅乾坤備健順至理盈中悁久曠山澤遊春深長芳草悠悠懷故人千古同斯道脫跡遺世紛言慕巢居子披榛事幽棲道在孰吾否落落山谷趣偃蹇卧中林濳居守淵默千載惟寸心次韻蘇素庵雜詩積雨晦餘春幽禽語芳樹飄花委夕風寒流盡東去節候逝驚湍浮縈渺馳鶩澄觀了萬化形色自新故晦息斯內持操存自朝暮述古欲無言刈苖長餘地貞幹淩歲寒松柏豈凋瘁培養宜及時耘除淨榛穢洞觀萬古期明德匪行至微月出東嶼明河淡踈星露華集灌木衰草隂蛩鳴虛襟坐長夜撫慨攄餘情萬事等埃腐云胡勞死生悲歡偶大夢歲月徒斯征感此奚足嘆百年同醉醒物性具至理託質溷賢愚利害相紏合殉溺非智夫哲人達天德生化紛榮枯貴富恥貧賤降衷初本如衡茅謝形役養拙安吾居蒙莊悟在宥遺幻以休休鄭列語天瑞矯抗絶時流寓言悚萬世解為經濟謀功業付埃壒身名了無求惠王識大瓠從此忘春秋明鏡燭妍醜精光匪轉同止水見鬚眉老少非外容鎮鎁號剛利於伎均屠龍慨此千載士琢礪須良工次韻蘇素庵詠懷物生具一本根委宜相因孩提稟靈覺靡不知所親降質等彝善明晦猶朝昏先訓發深蔽荒嬉遺精勤至和塞宇宙膏味非足珍昭德在躬踐嘉猷必誠身懷兹每嘆逝川月披浮雲虛庭被朝旭暄和欣自得踈竹鳴輕飈荒苔鮮行跡幽居樂靜恬浮務寡馳迫薄俗安流趍摧本曷滋植恣睢日膠盩念之耿深惕熾濫宜異勢凝道斯至德經訓藉遺轍內損乃吾益愼哉勗初志操省自晨夕題崆峒石房圖神媧鍊焠瑛圮叟化靈石惟此天地根琳房孰鐫闢崆峒世名嶽妙冠軒黃籍飈宇曠天遊抱真慕遐跡宜兹冥寂士遠託契空碧露菌益椿齡霜松資服食靈籖寶玉書大藥訪金液邪好在清暉幽詮窺太易揚江夢川瀨韶館憩歸舄不有壺中仙玄黃圖一息雲含空洞居月瀉金波夕隂壑秀瓊芳流湍注回劇栖神廣漠間浩蕩方瀛適稽首廣成君澄虛守玄極峴泉集卷之八
