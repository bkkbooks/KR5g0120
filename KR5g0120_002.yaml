body:
  text: 耆山無爲天師張宇初撰序太上混元實録序道之立教先天地爲之始而後天地不知其終也其始於太上世惟傳黄帝時號廣成子帝嘗徃問道崆峒山後乃鑄鼎成丹而上昇矣及考之傳記見之他書皆曰生於殷爲周柱下史後轉爲守藏史積八十餘年太史公謂二百餘年時稱隱君子謚曰聃孔子至周嘗問禮焉周衰去而之秦過函谷關關令尹喜候氣而迎之强爲著書乃述道德上下篇以傳世云按氏族之書或謂周氏李乾娶于益壽氏女嬰敷生子耳字伯陽又謂李氏出高陽氏子庭堅爲堯大理以官命氏爲理氏其後李徵妻挈和氏逃罪於紂食木子得全遂改曰李又謂李靈飛得道妻尹氏生老子諱弘元字曜靈或曰伯陽或曰老萊子或曰太史儋其説非一若黄帝之先自三皇開闢之初已有之而相傳歷代應化神變動百千劫而不息是實録之作也其必有考焉夫神之無方可先後可有無其視千百載猶一息故不可以形測以跡求也是故以不可言謂之道以無名觀天地之始以無欲觀其妙故處無爲之事行不言之教以不爭不盜而使民無知無欲此周衰將以厚俗拯化以還乎素朴而已矣使當是時俗流化薄而復訓以有名有欲有爲有言之道又焉知乎曲所以全枉所以直窪所以盈弊所以新也哉以是乃鎮之以無名之朴不知孰爲道孰爲仁義則復古矣故其言行於秦虐之餘漢興以清靜濟之猶水之解炎也此先黄老而後六經也乎蓋以一時之尚而言之其謂老子所貴道虚無因變化於無爲故著書辭稱微妙難識良有以焉後之君天下者代師而用之見諸其緒餘者祕之爲天經洞録發之於靈書隱訣修之於身可以登真躡景施之於人可以濟世利物是乃兼乎内聖外王之道焉若拘夫鴻生碩士之説一以莊列若散道德放論要亦歸之自然因雜之申韓刑名之流直有不可者也矧甚則以浮誕空寂病之乎然實録之所紀載詳備若此豈得一出於私所尊大以取惑於世而能傳之之久若是哉今皇上以天授仁聖自有寰宇首註道德上下篇是資以清淨之治矣吾道之幸孰有加焉洪武十五年設道録司吾山曹公希鳴實職焉希鳴以道行誠篤日承寵光度越前代是豈非有以贊清靜無爲之化而然哉暇日考訂是録壽梓以廣其傳間屬叙其端顧某叅竊是懼豈容述其首然而神化玄通之道六合之外聖人存而勿論於斯見矣謹爲之序龍虎山志序道之潜於至微而顯於至著也天地之大隂陽周始而理著焉事物之衆盛衰循環而文著焉此其至微之機潜於至著之間人不可得而見矣殆夫歷千百載之下而不泯絶者而後知也道之謂虚無玄默者原夫天也杳㝠惚恍之内而精粹朕兆存焉是不可見而可知也歟吾太上之教自軒皇文景之下率嘗用其清靜無爲之説驗於世矣或方之申韓形名或闢之方術怪誕蓋將有不得而毁斥爲異端者乎故太史遷以其動合無形澹足萬物指約而易操道家者流則古有之也必矣是以關尹莊列之言有以發其未盡而柔弱謙退之言有足以拯周衰之弊而範世軌俗焉得以幽玄視之且神道設教豈將誣後世以取惑哉迨列國而下秦之茅君漢之我祖天師吴之許葛皆其尤著者焉天師鍾不世出之姿親受于太上由是三洞經籙符法之傳祕於九霄十極者靈詮奥㫖盡降於世乃遊蜀之吴而煉丹龍虎山山之名於天下者居福地之一而與三茅閣皂並稱焉我張氏留侯而下四十八世矣有非二山之足儗也歷魏𣈆唐宋代有褒崇典秩具備若山川之勝宫宇之麗人物之繁仙跡之異道行之神爵望之顯代之慕儗歆𧰟者或美之於詩文垂之金石相傳逮二千餘載而嗣之者愈乆而愈昌栖之者彌遠而彌廣孰非上世之濟物利生禦灾捍患其玄德綿遠有以隂祐生民上禆王化而能傳之不息若是之久且著哉抑亦山靈川厚有以呵護資毓而然也乎是山志之不可無述也元皇慶二年春玄教嗣師吴公集爲三卷進於朝詔詞臣元文清公程文憲公實序之而予曾大父留公大父太玄公遭際寵光烜赫當世獲紀之典籍榮亦至矣我朝先公沖虚公在先皇之始元累覲天顔眷渥猶至而余之鄙陋早襲教章上承殊遇宫宇易新已而今上嗣位首承召命蒙恩兩朝博厚之仁鴻厖之澤莫得而盡紀也間病舊志多疏淺凡近竊有慨焉或謂值兹盛世非加以稽古索隱以成一山之盛典豈不使竒芬偉躅湮鬱涣漫若珠玉之蔽於淵藪其質可珍而忽不收襲亦豈不自棄也哉予雖篤志而學有未逮焉講師李唐真清修篤厚乃命搜訪其遺缺而仲氏宇清志鋭而才敏力贊成之遂析爲十卷將完而善士某願壽諸梓能無一言以志之哉惟道之在天下與天地並行而不違其存於人者昌大而已矣能志是而弗替則善承其已著而垂裕於將來宜與山川同其悠永其有已哉然世遠代異或不能盡其紀載而後之慕其餘風遺烈者未必不有取於是焉敬僣序于首漢天師世家序易曰顯道神德行是故可與酬酢可與祐神矣盈天地間古今不息者道也能顯明於道則功用之神具見而合乎德者故可與應萬變而贊祐於神矣是所謂叅贊天地之化育者也太史遷曰道家無爲精神專一動合無形瞻足萬物而與時遷移應物變化立俗施事無所不宜良有以哉太上生於殷爲周藏室史復遷柱下史以神化莫測之跡代降於世爲玄教宗我祖漢天師蒙留侯遺澤嘗親受道於太上由是仙經洞籙秘劫不傳者悉降於世繼以降治妖魅服鍊神丹功成沖舉以劒印傳於奕代者今垂千五百年雖運移物改繼承不替其非以清靜無爲之教功用之神有合乎天德而足以贊化育者歟迨今凡名山奥區靈跡具存此其子孫流芳之遠榮達之久信有以隂翊王度博施生民者蓋可見矣漢末而下居龍虎山者岩栖谷隱脩鍊以自壽宋初漸以道行稱於時暨大觀崇寧間虚靜真君出焉其神功妙應一發於御氣鍊形之實而後益振有足方駕於前矣其下莫顯於曾大父薇山公大父太玄公也凡其瑩禬禱祈之著遭際寵渥之極當是時竒徵茂跡雖簪纓縉紳之士莫不禮敬之視前或有所未逮焉及我朝先君沖虚公光際聖朝混一海宇其崇資偉望昭赫一時榮被終始又豈昔之可倫儗者哉其爲神明之胄必若是乎某以匪材庸質仰紹先烈惟忝竊是懼代蒙聖恩猶深戰慄間以世家顛末未白於世懼有遺缺昔侍先君手舊編一帙授傳高道同虚謁宋太史濂序其首而未暇整緝以行然舊文辭意冗腐僣用删校增次以廣諸梓庶以成先志也嗚呼物理之有盛衰也思所以承先啓後者爲難哉末降以來棄實趨華競於勢利者衆矣苟不能造詣其學輝光其德以亢厥宗可得謂之克纘前人之緒乎是豈足知夫昔之授於太上者德行之隆勳烈之大其相傳之無窮也果何使之然哉抑神而明之存乎其人後之來者尚必自勵其有以章述者焉斯爲不墜其教矣其曰世家則本諸史云張氏宗系後序古者受姓命氏莫非聖賢之後或以國爲氏國滅而氏存其世遠族湮者固常有之譜牒之製史設局以掌之及局廢而學士大夫家自爲譜所以叙昭穆别親踈使凡爲人後胤者知存尊祖敬宗之心是乃君子所務之大者也張氏姬姓系出軒轅子青陽氏第五子揮爲弓正始造弓矢張羅以取禽獸主祀狐星世掌其職因賜姓張氏殷張穆子唐堯時張果皆以仙名逮周宣王時張仲爲卿士其後張侯爲晋大夫至三卿分晋張氏五世相韓太史公以爲張本韓公族也韓滅留侯良以擊秦始皇仇遂更姓焉舊譜始留侯爲初祖上無所載焉嘗觀其略因探索以備遺缺侯本沛之豐邑人佐漢高有天下遂封侯起家至七世多以功烈著傳暨唐列爲安定范陽太原南陽燉煌修武上谷沛國梁國榮陽平原京兆等四十三望族中出宰相凡十七人封侯者八人至十世而生漢天師父桐柏真人自沛遷杭嘗過鎮江之丹徒縣有留侯廟而常州仙跡亦名張公洞意必德其惠而祠焉其後因居浙矣漢天師生杭之天目山是爲玄教之宗嘗以修鍊神丹及劾治魔鬼道吴遊蜀遂家信之龍虎山其傳緒悠遠盛倍於前史弗之察以謂留侯再世國除即意其嗣絶殊弗知流裔南北若是之繁也自漢天師十世而下丘隴之完系序之存凡居龍虎山者二十八世計侯之上遠不可知者通爲五十餘世矣其支屬之殊同出處之顯晦則無所稽焉或傳閩之石笋信之上饒其張氏皆族也間見其子孫故老猶能道説舊故而求其世次則亦無從考質焉若夫江東西之間世稱穹爵令望而國朝崇尚不息者鮮與之倫其非列祖之神功玄化德被四方而能若斯之昌且久哉抑嘗慨夫世之好誇譽者每爲譜以自眩其間攀慕貴顯傍引曲證者多矣其於孝敬之心果何在哉而我張氏以神明之胄迄今千有餘載論者徒以繼爵虚玄之宗而已又焉知夫重珪疊組蟬聯而不替者代有之特或文獻之有不足者歟然其未能大白於世者前之人於求本之志有缺故當時鴻生碩士無一言以及之是亦甚可愧惜者也矧今宗裔視昔則十不一二其消長盛衰猶深有足感歡者焉可復失於整輯也哉顧駑劣無似弗克負荷常懼駸尋墜絶使後之人曷從而知源流之自思亢其宗愼其本哉或謂作譜之法親者宜詳疏者宜略爲子孫者各詳所親則略者亦可互見後之人當體夫祖宗德澤之重篤志樹立使其流風餘澤無至顛墜庶克繼其善也昔韓相公之言謹家牒而不忘乎先榮者學之大也可不警勉焉則古之譜牒之製所以敦本之道爲不虚設矣兹述其槩於編末以紀其所自其發揚潜耀尚有俟於當世大手筆焉三十代天師虚靖真君語録後序宇宙之間鍾光嶽靈淑之氣者惟人而人脩乎身也有諸内必形諸外固凡藴蓄之素者其能已於言乎雖老莊氏之學墮肢體黜聦明凡役乎外者一切斥絶務一返乎内而至於垂世立教之道亦必因言而後達且著焉由是觀之遊方之外者豈以言爲無所用也哉蓋其於言也若太虚行雲澄淵微瀾隨其動止而成文不可以跡求之也歟與儒之於言也達則雄邁放逸之情肆窮則羈旅感慨之語發者異矣雖然其道隆神化之久與天爲徒又豈必以言之有無而後謂之仙哉三十代祖虚靖眞君以靈悟宿植遭熙洽之朝在崇寧靖康間徽廟崇道尤甚而真仙輩出與真君上下一時者若徐神翁王文卿林靈素也凡祛禁妖崇平潮孽祠禜禬徃徃有異徵既而國運艱否預達灾朕及致風霆暘雨特指顧間其道神行著誠足以羽儀天朝澤被含品矣雖相去數百載至今人猶道慕之豈務誇一時而後竟泯無聞者比哉舊傳應化録載述勳行詳矣凡真君流示世教之語陶冶性靈之篇又皆足以警迷啓蔽非遊神於胚腪坱圠之初蟬蜕於轇轕塵滓之表無毫忽足以介其中者其造詣能若是哉四方傳誦願見者惜不得其全徃嘗刊布久亦遺缺間求之名山重鋟梓以廣其傳庶俾冠褐之士慕向之流探索於言外意表以悟火符之祕窮鉛汞之妙有餘師矣以是而進乎道德之域若所謂廣漠之野虚無之濱當層峯喬木之間風清月霽之夕哦咏其空歌靈韻林唱泉答又焉知其霓旌霞珮之不來降也哉其可不與老莊氏之言而並傳也乎宇初忝嗣匪材豈足以盡其贊頌揚美嘗恐有所遺墜姑序其槩以俟諸大手筆焉悠然閣集序夫物之衆自萌茁兆露而生生之意具焉以及繁長盛大而人鮮知也其所可見者越寒暑冬夏敷榮凋悴之色而已蓋未得乎其初也物且然況己之心尤莫之察也乎人性之善知覺既形莫不有悠然存乎中者與物同而物欲情慮蔽其私猶寒暑冬夏之榮悴有不免焉而能察其蔽釋欲盡則悠然之善本存故爲學之道由仁義操禮節所以持其中復其初則己心之悠然者若實之有仁於吾無間然也士之立身顯親非求夫是而後達不足謂之學也鄱陽甲江西他郡以産殖貲貿之富民廣其利五季間賢士巨室爭出而周爲盛迨元集賢司直南翁公以學聞居湖田間山明水秀覽而悅之遂構悠然閣其上或有取夫𣈆陶處士詩語也未幾入朝時大夫士咸有述始南翁洎左丞伯温公皆顯宦族姓且繁而郞中公克復伯仲守世澤不墜元季兵興閣毁而克復處仕途既還若上世手澤皆收襲具存余辱與克復契厚間出所藏屬以言是編辭藻增耀有足見南翁遭際隆盛而悠然乃未達之日所名其諸賦咏皆一時名卿碩士美之於既達之日雖眷眷桑梓間湖山之勝與晋處士所適固異求之世澤之愈乆其得乎一心之悠然與景物之托興者又有不同者矣雖然景物之代謝常係於榮悴且物俱囿於理氣積厚者源深若家世之遠近亦由積之之厚薄也當元盛時四方士人簪擁雲合與周氏同輩者視今能幾人哉克復之善繼其業且獲重編帙以示將來是使知夫悠然其中有若是耶抑余祖太玄公於南翁伯温有世契而余於克復凡辱知三世矣言可拒乎惟其後胤尚善珍之則悠然之澤非榮悴之足拘必由至仁之著於無窮者焉予因致其望於是者敬序以復請丹纂要序黄老之書出而吾道興史載帝嘗問道廣成子於崆峒山其言非神異深奥而簡明要切易知易行者也至周穆王作草樓延逸人而後相尊信之若關尹莊列諸子生戰國間以時上下而言亦異同然其授受之源一也蓋其本則三洞九霄諸經品道藏者其用世之説則内聖外王之道蓋公曹叅以清靜而治是也其要也使有歸於無實返於虚順元氣之流行而深根固蒂返本還元則性命混融守其一眞復超乎無而已矣迨秦皇漢武取惑方術而其説淆雜後之所謂金液大丹者始金碧龍虎經太上石壁歌至漢魏伯陽本金碧經作叅同契假易以明丹述五行八卦隂陽經緯之説詳火藥消長生化之機或引金石草木之類以證體用或託嬰姹龍虎之説以隱玄微而踵其後者全以木石比喻之言溺其要義以惑世誘俗不惟内外丹之傳由是迷逸而未知探訪者一槩以藥石爲丹舍身心之實性命之理因譔爲竒言譎語以權衡學者非特鼓惑一時且流弊後世者有之蓋外丹之傳采五金八石之精粹按火候隂符而烹煉與内丹升降進退之道無異故内外之運用一也夫人之形骸屬隂皆由精氣凝化必資金石之英雲日之華以化鍊之則靈變之妙可輕舉飄浮矣故名山川間丹爐藥竈皆有遺跡若吾祖漢天師許太史葛仙翁之流世傳尤著故舍二者之傳則皆妄也元季間有險薄之徒爭倡邪説爲採戰之術盜習成書假先德之言以相引證誑惑當世富豪大賈之人且多從之以延年縱慾必喪身亡命而後己其始作俑者業識之報當何如哉予嘗欲抵斥之患未能廣耳又或持草木雲霞按摩導引之文以爲入逕之資雖可養生延壽求其成工亦縁木求魚負薪救火尤庶乎邪説暴行而已矣所謂南北二派其全眞所宗金王重陽氏南派則張紫陽氏張之書多文而隱王之書皆直而約張氏之傳必内外合而後成王氏則修内而已矣然其授受之奥必學者力究焉有非書之可盡也余自襲教蒙皇上眷念隆渥嘗勉以精進道宗之學今凡十餘載嘗討論叅訪於四方之士不敢少怠第以質下聞寡無以上副國恩以光宗教是録平昔所覽經論詩訣上自帝眞師匠沿流而止探考異同擇其精要足爲學門軌範者題曰丹纂要不惟便於玩覽實將發性命之理神氣之要一貫而萬備可因誦心會不惑於繆戾之病亦無取於經世兼善者之訕議其於黄老莊列之傳亦庶幾不失其緒焉使傳之廣且久則蒙吾道之澤有自矣況栖遁山林日積月累進之不已豈登眞躡景之不可繼哉然尤在夫善根上器之士有以自證者也是序于卷首生神章註序易曰神者妙萬物而爲言也成變化而行鬼神至神無方聖而不可知之謂神易之言神至矣蓋萬物自一氣生氣分而太極判兩儀四象五行各位乎氣之中由五行之氣布而萬彙生生之無窮其五行之運陽極於九隂極於六二五九一之道又備乎五行之中一爲萬數之根而氣爲萬有之母氣之流行統宰於神然後變化出焉天以積氣而成帝以統神而名若一氣生三氣三氣生九氣九氣生之無窮彌滿六虚皆氣之化生是謂之諸天也諸天歸之於虚無言其不可以象求也是以吾教之設本乎虚無自然其虚無自然者神氣也知養夫神氣則性命之道備矣而修之之方雖或同異其原夫三洞九霄之㫖則一矣蓋三境梵炁結篆成文非人世演説模倣塵言之類也九天生神章經道貫義明其分章掊句皆至賾之奥每各府命元而有一天其修煉之徑盡矣内而修己外而度魂故誦之九轉七誦皆按數之妙可以坐致自然白日登宸蓋非讀誦使然十乃成數天地之造化係焉人身備天地之造化豈登眞應化之道有不可得哉况按金液返還之㫖九乃陽數也夫元始之演妙神王之進請其灾劫種之訓至矣自赤明開皇以來仙曹之判選若階而升其不修善行不求至道者豈不於是深所感畏哉其能修者不惟度劫成眞乃上證僚擢非由養氣煉神回九氣於萬靈混三界於一氣而然乎所謂知其神之神不知不神之所以神也抑於死生之説則煉己之神可以度幽雖闡太上之慈恩亦由修己之功莫大矣故是經與度人大洞救苦之義表裏混融其善習誦者因文解義於道之奧曰有所悟入矣清源董圭山註釋明達實幽明之津筏者也暇日某命工鏤梓以廣其傳其存心惠澤至矣間書請序其首余何足以開倡其㫖使人人知所皈向况幽顯之大者乎然遵是而修之久乃神靈炁化躡浮駕空返己之天於虚無之上則高虚清明之景是所遊焉武夷山志序世之謂方輿職方郡志之書率於名山大川靈踪遐躅莫之盡詳焉蓋非載籍之遺缺而代之鴻生碩士多病以虚誕而諱言之然古之仙眞其神靈所寓無徃不在凡禦灾捍患之異有禱輒應豈不足以隂翊皇度者乎抑豈無叅贊之功於世也哉而或史之弗書述之弗詳則千百載之下竟遂泯泯無傳焉是亦習教者之所宜盡心致力也歟建寧之武夷爲升眞玄化洞天按傳記晋鴻漸謂昔有神人受帝命統録地仙嘗降于山顛自稱武夷君山因以名而白紫清傳列仙則謂秦人籛鏗嘗隱于是焉携二子長曰武次曰夷其亦莫得而辯也漢郊祀志武帝嘗祠武夷君于建命祠官領之山有漢祀壇遺址或曰秦始皇二年八月十有五日上帝同太姥元君魏眞君子騫設會幔亭峰之頂虹橋接空魚貫而上者千百人呼郷人爲曾孫享以酒核皆彩室綺裀供帳華盛靈樂迭奏已而風雨且作竟失所在子騫始學道於山從張湛孫綽等十三人遇控鶴仙人受道皆仙去下而唐宋迄元得仙者常輩出沖祐觀始創於唐天寳間迨南唐寳大八年李玄輔於道有得遂遷今址賜額曰會仙宋初凡殿宇廊廡更新之太宗寵以御札祥符二年賜田若干熙寧初秩二千石者領之暨紹聖元符端平嘉熙紹定間禱雨輒應復加封號錫田蠲稅之恩累降元天曆亦寵賚如前而貞人介士代不乏焉以是名於天下與三山相先後也蓋建之曰丹山碧水者竒峰麗岫層見疊出于一水縈紆之間而岩姿屏色趨抱拱挹凡洞穴壇壝不可枚紀每皆勝絶孰不有仙眞異人居之是故若朱文公蔡文節公劉文簡公一時名賢鉅儒亦皆讀書講學其間則九曲之勝聞于四方者亦豈偶然也哉余嘗異夫三茅山楊許二長史之會于華陽洞天麻姑之會蔡經方平於仙壇也稽之傳記若劉向漢稱博極群書其言未必誣也以是知幔亭之集必不妄矣其可無所紀述也哉而山志考載且詳誠足傳遠矣余嘗欲一遊而未遂主觀者某間請序其首余固不獲以淺陋辭而亦尚圖詢諸遺老殘文以補其未備云白鶴觀志序自黄帝獲鼎學仙丹成而上升繼則周穆王作草樓召仙而其説始殷逮秦漢求仙之盛而方士迭出謬以神異誇誕取惑好慕之君淆雜虚玄之授招時訕議者亦宜然豈無真仙者潜遯窮僻遺名棄跡以修之故其丹爐藥臼靈書奧訣或祕諸岩洞或留世隱顯雖其跡不同自古相傳代有之矣江西豐城之白鶴觀在陳大建間其地真仙甘君之靈跡也甘君幼篤孝以行聞於郷里學道有年聞旌陽許君善徃師之許君與偕徃師丹陽女仙諶母得祕授法行日著乃從許君積功江漢間若其圖松禦怪斬蛟蜃祛虵孽以三尺劒致功可益萬世其名跡垂之無窮必然矣况其功烈尤有不能具録者乎而許君嘗有淨明忠孝之法行世其説皆本大中至正之理非他符訣呪步比也甘君以孝行之著成仙躡空其功與道豈不得之忠孝尤多矧仙之爲超脫凡俗之逕未嘗去人道而必獨善也此甘君道既成事母終而脫去則可謂兩全矣抑凡仙眞區宅必山川雄勝而豐城之佳秀宜有以毓其質炁而然也余今春謁西山玉隆宫還經白鶴觀雖風雨之夕探採遺逸尤有足起慕焉其地雖處闤闠間景物幽麗詢其兩楹乃吾祖虚靖眞君窪盈方丈其前龍潭眞君飛幻處也道會鄢某耆士熊某主觀事且出甘君所爲丹經洎觀志及真君與任首座書言尤足以有發而事異名存寧不重爲感惜者焉越夏某來山中以觀志請叙余幼嗜名山水間以窮幽索勝嘗歉古今名跡不獲徧覽若甘仙之神德優著乃獲讀其言履其境叙不可辭矧尤吾祖之遺聲逸跡間可以詳夫紀載者哉然某克盡其職且編次成書欲壽諸梓可謂善究其本矣使他日眞仙之靈踪異化與是録同其弗泯於吾道豈不甚盛事哉繼者勉之張嘉定集叙澹漠先生張公詩集若干卷吾友大椿編次屬叙於余其不獲辭也記髫齔時嘗侍公於先君子之側獲諸益焉當是時稱郷先生盧公伯良夏公伯承爲同門師友而學業又皆齊驅並駕而莫知其孰先後焉公爲吾里著姓自宋元簪組相屬多以文鳴公幼歧嶷才贍氣鋭暨長博學善記誦猶長於詩元季鄰邑以詩名者若張公仲舉黄公君瑞危公大樸皆嘗頡頑其間而李先生仲公祝先生蕃遠猶所師也間挾所藴走燕趙間卒無所遇合道吴楚而還居無何天下雲擾豪俊並起一時僭竊之徒間聞而聘之竟潜退不屈而其流離忠憤皆見乎詩而雄放之氣毅如也我朝國初庵有海宇首以遺逸徵公赴闕接知嘉定州秩滿以老賜還乃泝吴越淮湘而歸晩築耕林壑杜門家授於詩益工州之民嘗有以誣禍搆連逮數十人公直其事獲全迨今人猶德之公之詩其體裁風致本乎風雅而浸淫乎漢魏六朝若盛唐初元而下所不道也蓋其氣岸魁偉美姿表故吐辭運思捷若神助宿搆不假窮索苦思而成其雄渾淵永若穹華之雲長江之瀾不可涯測而跡求者是所以淺陋庸隘者所不能造也此其知名王公學士大夫間信不虚得矣惜其平素撰述中罹兵燹散軼者多廬公嘗拾襲其千百圖永於梓未完而殁藁復逸不存間愛而不能棄者手録其十一校大椿所録居多惜余無似嘗承教於公而不能副其訓育其敢妄叙之乎然公之學優辭敏不惟駢華競秀於一時而其盛德偉望已嘗見於事功其遺聲潜曜豈竟泯泯漸墜者哉矧吾大椿力學好義將繼盧公之志爲不難矣又豈不樂爲斯文道哉公諱率字孟循號澹漠門弟子以澹漠先生稱云宗濂藁叙余友倪君子正少從學先師夏先生栢承而授陸氏本心之説於彭先生孟悦其踐履篤實推信於郷里者雖庸夫愚婦皆知其爲君子也窮居陋巷貧窶自守愼交寡言於師友請益不怠而動容常若不足間苦疾鮮爲文辭或强綴作必稽諸經一出於純正余嘗聞性理之説於彭公其琢礪討論皆君之益凡交處十餘年猶一日也某年以薦辟除新建教諭間兩還郷里獲與研究古先賢哲前言徃行陶冶于踈林荒礀軒燈池月間其意味醇慤求之古人不多讓也洪武十七年春服缺赴京示微疾終余悲不勝嘗勉其子衡勿墜其手澤後四年衡持文若干篇曰宗濂藁請曰先君居新建時縣庠乃元江丞相宗濂書院也故藁以是名先君託知之深莫公若也願叙其端余不獲辭讀之再而感曰夫士之爲學求足於人者多求足於身者寡矣君育天地之和山川之秀蒙先世之澤質淳氣清性行端潔自非庸儒俗生所能至内既足於身而外亦無待乎人者也故其言論風㫖一本諸簡易之理精微之得道不待究而自眀誠不俟立而自著是所以得之本心也歟宜其施諸事爲訓諸講解舉不論於口耳之習言辭之辨一存乎端本誠身而已矣本端身誠則聖人之道經世之法具矣尚何俟其繁贅也哉其策問講義叙説皆發乎正大之要存養之方陸門之楊錢殆不是過也其詩歌篇什得乎性情之實而韋孟之閑雅陶柳之沖澹有焉惜未之大用無以發其和粹之蓄豈聖代之可多見也乎今凡新建學徒在當時嘗聞其言者尤有立是豈其涵濡操勵之工爲少哉惜其學本諸陸而世之宗朱者或有不與焉是故其特立不惑宜世之鮮知也矣然究其會同其言可得而竟泯泯者乎使其傳之不替豈不羽翼乎周程朱陸之言必矣墓則友人吴君伯宗爲之銘惜余無足以發之姑以義弗辭叙其槩焉雲溪詩集叙孟子之言曰王者之跡熄而詩亡詩亡然後春秋作夫詩豈易言哉自三百篇古賦之下漢之蘇李魏之曹王劉應去風雅未遠始有以變之晋初阮陸潘左之徒尤未湮墜逮六朝鮑謝顔張出而音韻柔嫚體格綺麗則風雅之淳日漓矣暨唐初宋杜陳劉盛唐韋柳王孟作而氣度音節雄逸壯邁度越於前者也而集大成者必曰少陵杜氏在當時如高李岑賈亦莫之等焉則杜氏之於窮達忻戚發乎聲歌者有合乎風雅而足爲楷法矣唐末風俗侈靡宋之稱善者蘇子瞻梅聖俞石延年王介甫歐蘇朱楊而已及元范楊虞揭輩倡遺音於絶響之餘直追盛唐一時禁林之儒生四方之士人莫不宗師之凡江東西之間言能詩者尤盛蓋得乎己者高而宇宙山川之大近而卉木禽蟲之微無鉅細妍醜之辨接於目者會於心其操辭運思若江海之奔而不可遏矣故代之辭人墨客以是名者駢華競秀櫛比鱗次及求之大章全帙可以躋古而式後者復幾何人哉然則三百篇之删取雖出於庸人愚婦之言者其風刺美怨皆足以薦之廊廟禆之政化而王澤具存焉其曰詩既亡而以春秋續之則爲詩者必欲繼其亡者焉是以後之學者苟不操源遡流發乎性靜之正資養之實務趨於模測雕飾窺古人之餘膏剩馥惟將和鉛吮墨剽獵纖碎騁駕於蘭苕月露之頃以誇時自足是豈足與言詩也哉余友楊君孟頊世以詩鳴余丱歲嘗讀其伯父顯民詩惜不盡見今春延孟頊授業余甥采其言論風㫖恨得之晚且出其平素詩若干篇獲盡讀之及扣其家其先自伯起者漢爲名儒世稱關西夫子迨隋唐多顯宦有名某者官江西某處因遷居進賢縣之水北里實高宗麟德元年也至宋有諱仲博者舉進士第擢長沙令轉江西漕運使而終又諱龍偉者亦舉進士爲鄱陽簿仲父季子元爲中書檢校遷禮部侍郞終贈本部尚書以是族日益蕃今凡居水北者二十有九世矣其學則祖叔能師宋監胄生見心危先生季輔顯民季子皆學於叔能率以家教相承季輔志識閑雅沖澹晩節亦慕道家縱閉之説延明師篤教諸子孟頊德充而學贍其襟度辭韻清麗宏達法於杜而備衆體者也蓋世爲簪纓家其淵源之懿研泳之習有素矣余固知其不以顯晦榮悴累其中而向使列之英俊之林又安知其不可續清廟之音以鋪張盛世之述作也哉此亦其志夫國風雅頌之大者焉抑余無似退卧乎窮山宻林曠意風月寂寥之濱其淺陋良有以麗澤之又豈能盡知孟頊哉然感夫世之知詩者如孟頊且鮮况信能淩厲前古而與造物者爭衡也乎間屬叙於余情不獲矧俟於異日豈惟是哉許氏族譜序嘗讀周官書其小史之職奠世系辨昭穆以定邦國之制雖古無譜牒而嚴大宗小宗之法自宗法不修而尚門地由是而有譜牒之識焉斯所以昭穆不紊踈戚有别也然代之譜其宗者率欲光其先振其後凡得同姓而顯著者必將攀授附竊而成書雖自欺以取誇於一時而其尊祖明宗之法胥失之矣又何代夫爲之後者此學士大夫之所不取也蓋遡而上之莫得而詳焉是或有所誣也歟或不求門地之素風俗之淳而徒資産之厚聲利之盛則以巨室名閥尊尚之其於古之人久近之别賜姓命氏之原尚何自而考證之哉高陽許氏春秋之謂齊侯許男後也春秋之後無復國其後以封爲姓按譜漢許氏侯者七人王莽敗始失侯東漢循吏許荆者其下爲汝南人各有聞許靖爲蜀太傅許褚事魏封侯晋許孜徵孝廉不起其後稱高陽爲盛許邵爵唐安陸郡公敬宗爲龍翔相孫曰遠天寳之亂以義死宋祥符間許遂爲將作監主簿許怡元爲江淮荆湖兩浙制置使其後族大且蕃累仕于朝至某者由某官遷撫之宜黄因家焉是爲江右著姓某於譚爲世戚外兄碧淵嘗以其譜牒屬序焉余嘗感夫盛衰榮悴之理駸駸於無窮者一何甚哉幼聞故家遺俗莫盛於元蓋以享國之久恩惠寬厚貨殖蕃碩凡其有休聲餘澤者靡不思以振復興起者焉故不惟奢靡豪縱之習而詩書之澤孝友之風猶彬彬間有之者矣迨今凡三十餘年運去物改一旦鞠爲榛莽者有矣其亦消長之數信有定在也耶矧以學行世其家者非假譜牒之存以詳其支派之遠嬋嫣之自則祖宗之嘉猷盛烈曷有不顛隳者哉而能存其譜者亦鮮矣其若許氏之能善寳其存所推本者皆穹爵令望之士可謂敦本知自者焉惜乎未識用衡而於碧淵之言可徵矣是不辭而爲之序贈御風子序世之具形氣者有生於無而無復歸於有故形載乎氣而氣御乎形也元氣運天地而隂陽行焉天之覆地之載日月之明四時之序晝夜之續鬼神之變萬物之衆其運行而不息者皆有無自相生化者也古之善訓人者惟使趨乎道而已知趨乎道則達有無生化之機矣然世之謂學者苟聲務華飾外忘内其於生化之有無又豈能潜求默識也哉余居耆山中閒遊鶴松下值一道者蓬藟翛然揖而言曰吾遊江海間乆矣嘗扣異人以金液還丹之道信夫列禦寇指尻輪神馬之説而有御風之神化者也吾雖未知能也其然乎其不然乎願有以發之曰風之爲物也聲而不形蒙莊氏謂之大塊噫炁是焉其御也果有馮乎所馮虚者則何致福之數數然也所馮者非虚又何福之可致耶況數數也哉是故難免乎猶有所待者也孰若無所御而行是無待於外矣故乘天地之正而御六氣之辨以遊乎無窮者彼且惡乎待哉彼列禦寇之御乎尻輪神馬者乃一氣之徃來無窮是託乎御風也果何待哉故其遊之不息非以邊涯可得而測焉況旬有五日而後返耶有息而後返返而未嘗不息矣特有之所以乘無無之所以御有也及乎非有非無而生生化化之機盡矣子之於學也必求夫天地之正六氣之辨修之於己日積月至而後形神炁化亦御乎尻輪神馬之無窮則風不待御而行矣其視致福乃吾無所用者哉舍是而欲之雖使飛廉列缺侍乎颷車霆轍駕乎雲道星衢尚何能御哉雖然凡造乎道者必去浮幻絶識染形如槁木心苦死灰視世之貴者爲埃壤身之重者若土苴則其自待也輕舉天下無毫髪之足累其中猶馮虚而行不假於御而莫知止也雖天地之外不可以跡限之也矧子以剛勁之質叅究之學使洞視有無之表而遊乎逍遥之墟廣漠之野若萬竅之怒號衆竅之爲虚翏翏乎之不聞刁刁乎之不見又何衆竅之謂地籟比竹之謂人籟吹萬之謂天籟也乎惟聽於無聲視於無形則有無之間皆一吹萬也斯求造物者之所馮哉而吾獨不得而至焉子其勉之道者因請以自號並録其言而别送琴士朱宗眀序樂之所以致和也極乎天而蟠乎地行乎隂陽而通乎鬼神是故大樂與天地同和其感於物而動乃形於聲聲成文謂之音音之發有喜怒哀樂欣戚邪正存焉此君子之於琴瑟斯須不可去也故曰琴樂之統也君子所當御也蓋凡接於耳目具於四體必禮以節之而琴足以閑邪滌非怡心養性是得乎性情之正焉其與夫鸞和珮玉雅頌之音無故不徹也宜矣其由羲農虞舜文王孔子而下伯牙屈宋之作也或感於憂思形於悲歎放於悅懌始於齋泫沓𣵺劃然苦怒終而颯爽激烈凄然若悲其急也風雨震而崖石裂焉其緩也波濤作而蛟龍興焉其大也騏驥驟而干戚舉焉其微也泉溜滴而蛩螿語焉此其千態萬狀不可得而盡也信能與隂陽相摩天地相蕩也矣在夫得之心而應之手也非習之有素不亦難乎且必得乎性惰之正而後不失乎聖賢之餘韻也豈徒悅乎流俗之觀聽也歟昔之稱師襄師曠師文者其去遠矣其下損益者雍門周司馬相如蔡邕孫登嵇康桓譚楊收之徒各擅其說近代之以是名者惟曉山徐氏子方袁氏敏仲毛氏伯振楊氏學於徐袁而鳴一時者起敬冷氏是有江淛二操之辨後皆徐袁爲宗焉余少嗜其學聞於通都大邑遇鳴於是者必叩焉其曰淛學者皆然而徒誇多競靡而己求其音節雄逸興度幽遠者亦甚鮮矣閩士朱宗明氏師於袁冷其友也今春來遊吾山相與掃石鼓于峴泉之上其曲也調也皆清深雅淡雄逸飄縱信非誇多競美者比也采其論說必以得性情之正爲要少遊四方多所資訪我朝國初首以薦赴京力辭獲還凡閩之巨室大姓更相延致之而其齒髪向暮乃得乎音之妙者宜非一日也然昔人謂之高山流水者獲與之陶情寫意於風林月礀中矣其别去也豈不夢寐乎吾天籟雲濤之聽也乎而亦果何爲寅鍾白雪之音也特恐均不能忘乎耳哉於其行遂抱琴鼓之溪之滸再鼓而不知其有離聲也乃序其槩以爲贈遊仙巖詩序予嘗觀夫世人靜躁勞逸之異也其出處語黙必見乎性情之趍好焉是豈得强而至哉苟强而至又豈造夫趣之真也夫吾山仙巖凡居二十有四聞於四方久矣由漢天師鍊丹兹山而龍虎現巖因益名由是天下士人無貴賤老壯凡偶經特謁者靡不願一遊焉以是遊帆曳棹而徃者歲無虚月矣洪武丙子季秋六日予偕館賔楊公孟頊仲氏湛碧昊甥汝緒侍遊者王景山昊處淵袁止安也命舟溪滸崇酒榼殽而發焉縱波衝渚而下不踰時而達是夕息巖之左曰演法觀乃漢天師祠也危臺傑閣高出天際水簾斗壇丹竈芝巖交列左右相與偃息踰夕明旦發舟篙人指顧下上應接睇眄之不暇而沍島洲渚之間怪石異木幽葩竒卉穠縟重馥皆聯芳獨秀之可喜也頃而旋汀歷淑若坳窪抵岸之觸側竇隱隙之險惟鳥栖猱攀而人跡莫能即焉或依乎深林隘谷者漁舍隱焉或蔽乎荒榛野渚者樵逕紆焉是殆與武陵桃源不異也已而開罇啜茗遡流而下顚崖絶壁突怒而起者蛟騰豹躍龍襄虎踞俯首而伏者屛列障闢雲奔霧湧千態萬狀層見疊出而穴其嵌空罅毗者庖庾罍牖機杼梁堵畢具其間使人仰視慕羨心融神釋信不知其有人間世矣下視澄潭一碧靈籟四起而其干霄麗日排空而上者岌嶪嶻櫱惟巖峙谷聳蒼嵁綺錯而己遠而狂瀾淺渚奫泫淳潮餘不知其有窮也久之即巖下摳衣而上懸石萬仞若垂蓋覆宇可坐數十許人遂陳觴羅俎而飲於是吟者歌焉琴者弦焉繪者圖焉盡一日之懽移夕乃己時天風西來恍若欲躡空駕浮而興不可遏遂命舟訪巖之右曰明誠觀者昊大宗師河圖仙壇也天且暮乃明火趨宿主祠者曰昊從善氏善日者術延談竟夕明日乃還所賦詩若干不覺盈袖成卷矣孟頊乃次第成帙而吿曰人生行樂耳今夫名山大川爲仙眞之窟宅吾聞有年矣不啻蓬萊閬風方壺圓嶠之勝也世之願一遊而不可得者多矣或聞而以爲怪誕之誇而未之信焉今也幸遂一覽若安期羨門飛仙狡獪之適盡在目睫間矣豈不自幸也歟願序諸作之首以紀一時之勝集而遺之無窮也余不辭而歎曰夫開闢以來天地位而山川育焉兹巖也屹立曠劫曷有傾圮前乎千萬載莫知其閱廢興消長之幾何也其能同此樂者幾何人矣後乎千萬載孰知夫能同今日之樂者幾何人哉然則羈軒冕没溺氛垢或風雨之晦㝠人事之欣戚不可勝紀而不能從兹遊者其相去豈不霄壤之間哉矧是遊也且有詞章絃詠之樂視昔之赤壁剡溪之興亦未必多讓也其能己於言乎抑世之躁者思靜勞者慕逸其有得夫天趣之真否乎遂樂其請而序之還真集序仙道自古尚矣由黄帝問道廣成子世稱黄老蓋廣成即老子也仙之說始焉若唐之籛鏗夏之嘯父商之宛丘周氏王喬三代則固有之而周穆建草樓以延士其說始著殆秦皇漢武惑方士藥石之術雖王次仲東方朔之徒而不知師而其邪說滋蔓淆雜卒以殞身則世之鴻生碩士並起而訾斥之亦宜矣若漢魏伯陽倣易撰參同契本古文龍虎經而充越之以是丹道倡明不溺於金石草木雲霞補導之術一明乎身心神炁自然之理假卦爻晷刻以則之靡不合乎竒耦象數也厥後由鍾離雲房授唐吕巖則祖述其說而歌辭論辨庶得乎指歸之正代亦不乏其人焉若宋之張紫陽石杏林陳泥丸白紫清李玉溪李清庵皆一時傑出凡其辭㫖亦不下伯陽而互有深造默會者焉夫相去千百歲之間何言之若合符節者不期然而然哉此無他千百世之理同也心同也其所以淆異者必邪妄詭誕之說非取誇於時必鼓惑於後其能果合於身心神氣自然之道乎此古之人必得人而授而道不虚行也抑亦非師之祕玄藴奥不妄啓示而學之者無累功積行之實徒飾虚文僞與馳聲揚耀者無異尚何足語道哉其能見諸言哉南昌臨江混然子以故姓博學嘗遇異人得秘授猶勤於論著予讀其言乆矣間會於客邸匆遽未遑盡究今春吾徒袁文逸自昊還持其所述還真集請一言予味之再信達乎金液還丹之㫖其顯微敷暢可以明體會用矣使由是而脩之雖上遡紫陽清菴亦未知孰後先也矧予嘗憫夫世之膚陋狂僻之習駁潰滋乆有莫得而盡絶者猶喜其言足以振發末季之弊也庶或志士貞人有碔砆美玉之辨焉則遊神胚腪馮冀之初煉氣混芒溟涬之表爲不難矣是所以盡乎原始返終窮神知化也歟尚容招黃鶴凌空而下相與共論乎湘濱岳渚之間未晩也是書于編首以俟峴泉集卷之二
