front:
  text: 峴泉集卷之七疑二
  hash: sha256:460f051d3d20e48c405222b348e4b8088e42a4da4af8d838e7ff7ffe002c66a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_007-001a, image: hfl/1020/1020-036.png}
body:
  text: 耆山無為天師張宇初撰普說三元傳度普說太虛沖漠玄範幽微至極難言妙亦難思夫無聲無臭無形無名溟涬大梵寥廓無光當爾之時文字未立不可思議莫可度量自赤明開圖生天生地萬有畢具百千萬重道氣結為雲篆發為靈文然後萬範開張五篇敷落保制劫運與天長存真聖相傳為道則一蓋自元始說經於黍珠空懸之景衆真監度以授玉晨道君大範始張開皇之後復授靈寶大乘之道紫微飛天十部之書實元始洞玄靈寶赤書玉篇混洞太無靈文元始鍊之於洞陽之館冶之於流火之庭乃元始靈寶之玄根空洞自然之真文生天立極開化神明施鎮五嶽安國康民是以太上演說玉局靈文誕布而我漢祖天師降生應化昔於上皇元年正月十五日無極大道太上老君修注上化八治無極元年七月十五日修注中化八治無極二年十月十五日修注下化八治漢安二年正月十五夜感金闕後聖玄元道君降西蜀鶴鳴山授正一盟威都功修真延生飛化祕籙肘後經訣是年七月十五日修立二十四治以付嗣師又於十月十五日建四治以應二十八宿故治有二十四氣氣有二十四職男官女官二十四官男職女職二十四職受任之後依按科格領户化民其有好道樂法心專志一者度厄延年攝邪皈正除害去妖濟生度死大可以飛神躡景度品登真使三五之教永劫無窮正一之風流傳不息是以授受之者對治度神臨壇分券以表盟誓之重也蓋聞道君曰吾昔降蜀都其二十四治皆二十八宿之獄謂之隂景黑簿之司乃開紫陽南宫玉宸正一內殿授正一盟威都功祕籙遂得籙中交乾履斗之道三步九跡之要嘗告祖師真君曰正一之道生於混沌一氣玄黃未形純素尚結至太朴將散澆風日侵吾憂道民為邪所亂一氣混雜鬼魔相纏災害橫生不得道真天年不竟而為中傷吾所降盟威諸籙盟誓外邪內正一氣故號正一叩者觀之不失一源之道故吾此法為衆法之門上清靈寶十變九化大赤隱書三九素語也祖師真君亦嘗授王真人曰混元之氣本一一生二二生三謂之三元三生四四生五是謂五行此三元五氣者經綸天地變化萬物是故正一之法本一氣而生動化於五故號三五法也奉其法者帝君三元靜位五行守理日月貞明隂陽順序雷霆無非震風雲無妄動萬物滋澤天下無征伐之勞人民無疾疫之苦則奉正一之法大感也真君始居嵩陽遂歷江東名山沿流巨壑乃入蜀戰鬼降魔分幽獄為二十四福庭降鬼帥為二十四隂官遂遇玄元道君復授以正一盟威之道三八飛仙延生之術拜真君為泰玄都正一真人攝玄元後聖之位為玄中大法師封泰玄都正一平氣宫主者由是六天魔鬼平治俱息修鍊功成三天命下遂白日上升位賔九清矣故二十四品祕籙之傳皆攝邪歸正大興靈化以福萬民降二十八宿之氣修二十四氣之治佩法籙之符章役治氣之將吏功滿德備三官保舉刻書玉名尸解變遷位登真人七祖父母超升福堂由是三洞四輔經籙之傳宏衍祕妙普度無窮上所以保鎮國祚與天長存下則福利存亡普天稱慶其於紫陽內宫玉晨正一祕典開闡玄微良有以也迄今四十三傳仰蒙聖著流演宗壇兹遇上元令節天官校録之辰都壇首弟子某齎金效信祈降玄恩十方參佩之士雲集宗壇是以法海高朋講筵清衆洗滌身心欲聞至道嘗聞經曰虛無自然道所從出真一不二體性湛然圓明自足不墮諸見遠離塵垢學無所學修無所修於中了然不去不住無死無生是真解悟豈不深切著明也哉內而修之乃金液返還三五之道外而施之即靈寶十回真一之妙演之為紫樞飛梵之文赤書靈圖之録普度天人其功無量是以太上諸品經籙之傳出自是者其感通應化之道於兹備矣蓋知造化之津可以化吾之民若天降地升環之以日月發之以雷霆準測機緘之運行不言可以利羣生是知具夫人者非智愚之可加損在乎反求諸己則本有之善念念歸真純一不二而後抱玄守一復朴全真則盡性致命之道具矣是以萬殊一本與天地並行而不相悖若虛無恬淡寂寞無為乃吾道之本而修之家國施之天人無適不可其感於兩間皆自真文靈笈有以回祥弭患誠有自也夫如是則不徒福利存亡而己沐我太上涵濡之惠信無窮也兹夕升此法座上帝高真為作證盟六凡四聖咸所聽聞略為敷揚願臻玄悟一切善信人民凡在有惰均躋仁壽無邊幽滯道岸同登久立珍重靈寶鍊度普說伏聞洞真妙戒靈寶玉文上保國祚於萬年下超苦爽於浩劫威禁至重神力難思該度亡靈宿違真道甘受輪回先當普宣法乳開明真性俾令猛悟早離冥途原夫無極之始太初之先無兆無朕由是而太朴始散隂陽始分生天立極發育萬物三才並立人居其中陽變隂合而五行混凝二氣周布萬物與天地並生均禀一氣而有形形生而性具乃天命之流行若三光並明五嶽分峙雷霆之妙雨露之教無洪纖巨細皆有生知之全無一物不具此太極也神道設教度世化人者惟此而已故曰天地之道其為物不二在孔孟曰仁義在釋迦曰圓覺在莊列曰虛無在荀楊曰權衡在班馬曰文詞流而為千工百藝不離寸心特殊途同歸萬殊一本也奈何天地與萬有俱屬形氣囿於生滅聚散榮枯成壞者皆然人之有生知覺一動晝夜頃刻交擾紛紜無一息之寧耳聽目染口味心思莫非欲蔽情纏境奪物誘蓋性流為清情熾為念念積為慮慮久為識故七情六欲五藴三毒凡貪嗔僧愛欣怨橫逆纏縳互至愈深愈固遂溺於根塵縛於執想甚至恩愛情欲或生有所負致結寃仇遂為眷屬一切眷屬妄認寃親寃親相纏互相報復乃緣隨境起境逐心生凡一切逆順好惡境緣動成障礙物之有形自一念之萌逐妄迷想百千萬劫流轉不已東升西沒頭出頭入雖木石無情亦常感化皆由一念之差遂種千生之苦使己之靈昏沉漂蕩散亂顚倒無有出期初則受想行識卒入成住敗空是有天堂地獄之報皆由心造而然罔知地水火風四大假合一切聲色盡是空花一切有相皆是幻妄自從曠大劫來一段無相圓明永劫自昧九幽長夜苦惱無邊由是太上有好生之德開方便門起大慈悲接引一切使之捨妄歸真均證無上道果獲福無量永出沉迷謹按元始天尊在始青天中懸一寶珠登引千真說經演妙以授玉宸靈寶道君而靈寶三品之道遂出次傳五老上帝妙行真人又命玉清真王開朱陵火府出破地獄符命青華大帝開青華左府出九龍符命韓君丈人開朱陵右府出拔幽魂符命三佐真人開黃籙院出黃籙真符由是上古三師以黍珠經法演成鍊度玄文超度死魂澤及羣品靈寶天尊傳之太清道德天尊次傳大羅無極神公鬱羅翹真定光三真人流演以及徐葛鄭三真人大振其教而飛天十部玉字隱書由是發其微奧源源相授至漢我祖天師受太上正一之傳其文猶闡矧龍漢之初混洞赤文梵氣彌羅天真皇人按筆所書皆洞章靈符上以保制劫運度厄消灾下則死魂受鍊生身受度普告三界無極神鄉北都泉曲疾除罪簿落滅惡根然後魔王保舉地祗送迎拔出地户登真度命惟此無量妙㫖昨自世降俗薄靈文奧典祕於天府信乎玄科四萬劫一傳自非宿植靈根常培善果少能契遇實以玄禁至重豈泄慢之能造其微妙哉然靈寶之妙出於度人度人之功備於靈寶嘗聞仙師曰靈寶即金丹金丹即靈寶若木金間隔水火潜飛安得性命混融還元返本必立乾坤之鼎器鍊坎離之藥物擒兩曜之烏免會二氣之龍虎採先天真一之氣為根基取隂陽運行之機為法象動則起於陽九靜則循於隂六按六十四卦為周天之火候體三百八十四爻為升降之符節顚倒之妙逆順之機母隱子胎砂中取汞雖億千萬言不能載故毫髮差殊不能成妙在三五歸一之道啓偃月運天根循黃道行周天取西四之金於北一之水而制東三之木於南二之火復歸五土之中追二氣於黃道會三性於元宫然後隂剝陽純脫胎神化玄殊成象太一歸真矣昔無上元君得九五之道而五雷君得三一之道與此無殊蓋河洛二圖所同實天地生成之本也其謂之靈寶也神凝為靈氣聚為寶亦必採混元杳冥之氣鍊日魂月魄之精歷南箕涉東井動至陽之真火降太隂之黃華使坎戊月精離己日光會融五氣周天一匝無質生質徑上朱陵是乃普受開度死魂生身魂度朱陵受鍊更生即虛一以象太極復歸於無也故至人修之以鍊己推之以度人實乃天地之真陽點化隂魄時刻升遷矣是知靈寶亦金丹之異名也汝等沉魂苦爽歷劫有年今以會首某修建無上大齊千生慶會得沐道慈頓令開度如上妙義一歷耳根永為聖種惟汝自性法身本無垢濁本無生死自緣染著幻妄無有解悟經曰三界衆生本無輪轉真一道氣本無生滅苦海無邊回頭是岸故曰了即業障本來空未了應須還宿債如智者或有聞見惡知惡覺亦須掃除愚者全無趨向昧性冥行猶須猛省居富貴者念念纏縳處貧賤者念念攀緣造此業因豈逃輪轉是故前代師德休去歇去如寒灰死火枯木頑石只為息此一念方能照了諸妄不著一塵況來無其始去無其終生本無生死本無死一靈妙有亘古長存蓋由結愛為根積想成業故有種種受生種種償報千生輪轉萬劫苦惱轉轉不息罔自覺知座下四衆受度亡魂我以非舌言汝以非心聽向非言非聽處猛烈悟來畢竟不落萬緣超出萬幻則三業六根一時淨盡回顧頓省向來一切苦樂纏縛了不可得於此直下體認昔本無生今未嘗死求向纏縛尚不可得況一切有無亂想尚何有哉不可認生前具此死後己無不問出劫至劫舍身入身汝應無壤但汝自昧若了明自性觀汝妙淨明心昭昭靈靈底不落語默動靜不著有無際畔如垢盡鑑明波澄月現不空之空真空無念之念正念頭頭動徹念念圓通真所謂千江有水千江月萬里無雲萬里天若不打破藩籬終存窩臼直須覿面承當更莫當場蹉過百千法門無量妙義盡向一機會悟從此一念不生萬緣俱寂塵沙罪業亦遂泯除惟此本來面目便是真仙道祖尚何地獄惡道苦輪不息之繫哉究竟至此畢竟萬幻俱空一真獨露太空無相乃汝實相大衆聞此法音頓然解悟識自本真絶輪回道愼無退轉常自護持則廓然圓明了無罣礙視彼色相竟復何有是乃超凌三界逍遙上清矣其或下界沉滯之魂於此尚未洞契真常故宜傳以戒法免致淪墜敬以九真妙戒逐一宣傳是用先皈依三寶庶有依憑咨示泉魂各宜遵奉授法普說原夫太極之初溟涬始判隂陽由是而分天地位而萬物育五行兆而萬化生以是而生生化化無窮焉五行一隂陽也隂陽一太極也以天命之流行而賦與萬物為之性性萌而理具于中理著而情見乎外皆由乎隂陽之生殺五行之升降所以水火相激雷霆相剝剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨而行乎隂陽二氣者神主之宰乎萬物之消長者帝主之然而動靜無端隂陽無始在人心則曰主宰謂之帝妙用謂之鬼神天地之大隂陽繫焉孰無以主宰之乎是謂帝者此也吾道玄元之宗由元始天王於開皇之後以靈寶大乘之道紫微飛天十部之書授玉宸大道君暨神霄九宸上帝後降峨嵋山授天真皇人是出鍊度之法龍漢之初九陽自然之氣元始命天真皇人按筆成文祕之於洞陽之館及開朱陵火府遂以起死回生之文付之是以黍珠經法演成鍊度之文又於龍漢劫中授道君以清微妙玄之道授老君以玄初應運內法以是靈寶天尊授妙化天帝清微通玄至式太上授之吾祖漢天師口口相傳是為清微正宗及元上侍宸一輝祖元君然後合之是曰清微靈寶道德正一是也太極徐真人修真成道奉太上命授靈寶十部妙經徐真人授之三佐真人凡濟度之事悉隸焉三佐真人授之太極左宫仙公由是靈寶之派流芳演派倡其說者若杜陸寧張最為大盛而流之後世者莫詳於林白二宗師焉是曰洞真出書度人强名元始洞玄嗣教易曰靈寶洞神演教名曰道德三者雖殊其實一致昔元始天尊命玉清真王開朱陵火府命青華大帝開青華左府韓君丈人開朱陵右府三佐真人開黃籙院出玉清破地獄等符若三簡五符之文凡行持鍊度告下幽關莫不開悟是曰神霄自清微而下皆其文也故高上神霄玉清真王長生大帝專制九霄三十六天三十六天尊惟大帝統領元象主握隂陽以故雷霆之政咸隸焉昔無上元君得九五之道經曰得九五之道者而帝雷霆也五雷君乃得三一雷霆之道三乃東之祖數一乃北之生數仙師曰太一元君泄至真顯宣三五度凡人在靈寶言之天地之大日魂月魄升降隂陽而不息其所以死魂受鍊生身受度之道以我陽神鍊彼隂魂然後交垢隂陽而歸太極混合性情而返真元故曰凝神為靈聚氣為寶神即性也氣即命也蓋空洞降靈太虛生神空氣金胎真中之真故藏神氣於三田五藏之中取在天三光五行之氣直不過攝情還性攝性歸根水火既濟性命之道備矣是以道取自身之日月法取水火之法象以己陽明之性覺彼隂靈之魄假九霄九陽之氣鍊質蕩形乘上帝之慈光開九泉之幽暗然後罪滅神全而化生矣夫東三之木合南二之火是龍反生於火也西四之金合北一之水虎反生於水也戊己乃中意之土三五合一之妙正所謂坎離既濟悉歸中到此方知三五功其於符篆簡呪科範儀文則法門之品格所以為入道之梯航求真之徑路而已苟不求諸己其能以度己之功度人也哉稽之至理未始不一夫五雷君得三一之道乃二斗之妙用即河圖之數故三一無殊於九五蓋樞隂機陽雷善霆惡陽雷隂霆總攝雷霆七十二司故魁罡為檄雷召霆之司以雷霆者得天地之中氣甲庚為雷霆之號令即九五之用壬為雷霆之局丙為雷霆之會子為雷霆之宗故子為雷局卯為雷門戊癸為雷火之司所以雷霆之威榮枯萬物生滅四時皆由合乎九五之妙也由火師汪真君侍宸王真君得雷姥之傳而盡泄矣人禀一靈並天地而為三才一身之造化隂陽與天地並行而不違也我之一點靈明暉天朗地亘古亘今了無人識儒曰虛靈不昧釋曰妙淨明心直下悟取非心非法非道非禪覿面相逢煞機在我經曰天發煞機龍蛇起陸人發煞機天地反覆天人合發舊變定基其所謂天人合發者豈非樞隂機陽也哉人之合乎天者沖氣為和鬼神者二氣之良能以我縱閉之機役之則此感彼應始乎大梵沖漠混洞赤文之先然後五篇敷落萬範開張則五文開廓普植神靈故無文不度無文不生也大可以保鎮國祚證道成真小可以保己寧家濟人利物皆一氣之往來五行之生剋以我曠劫之元神役虛無之神神靈氣合氣至將靈故不離當處常湛然覓則知君不可見其為法門之設曰神霄者若掌心之包裹隂陽斬勘之發號施令使者之斗激天河雷門之交運水火洞玄之開合隂陽杜令之策役神祗箭煞之沖激星曜下而酆嶽之文一氣一訣皆出身中妙用非徒紙上之文故曰萬法一法也萬神一神也蓋道乃法之體法乃道之用故法行先天大道將用自己元神充之則彌滿六虛斂之則不盈一握豈不一神動而萬神隨哉仙師曰法法皆心法心通法亦通能通乎心則知夫收為胎息用為竅此是法中真要妙故參學者必須先究夫玄關妙用水火真源歸根復命之妙則可會萬于一百慮而一致矣苟不內明性天道法心地雷霆其能靜則金丹動則霹靂乎然必戒行為之志節精勤為之蹊閫師曰真中有神誠外無法是以存誠養氣之為體洞妙握機之為用果能抱元守一御氣凝神六識淨消一真獨露我即雷霆大法王尚何符呪罡訣云乎哉雖上賔三境超出萬幻亦不難矣其為濟利之功泥丸蓑草皆可寓氣栖神是故談笑風霆特吾餘事耳然而授受之奧符文之祕皆雲篆天書金科玉册必自盟天而傳庶無始勤終怠之患是以天真妙寶按劫以傳實天真元降科條盟誓至重今壇下弟子千生慶幸獲陟仙階今者上聞高厚依科付度是用宣演靈詮使知源舍流求本棄末則反求諸己有餘師矣必無致輕泄漏慢有違禁條惟宜精修戒行探究玄微久而進工不怠物我俱忘神明合一得不躡景登真與太虛同體矣畢竟天地未分之前從何下筆萬法歸一一歸何處爾各勉旃佩受無忽疏演法觀修造疏本觀始於漢季創自唐初暨元盛改創以來歲久凋弊已嘗修葺功力浩繁敬叩賢門幸思補報以成勝事伏以祖天師以魁星降世嘗孕瑞於蘅薇雲錦山乃梁楚鍾靈固儲祥於龍虎廟宇始崇於漢代殿庭曩於唐朝歷今千二百年真風益振由昔二十四治道脉彌尊奈風雨之震零致廊廡之頽圮雖教統所當修葺亦真徒之合結緣筆下生春會見王長桃再熟目前願力指看趙朗鼎重輝幻成貝闕珠宫不異丹臺紫府名著長生籙等霑福慶之綿綿功題大有書咸覩祥禎之秧秩玄風有永國祚無疆靖通庵題緣疏靖通庵者三十代天師虛靖真君修鍊處也真君生宋熙洽之時嘗結圜山頂功行既著逮崇寧間徽廟崇道尤篤同王侍宸文卿林侍宸靈素遭際特甚禱祠禜禬皆有異徵未幾宋杜既遷而真君皆先後坐脫凡其超辭茂蹟具載紀迷而庵之建于宋元者纍經兵燹劫灰更創非一矧以歲久日遐不無傾圮雖本山之修葺宜先而力之弗逮必假衆緣是持短疏遍于好施長者揮金以成勝事庶幾真君靈貺同垂不泯云伏以道尊漢室正三十代之仙傳教闡宋朝悟五千言之祕奧屬徽廟尊隆之日協侍宸顯著之功立勇將於殿庭揭妖蛟於潮汐蒼龍白虎猶翠竹而碧梧赤馬紅羊仍青編而紫閣既飾皈崇之地敢忘葺弊之勤爰欲圖新必干泉助鶴歸遼海還瞻瓊館翬飛舄化泗洲喜見瑶臺傑出共資宸貺均被靈休峴泉集卷之七
