front:
  text: 峴泉集卷之六疑一
  hash: sha256:e6382d3209564c5c5d1e7922e3edc86b64a54a7b98b09d4892dafe10010475cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0120_HFL_006-001a, image: hfl/1020/1020-004.png}
body:
  text: 耆山無為天師張宇初撰青詞齋意巳巳年酬醮宿啓青詞伏以天壽趨朝仰效國恩之報教宗負任惟依帝造之宏況奏陳懷預患之憂而禍咎有橫貽之變夙攄醮禱允藉終全潔芹藻之一誠畣聖真之鴻澤俯膺中惕密徹丹忱伏願聰鑒昭明睿慈溥博釋愆瑕於既往咸錫陶鎔集安裕於邇來悉垂含育冀款言之上格資靈貺以潛敷教脈延禧協春和而日茂皇圖介福回陽候以時雍張氏明薦父青詞自天降質情有禱於玄穹由父生身恩敢忘於幽攘攄忱請命惕過陳詞伏念先考某生際時昌沒逢家難襁懷綺繡早罹失怙之哀步陟荆榛粗遂賁園之託屆誕之辰適近云亡之目乃先親違終養之嗟而弟有溺淵之恨纍欲陳於醮拔竟連阻於塵羇爰致薦修俾諧超悟伏願丹書釋罪青簡垂慈性地朗明悉洗無涯之沉滯泉扃洞照普資已往之迷淪凡屬含靈均齊解脫酬醮早朝青詞乾道統天為凡世民彝之主宰皇中建極啓玄科請禱之梯航秉叩夙符陳情昭謝伏念臣某傳宗未冠襲職孔艱災非鼎沸之屢貽繼嗣淵臨之數見志實乖於修滌躬有賴於祈禳時歷因循圓寶臺之萬遍恩垂罔極答睿澤於一誠仰懷高厚之慈尤冀回旋之造朝儀曉肅盟款是酬伏願釋宥無方矜容有在仙曹録命早育秀於春陽玄教增暉日齊明於景曜洪禧誕布巨澤咸濡正醮青詞乾坤覆載時倏屆於誕辰科範昭宣齋并酬於素款仰希靈貺恭致謝言伏念臣某嗣職年踰撫躬夕惕驅馳非訟幸身衆之復安昭事宗祧感繼承之未遂晨夕之懷憂甚切省修之勵己維新蕆醮禱於沖科竭哀誠於宸鑒伏願皇猷鼎固教脈珍符曰壽曰康介萱席春暉之永宜家宜室開蘭闈晝日之長是慶衍於仙基至恩臨於悃愊年齡茂益髫稚咸寧本宫大殿慶成正醮謝恩青詞伏以易昭大壯是宫室之由興道煥重離喜殿廷之遂構仰依覆造恭致謝忱伏念臣某嗣職有年省躬無補上承帝渥幸錫賚之寵頒周率衆誠賴施金之咸集歲月之稽縻良久斧斤之經始惟艱獲棟宇於落成罄哀盟於醮悃伏願皇圖天廣教範春暉宜民宜人介萬姓壽康之祉爰清爰靜安一山寧謐之基及慶衍於宗傳至恩覃於鼎固百靈拱衛五福攸同懴紫微臺青詞伏以北極拱辰宰乾坤之生育中天御政司人世之權衝恭叩真科敬陳哀悃伏念巨某忝承宗緒仰拜綸恩千里趨朝國杜適逢於繼統一心祀帝醮修有命於薦先矧川途驅役之艱多星運遲留之慮是款寶臺之虔禱幸符金籙之圓成庸致懺忱并伸酬謝伏願紫微昭煥濳回吉曜之暉黃道開明茂衍遐齡之慶教模增顯眷序咸寧懴臺早朝青詞伏以維皇上帝總司主宰之機欽若昊天式重權衡之任懼災衰之罔測嘗懇禱以預禳禮詰周圓攄誠懺謝伏念臣某嗣承越歲乏歷多艱顧罪業之彌深致憂虞之疊見照臨有赫庸敷首過之祈降鑒無違是罄朝元之典馳忱緑奏答款玄穹伏願皇極昭回帝心簡在教範光而家道泰壽考益寧萱闈永以眷緣昌宗桃協慶愆尤冰釋福祉春融甲申普度酬醮滿散青詞伏以維皇建極幸歷事於三朝上帝降哀愧未修於一德攄誠答款首過陳情伏念臣某早嗣仙宗纍逢昌運愆尤山積致貽災否之屯疾疚日深難保室家之好請禱之忱兩叩安寧之喜再生符關睢正始之期協中饋承桃之望庸敬酬於素款并追拔於先靈爰潔蘋羞上祈藻鑒伏願帝臨有赫天聽孔昭丹簡標名回禎祥於否曜玉符度命起沉滯於幽扃教範安隆眷緣寧逸巳已酬醮齋意宿慶幸基早嗣宗傳之爵國恩是荷歲趨聖壽之朝慮接對之孔艱念風濤之涉遠仰祈醮禱已沐玄庥昨陳外纍之除實藉終全之祐忽罹橫撓旋遂安還嘗殫禳叩之皈并答資扶之造伏願帝臨在上靈降有嚴鑒人欲之衷誠宥積愆之瑕垢皇圖鼎盛日增教統之光家杜春融克協宗風之振門庭彌永寧謐咸孚本府年經齋意歲曆云周幸叨安於四序教樞是荷惟昭答於一誠況云為多積於悔尤而修進常踈於惕勵若災非土木之干并人事疾痾之患每陳皈叩屢沐保全庸遵餞臘之規敬致酬恩之悃伏念某均依祖澤仰戴國恩缺溫清於晨昏念憂勞於寒暑匪資懺釋曷遂首禳伏願忱懇上通康寧荐錫聖域咸春至化克揚於宗教福基開泰祥符允協於家庭凡冀未來之祐悉希大造之仁壽永萱華榮齊棠萼圓臺酬醮齋意洪武二十五年降香華蓋山帝命寵臨為儲君而請福微躬疾困賴慈母以祈安況官非誣橫之干有遠涉風波之慮省己宜於恐懼希恩必以祈禳神祐默扶醮盟是踐伏願天錫洪庥星暉景緯家慶日增於遠大仁壽同躋邦基時協於隆平睿謨克廣萱闈椿永棠萼蘭馨建溥度齋意伏念某早嗣仙宗纍承帝渥祖宗功德愧未報於初心言行愆尤慨莫伸於寸善各從傾逝罔測升沉兼酬祈懇之誠益重勳勞之念庸資薦拔并遂首禳惟大德之好生實不言而善應伏願東極垂慈南炎受鍊玉符金簡即開五户之明丹界朱陵洞煥九幽之燭恩覃有造澤被無窮普度早朝薦拔青詞天高地厚惟德澤之難忘日往月來倏古今之代謝攄誠請命竭己陳情伏念臣某襲爵懷慚省躬悔過追報幸資於遠邇傷悼彌深超遷仰及於幽冥謝酬敢後所懼愆尤之莫首必祈懺滌以均消爰潔清朝并周素款伏願九幽拔罪五苦停酸保命生根咸證逍遙之果登真樂界全回發育之春教範光亨眷緣協吉甲申普度酬醮齋意伏念某忝承仙緒叨歷聖朝極慚罪業之深莫遂愆瑕之滌顧病痾之久困致家室之靡寧叩兩款以攄誠幸百靈之有格恭陳菲醮上答宸庥伏願聖造昭回帝心簡在悔尤蠲釋旋否癘之亨通幽壤開明運慈悲而超悟教風鞏固家慶蕃昌凡在甄陶均祈生育圓臺建醮誠意日照月臨皆機衡之所囿陽消隂長恐憂患之靡寧仰期潛回厄運之屯敬致上籲昊天之禱禮詰懼稽於四載始生特達於一誠報款愆期酬恩俟命伏願皇覽昭明帝慈溥博教統永隆於山嶽五福咸臻宗風益茂於蘅薇百祥駢集災非冰釋嘉慶眷融三清殿上梁文伏以三境神洲珠黍現虛無之上界五陵福地宗壇開龍虎之名山昨逢塵劫之椎移復覩奐輪之壯觀帝恩岡極道化無方欽惟皇帝陛下乾坤同大日月並明經綸正始於萬方文軌會歸於四海豐功盛德大成王治之基聖子神孫益廣皇猷之永玄門推重華構維新仰惟三清三境天尊虛無至真上帝位三界之元尊為萬天之主宰玄元始成文而有象梵清景結氣於無窮紫檢丹書闡十極九霄之內典金科玉律衍七經八緯之靈章是龍文鳳篆之彰致虎衛鸞驂之會象貝闕琳宫之遐仰聳璇臺蘂閣之雄瞻不日而成於斯為盛再惟神樂觀仙官本宫住持傅提點蓬閬仙姿煙霞儀表振青瑣紫宸之步領雲門大濩之音多貴達之經營實山林之柱石再惟道録司主領提點左演法曹尊師黼黻文章宰玄綱之樞轄噓呼風雨握祕笈之機衡日承寵錫之繁深竭謀維之力又惟住山提舉李尊師玉韞山輝珠藏淵潤探玄科於法海輔教席於清部暨總務之群才及施金之多士佳聲俊望嘗光霽於明時美譽芳馨共清揚於化日斯神道之設教而風霆以流形煥然繡柱雕甍凌空耀日偉矣彩楹綺户擁霧回風高明合景於始青空洞混真於大赤竒峯靈岫儼蛟騰鳳翥之儀疊轂高幢聳霞繞雲蒸之勢宜萬靈之環拱實千載之宏規爰舉修梁敬陳善頌梁之東五雲瑞氣藹空濛日華烜曜金銀闕山嶽交輝萬壽崇梁之南千峯萬岫翠堆藍霓旌羽節浮空下一黍高懸北面參梁之西瓊林瑤草白雲齊靈巖列岫青城表萬劫丹光接太微梁之北象麓圓高天一色漢壇玉局萬靈尊福著皇釐朝萬國梁之上霧輦霞車鸞鵲仗玉京縹眇太清家神明區奧非無象梁之下洞訣神經遵妙化虛皇壇上月華明靈璈四擁真仙駕伏願上梁之後皇圖益廣玄教增輝四宇八荒均被涵濡之澤群黎萬姓咸資清靜之風道域無窮仙宗有永勑建祖師殿上梁文伏以炎漢教興龍虎乃神仙之官府留侯系出圭璋為世胄之典儀夙崇天闕之皈寧拒劫塵之換人謀注久帝力維新欽惟皇帝陛下九五開圖一元正統宏模巨智立皇極以建中盛德豐功總天官而授曆湯武之鴻基益振漢唐之茂績斯張懷禹貢以來廷集虞韶而制禮而儲器正元良之望兼親王隆國杜之安宜華夷咸樂於雍熙而道域特沾於殊渥謀猷日廣柱石天開恭惟祖師正一沖玄神化靜應顯祐真君道尊玄省教闡清都神氣風霆實冠冕三山之重簪裾劒佩著源流奕世之宗纍斂福於邦民是培芳於嗣胤矧際天朝之優眷頓宏神宇之雄膽千載洪規一時壯觀再惟將相良才閫垣英質及四方之碩德同一代之休光斯道其有在焉至神而無方也六合天經而地緯五城日烜以雲從嘗驅龍吏以運偉材旋捧鶴書而求碧瓦竒木既成於月府南金時至於雲庭紫府十二天幻成蓬閬瑤京三萬户移自方瀛宛然貝闕丹臺廓矣蘂階瓊殿鳳麟洲渚春融三島而回鸞鵲旌幢樂徹九清而下駢虹駕霧耀電摩霄非山川壯麗無以表師相之尊由地位高明是足冠人天之仰故靈祗拱衛風雷長挾於仙都而珠璧鮮張星漢上通於帝所瓊書琳札惟許葛之可方璧薤金莖或茅丘之足擬當披承四十三傳復建立千五百世雖神運之有孚亦地靈之所至因時而就不日而成六緯敬陳雙梁用舉梁之東氣分光嶽道猶龍春回曆象朝暾麗盡在和風長養中梁之西仙臺巖岫與雲齊碧池瓊樹煙霞表時有天書降紫泥梁之南塵湖高與華衡參雲旌霧節排空翠日護長生白玉函梁之北道祖飛神超莫測絳衣魚鬛儼層霄漢家自古神仙宅梁之上列帝高居千仞廣靈璈時謁太清遊玉府樞機傳世掌梁之下虎衛龍翔羅鳳駕玉書光照五雲中億劫空同非晝夜伏願上梁之後聖壽天長皇圖鼎盛輔東儲之光大濟寰宇之謐寧勳名期將相之蕭曹家業冀士民於楊郭福瀰川海玄風克振於丕基德著璠璵教脈益隆於震器宗壇有永道化無方三門上梁文伏以龍虎名山著清虛之福地鳳麟别島開廣大之法門昨經離焰之災是復鼎新之建道模克顯神化用昭仰惟三境高尊十方列聖祖師正一沖玄神化靜應顯祐真君啓正一之宗風闡玄元之妙化得山峙川流之形勝弘天經地緯之規繩寶訣瓊文衍千五百年之仙胄珠宫具闕崇二十四治之神功門通日月之往來户象乾坤之闔闢奂輪斯美陟降是臨再惟神樂觀仙官住持傅提點北闕歸來領煙霞之舊席東山燕息衣雨露之殊恩嘉煥號之顯榮實玄門之儀表再惟住山提舉尊師玉質金聲上謁龍章之黼黻明珠完璧儼居鶴署之經綸其贊畫於大成尚謀猷而有永再惟道録提點左演法曹尊師文史清標風霆偉度寵錫金鏞之重恩覃寶閣之尊尤匡贊於山林是相成於棟宇暨神寶之職司及良工之才轄豐功偉迹宜光輔於玄樞美擢佳聲共大膺於清選惟人有物而有則蓋神無體以無方赫然綺閣雕楹排雲擁霧倏爾璇題壁繪飛電騰空琅璈協駕於霓旌閣道降靈於羽節琳峯琪樹藹龍翔豹躍之姿雲珮霞裾儼鶴佇鸞趨之步斯百靈之拱衛乃萬姓之瞻依快舉雙虹特陳六緯梁之東日華朝聳海暾紅靈壇儼有風雷護紫氣浮關曙彩中梁之南丹輿絳節下鸞驂明庭遠錫天香降帝闕綸音耀寶緘梁之西瓊林爽氣藹巖霏瑶壇夜燭丹光徹金井靈泉咽紫微梁之下羽佩朝珂須並駕玄風四海啓民瞻五福咸歌均聖化伏願上梁之後皇圖天廣玄德春暉百福千祥均戴陶鎔之澤五風十雨悉歸覆育之中道化丕彰真風益振峴泉集卷之六
